<script>
    window.onerror = function(message, source, lineno, colno, error) {
        const div = document.createElement('div');
        div.style.position = 'fixed';
        div.style.top = '0';
        div.style.left = '0';
        div.style.width = '100%';
        div.style.background = '#e74c3c';
        div.style.color = 'white';
        div.style.padding = '20px';
        div.style.zIndex = '999999';
        div.style.fontFamily = 'sans-serif';
        div.style.boxSizing = 'border-box';
        div.innerHTML = '<h3>Hata Oluştu / Error Occurred:</h3>' + 
            '<p><strong>Hata Mesajı:</strong> ' + message + '</p>' +
            '<p><strong>Dosya:</strong> ' + source + ' (Satır: ' + lineno + ', Sütun: ' + colno + ')</p>' +
            '<p><strong>Yığın (Stack):</strong><br><pre style="background:rgba(0,0,0,0.2); padding:10px; border-radius:4px; overflow-x:auto;">' + (error ? error.stack : 'N/A') + '</pre></p>';
        document.body.appendChild(div);
        return false;
    };
</script>

.tabs {

.tab.active {

.progress-container {

.tab-content {

button:active {

button.success { background-color: #2ECC71; }
button.success:hover { background-color: #27AE60; }
button.warning { background-color: #E67E22; }

/* 3D Card Flip CSS */
.card-perspective {
    perspective: 1000px;
    margin-bottom: 20px;
}
.card-inner {
    position: relative;
    width: 100%;
    min-height: 250px;
    transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    transform-style: preserve-3d;
}
.card-inner.flipped {
    transform: rotateY(180deg);
}
.card-face {
    width: 100%;
    min-height: 250px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: var(--border-radius);
    box-shadow: var(--shadow);
    background: var(--card-bg);
    padding: 40px 20px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
}
.card-front {
    position: relative;
    z-index: 2;
    transform: rotateY(0deg);
}
.card-back {
    position: absolute;
    top: 0;
    left: 0;
    transform: rotateY(180deg);
    z-index: 1;
}

/* Translation Tooltip Styles */
.trans-tooltip {
    position: absolute;
    background: rgba(0, 0, 0, 0.9);
    color: #fff;
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 14px;
    z-index: 10000;
    pointer-events: none;
    box-shadow: 0 4px 15px rgba(0,0,0,0.25);
    max-width: 250px;
    text-align: center;
    opacity: 0;
    transform: translateY(10px) scale(0.95);
    transition: opacity 0.2s ease, transform 0.2s ease;
}
.trans-tooltip.show {
    opacity: 1;
    transform: translateY(0) scale(1);
    pointer-events: auto;
}
.trans-tooltip::after {
    content: '';
    position: absolute;
    top: 100%;
    left: 50%;
    margin-left: -6px;
    border-width: 6px;
    border-style: solid;
    border-color: rgba(0, 0, 0, 0.9) transparent transparent transparent;
}
.trans-tooltip.bottom-arrow::after {
    top: auto;
    bottom: 100%;
    border-color: transparent transparent rgba(0, 0, 0, 0.9) transparent;
}

[data-theme="dark"] .trans-tooltip {
    background: rgba(255, 255, 255, 0.95);
    color: #111;
}
[data-theme="dark"] .trans-tooltip::after {
    border-color: rgba(255, 255, 255, 0.95) transparent transparent transparent;
}
[data-theme="dark"] .trans-tooltip.bottom-arrow::after {
    border-color: transparent transparent rgba(255, 255, 255, 0.95) transparent;
}

.interactive-word {
    display: inline-block;
    transition: color 0.15s, background-color 0.15s;
    padding: 1px 3px;
    border-radius: 4px;
}
.interactive-word:hover {

/* Voice Recorder UI */
.recorder-container {

.record-btn {

.record-btn:hover {

}
.record-btn.recording {

@keyframes recordPulse {

    70% { transform: scale(1.05); box-shadow: 0 0 0 8px rgba(192, 57, 43, 0); }

.play-recording-btn {

    top: 0;

    width: 100vw;
    height: 100vh;
    pointer-events: none;
    z-index: 99999;
}

<script>
    // Safe localStorage wrapper for environments where localStorage is blocked (e.g. local files or strict privacy settings)
    const safeStorage = {
        getItem: (key) => {
            try {
                return localStorage.getItem(key);
            } catch (e) {
                console.warn("localStorage access is blocked or unavailable, falling back to memory storage.", e);
                return safeStorage.memoryStore[key] || null;
            }
        },
        setItem: (key, value) => {
            try {
                localStorage.setItem(key, value);
            } catch (e) {
                console.warn("localStorage access is blocked or unavailable, falling back to memory storage.", e);
                safeStorage.memoryStore[key] = String(value);
            }
        },

yları Past Simple ile ver.<br>- Ses kaydı al."}, {"dayNum": "17", "title": "Past Simple vs Past Continuous (when/while)", "gramerDesc": "Bu günün gramer yapısını çalışacağız.", "kaliplar": [{"en": "I was cooking when the phone rang.", "tr": "Telefon çaldığında yemek yapıyordum."}, {"en": "While I was walking, I saw an accident.", "tr": "Yürürken bir kaza gördüm."}, {"en": "The power went out while we were eating.", "tr": "Yemek yerken elektrik gitti."}, {"en": "When she arrived, we were waiting for her.", "tr": "O geldiğinde onu bekliyorduk."}, {"en": "I was reading while he was sleeping.", "tr": "O uyurken ben okuyordum."}, {"en": "I met her when I was studying at university.", "tr": "Üniversitede okurken onunla tanıştım."}, {"en": "While they were talking, I slipped out.", "tr": "Onlar konuşurken ben sıvıştım."}, {"en": "It started to rain while we were having a picnic.", "tr": "Piknik yaparken yağmur başladı."}, {"en": "I heard a noise while I was trying to sleep.", "tr": "Uyumaya çalışırken bir ses duydum."}, {"en": "I burned my hand while I was cooking.", "tr": "Yemek yaparken elimi yaktım."}], "kelimeler": [{"en": "while", "tr": "iken/-ken", "ex": "While I was working..."}, {"en": "when", "tr": "-diğinde/-dığında", "ex": "When the phone rang..."}, {"en": "as", "tr": "tam o sırada", "ex": "As I was leaving..."}, {"en": "just as", "tr": "tam da...-ken", "ex": "Just as I sat down..."}, {"en": "meanwhile", "tr": "bu sırada", "ex": "Meanwhile, he was cooking."}, {"en": "interrupt", "tr": "kesmek/araya girmek", "ex": "He interrupted me."}, {"en": "happen", "tr": "olmak/meydana gelmek", "ex": "It happened suddenly."}, {"en": "suddenly", "tr": "aniden", "ex": "Suddenly I heard a noise."}, {"en": "immediately", "tr": "hemen", "ex": "I immediately stopped."}, {"en": "at once", "tr": "derhal", "ex": "I ran at once."}, {"en": "notice", "tr": "fark etmek", "ex": "I didn't notice it."}, {"en": "hear", "tr": "duymak", "ex": "I heard a strange sound."}, {"en": "see", "tr": "g ich is summer, means sea."}, {"tr": "Bana inanan insanları hayal kırıklığına uğratmam.", "en": "I won't disappoint the people who believe in me."}, {"tr": "Sana anlattığım strateji işe yaradı.", "en": "The strategy that I told you about worked."}, {"tr": "Toplantı ertelendi, ki bu çok can sıkıcı.", "en": "The meeting was postponed, which is very annoying."}, {"tr": "Şirket, adını duyduğunuz, iflas etti.", "en": "The company, whose name you have heard, went bankrupt."}, {"tr": "Bana verdiğiniz görev tamamlandı.", "en": "The task which you gave me has been completed."}, {"tr": "İşe alındığım günü asla unutmayacağım.", "en": "I will never forget the day when I was hired."}, {"tr": "Yeni açıklanan sonuçlar şaşırtıcı.", "en": "The results which were just announced are surprising."}, {"tr": "Aradığımız niteliklere sahip aday sen olabilirsin.", "en": "You might be the candidate who has the qualifications we are looking for."}, {"tr": "Bu sorunu çözebilecek tek kişi sensin.", "en": "You are the only person who can solve this problem."}, {"tr": "İşinin ehli insanlarla çalışmak istiyorum.", "en": "I want to work with people who are good at their job."}, {"tr": "Kendine güvenen insanlar her zaman fark edilir.", "en": "People who are confident are always noticed."}, {"tr": "Bana yardım edecek birini arıyorum.", "en": "I'm looking for someone who can help me."}, {"tr": "Dün aldığım haber çok sevindiriciydi.", "en": "The news that I got yesterday was very pleasing."}, {"tr": "Bu, üzerinde çalıştığım proje.", "en": "This is the project that I'm working on."}, {"tr": "Sana verdiğim sözü tuttum.", "en": "I kept the promise that I made to you."}, {"tr": "Hayalini kurduğum iş bu.", "en": "This is the job that I dreamt of."}, {"tr": "Bugüne kadar karşılaştığım en büyük zorluktu.", "en": "It was the biggest challenge that I have ever faced."}, {"tr": "Ve işte çözüm!", "en": "And here is the solution!"}, {"tr": "Fikrini beğendiğim kişiyle çalışıyorum.", "en": "I work with the person whose idea I liked."}, {"tr": "Sana dün bahsettiğim sorun çözüldü.", "en": "The problem that I mentioned to you yesterday has been solved."}, {"tr": "Bana güvenen insanlara teşekkür borçluyum.", "en": "I owe a debt of gratitude to the people who trust me."}, {"tr": "Eleştiriye açık olan insanlar gelişir.", "en": "People who are open to criticism improve."}, {"tr": "Risk almayı seven insanlar genelde başarılı olur.", "en": "People who like taking risks are generally successful."}, {"tr": "Müşteri memnuniyetinin ön planda olduğu bir şirket istiyorum.", "en": "I want a company where customer satisfaction is a priority."}, {"tr": "Kazandığımız en büyük başarı, ki bu ekip çalışmasıydı, kutlandı.", "en": "The greatest success we achieved, which was teamwork, was celebrated."}, {"tr": "Zirveye ulaşmanın yolu, ki kolay değildir, sabırdan geçer.", "en": "The way to reach the top, which is not easy, goes through patience."}, {"tr": "Birlikte çalıştığım en yetenekli insan sensin.", "en": "You are the most talented person that I have ever worked with."}, {"tr": "En çok gurur duyduğum şey dürüstlüğümdür.", "en": "The thing that I am most proud of is my honesty."}, {"tr": "Hiçbir şey, ki bu çok açık, imkansız değildir.", "en": "Nothing, which is very clear, is impossible."}, {"tr": "Bu, adını koyamadığım bir duygu.", "en": "This is a feeling that I can't name."}, {"tr": "Nedenini bilmediğim bir şekilde kayboldum.", "en": "I got lost for a reason that I don't know."}, {"tr": "Sana en çok yakışan şeyi yap.", "en": "Do the thing that suits you best."}, {"tr": "Kararımı etkileyen faktörlerden biri de maaştı.", "en": "One of the factors that affected my decision was the salary."}, {"tr": "Hayatta en çok istediğim şey huzur.", "en": "The thing that I want most in life is peace."}, {"tr": "Bunu yapabilmenin tek yolu çalışmak.", "en": "The only way that you can do this is to work."}, {"tr": "Problemlerin olduğu yerde fırsatlar da vardır.", "en": "Where there are problems, there are also opportunities."}, {"tr": "Ne olduğunu bilmediğim şeyden korkmam.", "en": "I'm not afraid of what I don't know."}, {"tr": "Her şey, ki buna sen de dahilsin, bir gün güzel olacak.", "en": "Everything, which includes you, will be beautiful one day."}, {"tr": "Yardım istemekten çekinen insanları anlamıyorum.", "en": "I don't understand people who hesitate to ask for help."}, {"tr": "Sevdikleri işi yapanlar en şanslılardır.", "en": "Those who do the job they love are the luckiest."}, {"tr": "Adını hatırlayamadığım kişi beni aradı.", "en": "The person whose name I couldn't remember called me."}, {"tr": "Kapısı her zaman açık olan bir patronum var.", "en": "I have a boss whose door is always open."}, {"tr": "Sonuçlarına katlandığım bir karar verdim.", "en": "I made a decision whose consequences I am bearing."}, {"tr": "Gülümsemesi içimi ısıtan insan nerede?", "en": "Where is the person whose smile warms my heart?"}, {"tr": "Fikirlerine saygı duyduğum insanlar azdır.", "en": "The people whose ideas I respect are few."}, {"tr": "Çoğu insan, ki ben dahil, hata yapmaktan korkar.", "en": "Most people, including me, are afraid of making mistakes."}, {"tr": "Ama hatalar öğrenmenin ta kendisidir.", "en": "But mistakes are the very thing that learning is."}, {"tr": "Öğrenmenin en hızlı yolu hata yapmaktır, ki bu paradoksaldır.", "en": "The fastest way to learn is to make mistakes, which is paradoxical."}, {"tr": "Konfor alanı, ki orası güvenlidir, aslında en tehlikeli yerdir.", "en": "The comfort zone, where it is safe, is actually the most dangerous place."}, {"tr": "Konfor alanından çıkanlar, ki cesur insanlardır, kazanır.", "en": "Those who step out of their comfort zone, who are brave people, win."}, {"tr": "En büyük başarısızlık, ki bu denememekten daha iyidir, deneyip başaramamaktır.", "en": "The greatest failure, which is better than not trying, is trying and failing."}, {"tr": "İngilizce, ki bütün dünyada konuşulur, öğrenmeye değer.", "en": "English, which is spoken all over the world, is worth learning."}, {"tr": "Bu plan, ki senin için yazıldı, tam sana göre.", "en": "This plan, which was written for you, is just right for you."}, {"tr": "Gramer, ki bazen sıkıcıdır, aslında bir araçtır.", "en": "Grammar, which is sometimes boring, is actually a tool."}, {"tr": "Kelimeler, ki yapı taşlarıdır, olmadan konuşamazsın.", "en": "You can't speak without words, which are the building blocks."}, {"tr": "Pratik, ki en önemli şeydir, ihmal edilmemelidir.", "en": "Practice, which is the most important thing, should not be neglected."}, {"tr": "Bugün 29. gün, ki bu inanılmaz bir sayı.", "en": "Today is the 29th day, which is an incredible number."}, {"tr": "2900 cümle, ki dev bir rakam, arkamda kaldı.", "en": "2900 sentences, which is a giant number, are behind me."}, {"tr": "Bu cümleleri yazan kişi, ki o sensin, harikasın.", "en": "The person who is writing these sentences, which is you, is wonderful."}, {"tr": "Her gün biraz daha ilerliyorsun, ki bu harika.", "en": "You are progressing a little more every day, which is great."}, {"tr": "En büyük motivasyon kaynağım, ki bu sensin, plana sadık kalman.", "en": "My greatest source of motivation, which is you, is sticking to the plan."}, {"tr": "Sonu gelmeyen yokuşun zirvesine yaklaşıyoruz.", "en": "We are approaching the top of the endless hill."}, {"tr": "Yarın 30. gün, ki bu 5. haftanın sonu olacak.", "en": "Tomorrow is the 30th day, which will be the end of the 5th week."}, {"tr": "Bunu başarmış olmanın verdiği gurur, ki tarifsizdir, seni sarsın.", "en": "May the pride of having achieved this, which is indescribable, surround you."}, {"tr": "İleride dönüp baktığında bu günler, ki zordu, gülümseyeceksin.", "en": "When you look back in the future, you will smile at these days, which were hard."}, {"tr": "Çünkü pes etmedin, ki en önemlisi budur.", "en": "Because you didn't give up, which is the most important thing."}, {"tr": "Ve devam ettin, ki bu yapabileceğinin kanıtıdır.", "en": "And you continued, which is proof of what you can do."}, {"tr": "Hikayenin sonu, ki aslında başlangıcıdır, çok güzel olacak.", "en": "The end of the story, which is actually the beginning, will be very beautiful."}], "aktivite": "**Sabah (30 dk): Tanımlama Cümleleri**<br>- who/which/that/where/whose kullanarak 25 tanımlama cümlesi yaz.<br>- Her zamirden 5 cümle.<br><br>**Öğlen (30 dk): Birleştirme Pratiği**<br>- 15 çift kısa cümleyi relative clause ile birleştir.<br>- Örnek: \"I have a friend. He speaks English.\" → \"I have a friend who speaks English.\"<br><br>**Akşam (45 dk): \"My Work Environment\" Konuşması**<br>- 2-3 dakikalık \"İş yerim ve çalışma arkadaşlarım\" konuşması.<br>- Bol bol relative clause kullan.<br>- Ses kaydı al."}, {"dayNum": "30", "title": "Reported Speech (Dolaylı Anlatım) & HAFTA 5 FİNAL", "gramerDesc": "Bu günün gramer yapısını çalışacağız.", "kaliplar": [{"en": "He said that he had a problem.", "tr": "Bir sorunu olduğunu söyledi."}, {"en": "She told me to wait.", "tr": "Bana beklememi söyledi."}, {"en": "The boss asked if I had finished.", "tr": "Patron bitirip bitirmediğimi sordu."}, {"en": "He said he would help.", "tr": "Yardım edeceğini söyledi."}, {"en": "She said she was tired.", "tr": "Yorgun olduğunu söyledi."}, {"en": "They asked me what I wanted.", "tr": "Bana ne istediğimi sordular."}, {"en": "He told me not to worry.", "tr": "Endişelenmememi söyledi."}, {"en": "She said she had solved the problem.", "tr": "Sorunu çözdüğünü söyledi."}, {"en": "The manager explained that it was urgent.", "tr": "Müdür acil olduğunu açıkladı."}, {"en": "I told them I could do it.", "tr": "Onlara yapabileceğimi söyledim."}], "kelimeler": [{"en": "say", "tr": "söylemek", "ex": "He said that..."}, {"en": "tell", "tr": "anlatmak/söylemek", "ex": "He told me that..."}, {"en": "ask", "tr": "sormak", "ex": "She asked if..."}, {"en": "explain", "tr": "açıklamak", "ex": "He explained that..."}, {"en": "mention", "tr": "bahsetmek", "ex": "She mentioned that..."}, {"en": "inform", "tr": "bilgilendirmek", "ex": "They informed us that..."}, {"en": "announce", "tr": "duyurmak", "ex": "He announced that..."}, {"en": "complain", "tr": "şikayet etmek", "ex": "She complained that..."}, {"en": "suggest", "tr": "önermek", "ex": "He suggested that..."}, {"en": "recommend", "tr": "tavsiye etmek", "ex": "She recommended that..."}, {"en": "warn", "tr": "uyarmak", "ex": "He warned me not to..."}, {"en": "promise", "tr": "söz vermek", "ex": "She promised that..."}, {"en": "agree", "tr": "kabul etmek", "ex": "He agreed that..."}, {"en": "deny", "tr": "inkar etmek", "ex": "She denied that..."}, {"en": "confirm", "tr": "onaylamak", "ex": "He confirmed that..."}, {"en": "apologize", "tr": "özür dilemek", "ex": "She apologized for..."}, {"en": "admit", "tr": "itiraf etmek", "ex": "He admitted that..."}, {"en": "insist", "tr": "ısrar etmek", "ex": "She insisted that..."}, {"en": "wonder", "tr": "merak etmek", "ex": "I wondered if..."}, {"en": "advise", "tr": "tavsiye vermek", "ex": "He advised me to..."}], "cumleler": [{"tr": "Bir sorunu olduğunu söyledi.", "en": "He said that he had a problem."}, {"tr": "Bana beklememi söyledi.", "en": "She told me to wait."}, {"tr": "Patron bitirip bitirmediğimi sordu.", "en": "The boss asked if I had finished."}, {"tr": "Yardım edeceğini söyledi.", "en": "He said he would help."}, {"tr": "Yorgun olduğunu söyledi.", "en": "She said she was tired."}, {"tr": "Bana ne istediğimi sordular.", "en": "They asked me what I wanted."}, {"tr": "Endişelenmememi söyledi.", "en": "He told me not to worry."}, {"tr": "Sorunu çözdüğünü söyledi.", "en": "She said she had solved the problem."}, {"tr": "Müdür acil olduğunu açıkladı.", "en": "The manager explained that it was urgent."}, {"tr": "Onlara yapabileceğimi söyledim.", "en": "I told them I could do it."}, {"tr": "\"Toplantı iptal oldu\" dedi.", "en": "He said that the meeting was cancelled."}, {"tr": "\"Proje gecikti\" dedi.", "en": "She said that the project was delayed."}, {"tr": " adı.", "en": "He explained to us that the company was in a difficult situation."}, {"tr": "Ama endişelenmememizi söyledi.", "en": "But he told us not to worry."}, {"tr": "Seneye durumun düzeleceğine söz verdi.", "en": "He promised that the situation would improve next year."}, {"tr": "Bana proje hakkında ne düşündüğümü sordu.", "en": "He asked me what I thought about the project."}, {"tr": "Projenin harika olduğunu ancak riskli olduğunu söyledim.", "en": "I said that the project was great but risky."}, {"tr": "Riskleri göze alıp alamayacağını sordu.", "en": "He asked if he could take the risks."}, {"tr": "Ona dikkatli olmasını tavsiye ettim.", "en": "I advised him to be careful."}, {"tr": "\"Acele etme, planlı git\" dedim.", "en": "I told him not to rush and to go with a plan."}, {"tr": "Dün patron beni odasına çağırdı ve terfi ettiğimi söyledi.", "en": "Yesterday the boss called me to his room and told me that I had been promoted."}, {"tr": "\"İnanamıyorum!\" dedim.", "en": "I said that I couldn't believe it."}, {"tr": "\"Hak ediyorsun\" dedi.", "en": "He said that I deserved it."}, {"tr": "Teşekkür ettim ve elinden geleni yapacağıma söz verdim.", "en": "I thanked him and promised that I would do my best."}, {"tr": "O da bana güvendiğini söyledi.", "en": "He told me that he trusted me."}, {"tr": "Geçen gün bir arkadaşım İngilizce öğrenmek istediğini söyledi.", "en": "The other day a friend of mine told me that he/she wanted to learn English."}, {"tr": "Ona bu plandan bahsettim.", "en": "I mentioned this plan to him/her."}, {"tr": "Çok etkilendi ve hemen başlamak istedi.", "en": "He/She was very impressed and wanted to start immediately."}, {"tr": "Ona sabırlı olmasını ve her gün çalışmasını söyledim.", "en": "I told him/her to be patient and to study every day."}, {"tr": "Zor ama imkansız olmadığını anlattım.", "en": "I explained that it was hard but not impossible."}, {"tr": "\"İstersen sen de yapabilirsin\" dedim.", "en": "I said, \"If you want, you can do it too hausted yourself."}, {"tr": "Dengede olmak en doğrusu olabilir.", "en": "Being in balance might be the best."}, {"tr": "Hayat siyah ve beyaz değil; grinin tonlarını görmeyi öğrenmelisin.", "en": "Life is not black and white; you must learn to see the shades of gray."}, {"tr": "Sağlık bir yolculuktur, varış noktası değil.", "en": "Health is a journey, not a destination."}, {"tr": "Bu yolculukta kendine karşı sabırlı olmalısın.", "en": "You must be patient with yourself on this journey."}, {"tr": "Her şey yoluna girecek, emin ol.", "en": "Everything will be fine; be sure of it."}, {"tr": "Bugün hava kapalı olabilir ama güneş her zaman bulutların arkasındadır.", "en": "It might be cloudy today, but the sun is always behind the clouds."}, {"tr": "Kendi güneşini bulmalısın.", "en": "You must find your own sun."}, {"tr": "İçindeki sesi dinlemeyi öğrenmelisin.", "en": "You must learn to listen to the voice inside you."}, {"tr": "O ses sana doğru yolu gösterecektir.", "en": "That voice will show you the right way."}, {"tr": "Ben bu hafta çok şey öğrenmiş olmalıyım.", "en": "I must have learned a lot this week."}, {"tr": "Siz de öğrenmişsinizdir umarım.", "en": "I hope you might have learned too."}, {"tr": "Sağlıklı ve huzurlu bir hafta geçirmiş olmalısın.", "en": "You must have had a healthy and peaceful week."}], "aktivite": "**Sabah (30 dk): Tahmin Oyunu**<br>- 20 tane \"must be / might be / can't be\" ile tahmin cümlesi yaz.<br>- Sağlık durumları, insanların neden yorgun/stresli olduğu hakkında olsun.<br><br>**Öğlen (30 dk): Pişmanlık Cümleleri**<br>- 15 tane \"should have / shouldn't have\" ile pişmanlık cümlesi yaz.<br>- Sağlıkla ilgili geçmişte yapman gereken ama yapmadığın şeyler.<br><br>**Akşam (45 dk): \"Health Detective\" Konuşması**<br>- 2 dakikalık \"Bir arkadaşımın sağlık sorunları hakkında tahminlerim\" konuşması.<br>- must/might/could/can't/should kullan.<br>- Ses kaydı al."}, {"dayNum": "35", "title": "Wish + would / If only + would (Şikayet ve Değişim Arzus e conclusion at which I finally arrived."}, {"tr": "İçinde bulunduğumuz dijital çağda her şey hızlı.", "en": "Everything is fast in the digital age in which we are."}, {"tr": "Bu teknolojinin ötesinde bir şey yok.", "en": "There is nothing beyond this technology."}, {"tr": "Verimlilik adına her şeyin feda edilmemesi gerektiğini savunuyorum.", "en": "I argue that everything should not be sacrificed in the name of efficiency."}, {"tr": "Kullanıcı deneyimi odak noktası olmalıdır.", "en": "User experience should be the focal point."}, {"tr": "Bunun üzerine düşünmemiz gereken bir konu olduğunu düşünüyorum.", "en": "I think this is a topic about which we need to think."}, {"tr": "Teknoloji bağımlılığının altında yatan sebepler araştırılıyor.", "en": "The reasons underlying technology addiction are being researched."}, {"tr": "Dijital detoks yapmanın faydaları hakkında çok şey okudum.", "en": "I read a lot about the benefits of doing a digital detox."}, {"tr": "Ekran süresini kıstığım bir dönemdeyim.", "en": "I am in a period in which I am cutting down on screen time."}, {"tr": "Teknoloji olmadan yapamadığımız doğru.", "en": "It is true that we cannot do without technology."}, {"tr": "Ama onunla nasıl bir ilişki kuracağımız bize bağlı.", "en": "But what kind of relationship we will establish with it is up to us."}, {"tr": "Teknolojinin efendisi mi yoksa kölesi mi olacağız?", "en": "Will we be the master or the slave of technology?"}, {"tr": "Bu cevaplamamız gereken kritik bir soru.", "en": "This is a critical question which we must answer."}, {"tr": "Kendimi en üretken hissettiğim araç kalem ve kağıt aslında.", "en": "The tool with which I feel most productive is actually pen and paper."}, {"tr": "Bazen en basit çözüm en iyisidir.", "en": "Sometimes the simplest solution is the best."}, {"tr": "İçinde kaybolduğumuz sanal dünyalar gerçek değil.", "en": "The virtual worlds in which we get lost are not real."}, {"tr": "Gerçek dünyaya bağlanmak için teknolojiyi araç olarak kul will have supported those who face discrimination for being immigrants."}, {"tr": "Yaşadıklarımı kitap yapmış olacağım belki de.", "en": "Maybe I will have made a book out of my experiences."}, {"tr": "\"Bir Göçmenin Hikayesi\" çok satanlar listesine girmiş olacak.", "en": "\"An Immigrant's Story\" will have entered the bestseller list."}, {"tr": "İmza gününde sıra benden yana taşmış olacak.", "en": "At the book signing, the line will have overflowed from my side."}, {"tr": "Ve ben o sıraya bakıp gururlanmış olacağım.", "en": "And I will have been proud looking at that line."}, {"tr": "Bütün bunları başarmış olmanın huzurunu yaşayacağım.", "en": "I will feel the peace of having achieved all this."}, {"tr": "Ama en önemlisi, insan kalmayı başarmış olacağım.", "en": "But most importantly, I will have managed to remain human."}, {"tr": "Para için, statü için, vatandaşlık için kişiliğimi satmamış olacağım.", "en": "I will not have sold my personality for money, status, or citizenship."}, {"tr": "Değerlerime sadık kalmış olacağım.", "en": "I will have stayed loyal to my values."}, {"tr": "Ve aynaya baktığımda gözlerimin içine bakabiliyor olacağım.", "en": "And when I look in the mirror, I'll be able to look into my own eyes."}, {"tr": "İşte asıl başarı budur.", "en": "That is the real success."}, {"tr": "İnsanın kendisiyle barışık olması.", "en": "Being at peace with oneself."}, {"tr": "Taşındığın ülke değil, taşıdığın yürek önemli.", "en": "It's not the country you move to, but the heart you carry that matters."}, {"tr": "Ben de güzel bir yürek taşımış olacağım oralara.", "en": "I will have carried a beautiful heart to those places."}, {"tr": "Ve oraları güzelleştirmiş olacağım.", "en": "And I will have made those places beautiful."}, {"tr": "Bir insan dünyayı değiştirebilir mi?", "en": "Can one person change the world?"}, {"tr": "Bilmem ama kendi dünyamı değiştirmiş olacağım.", "en": "I don't know, but I will have changed my own world."}, {"tr": "Bu bile yeter.", "en": "Even that is enough."}, {"tr": "Umarım bu cümleler sana ilham vermiştir.", "en": "I hope these sentences have inspired you."}, {"tr": "Umarım sen de bir gün hayallerine kavuşmuş olursun.", "en": "I hope you will have achieved your dreams one day too."}, {"tr": "Çünkü hayaller olmadan hayat olmaz.", "en": "Because there is no life without dreams."}, {"tr": "Ben hayal kurmaya devam edeceğim.", "en": "I will keep dreaming."}, {"tr": "Ve bu plan bittiğinde, ben çoktan havalanmış olacağım.", "en": "And when this plan ends, I will have already taken off."}], "aktivite": "**Sabah (30 dk): By the time...**<br>- \"By the time I'm 30, I will have...\" kalıbıyla 20 hedef cümlesi yaz.<br>- Seyahat, kariyer, dil, aile konularında olsun.<br><br>**Öğlen (30 dk): Zaman Çizelgesi**<br>- 2025, 2027, 2030, 2035, 2040 yılları için Future Perfect ile hedeflerini yaz (15 cümle).<br><br>**Akşam (45 dk): \"My Future Achievements\" Konuşması**<br>- 2-3 dakikalık \"Gelecekte neleri başarmış olacağım?\" konuşması.<br>- Future Perfect ağırlıklı.<br>- Ses kaydı al."}, {"dayNum": "45", "title": "Modals for Advice & Necessity (should/had better/ought to/must/have to)", "gramerDesc": "Bu günün gramer yapısını çalışacağız.", "kaliplar": [{"en": "You should learn English before moving abroad.", "tr": "Yurt dışına taşınmadan önce İngilizce öğrenmelisin."}, {"en": "You had better save money for emergencies.", "tr": "Acil durumlar için para biriktirsen iyi olur."}, {"en": "You ought to research the culture beforehand.", "tr": "Önceden kültürü araştırmalısın."}, {"en": "You must have a valid passport.", "tr": "Geçerli bir pasaportun olmak zorunda."}, {"en": "You have to apply for a visa.", "tr": "Vize başvurusu yapmak zorundasın."}, {"en": "You shouldn't go without health insurance.", "tr": "Sağlık sigortasız gitmemelisin."}, {"en": "You don't have to speak perfectly, but you should try.", "tr": "Mükemmel konuşmak zorunda değilsin ama denemelisin."}, {"en": "You had better not forget your documents.", "tr": "Belgelerini unutmasan iyi olur."}, {"en": "You must respect the local culture.", "tr": "Yerel kültüre saygı duymak zorundasın."}, {"en": "What should I pack for a long trip?", "tr": "Uzun bir yolculuk için ne almalıyım?"}], "kelimeler": [{"en": "should", "tr": "-meli/-malı", "ex": "You should prepare."}, {"en": "had better", "tr": "-sen iyi olur", "ex": "You'd better book early."}, {"en": "ought to", "tr": "-meli (güçlü)", "ex": "You ought to visit there."}, {"en": "must", "tr": "zorunda (zorunlu)", "ex": "You must have a visa."}, {"en": "have to", "tr": "zorunda (dışsal)", "ex": "You have to register."}, {"en": "recommend", "tr": "tavsiye etmek", "ex": "I recommend going there."}, {"en": "suggest", "tr": "önermek", "ex": "I suggest you learn the language."}, {"en": "advise", "tr": "tavsiye vermek", "ex": "I advise you to save money."}, {"en": "essential", "tr": "elzem", "ex": "It's essential to have insurance."}, {"en": "necessary", "tr": "gerekli", "ex": "It's necessary to check."}, {"en": "important", "tr": "önemli", "ex": "It's important to adapt."}, {"en": "requirement", "tr": "gereklilik", "ex": "A visa is a requirement."}, {"en": "permit", "tr": "izin/izin belgesi", "ex": "You need a work permit."}, {"en": "insurance", "tr": "sigorta", "ex": "Get health insurance."}, {"en": "document", "tr": "belge", "ex": "Keep documents safe."}, {"en": "application", "tr": "başvuru", "ex": "Submit application early."}, {"en": "appointment", "tr": "randevu", "ex": "Book an appointment."}, {"en": "deadline", "tr": "son tarih", "ex": "Don't miss the deadline."}, {"en": "checklist", "tr": "kontrol listesi", "ex": "Make a checklist."}, {"en": "plan B", "tr": "B planı", "ex": "Always have a plan B."}], "cumleler": [{"tr": "Yurt dışına taşınmadan önce İngilizce öğrenmelisin.", "en": "You should learn English before moving abroad."}, {"tr": "Acil durumlar için para biriktirsen iyi olur.", "en": "You had better save money for emergencies."}, {"tr": "Önceden kültürü araştırmalısın.", "en": "You ought to research the culture beforehand."}, {"tr": "Geçerli bir pasaportun olmak zorunda.", "en": "You must have a valid passport."}, {"tr": "Vize başvurusu yapmak zorundasın.", "en": "You have to apply for a visa."}, {"tr": "Sağlık sigortasız gitmemelisin.", "en": "You shouldn't go without health insurance."}, {"tr": "Mükemmel konuşmak zorunda değilsin ama denemelisin.", "en": "You don't have to speak perfectly, but you should try."}, {"tr": "Belgelerini unutmasan iyi olur.", "en": "You had better not forget your documents."}, {"tr": "Yerel kültüre saygı duymak zorundasın.", "en": "You must respect the local culture."}, {"tr": "Uzun bir yolculuk için ne almalıyım?", "en": "What should I pack for a long trip?"}, {"tr": "Pasaport tarihini kontrol etmelisin.", "en": "You should check your passport date."}, {"tr": "Vize için erken başvurmalısın.", "en": "You should apply for a visa early."}, {"tr": "İngilizce özgeçmiş hazırlamalısın.", "en": "You should prepare an English CV."}, {"tr": "Referans mektubu almayı unutmamalısın.", "en": "You shouldn't forget to get a reference letter."}, {"tr": "Uçak biletini erken alsan iyi olur.", "en": "You had better buy your flight ticket early."}, {"tr": "Havalanına erken gitmelisin.", "en": "You should go to the airport early."}, {"tr": "Yolda atıştırmak için yanına bir şeyler almalısın.", "en": "You should take something to snack on during the journey."}, {"tr": "Bol bol su içmelisin.", "en": "You should drink plenty of water."}, {"tr": "Uyku düzenine dikkat etmelisin.", "en": "You ought to pay attention to your sleep schedule."}, {"tr": "Jet lag için hazırlıklı olmalısın.", "en": "You should be prepared for jet lag."}, {"tr": "Otelini önceden rezerve ettirmelisin.", "en": "You must book your hotel in advance."}, {"tr": "Harita uygulaması indirsen iyi olur.", "en": "You had better download a map app."}, {"tr": "İlk gün çok fazla dolaşmamalısın.", "en": "You shouldn't walk around too much on the first day."}, {"tr": "Dinlenmek için kendine zaman vermelisin.", "en": "You should give yourself time to rest."}, {"tr": "Yerel para birimini öğrenmelisin.", "en": "You should learn the local currency."}, {"tr": "Döviz bürosunda bozdurmaktansa bankamatik kullanmalısın.", "en": "You should use ATMs rather than exchange offices."}, {"tr": "Kredi kartın yurt dışına açık mı kontrol et.", "en": "You should check if your credit card is open for international use."}, {"tr": "Bankana haber vermelisin yurt dışına çıkacağına dair.", "en": "You must inform your bank that you are going abroad."}, {"tr": "Yedek nakit bulundurmalısın.", "en": "You should keep spare cash."}, {"tr": "Pasaportunu ve vizeni fotokopi çekmelisin.", "en": "You should make photocopies of your passport and visa."}, {"tr": "Ailene bir irtibat numarası bırakmalısın.", "en": "You should leave a contact number with your family."}, {"tr": "Evrakları buluta yedeklemelisin.", "en": "You ought to back up documents to the cloud."}, {"tr": "Telefonuna e-sim veya yerel hat almalısın.", "en": "You should get an e-sim or a local line for your phone."}, {"tr": "Adaptör priz unutmamalısın.", "en": "You shouldn't forget a power adapter."}, {"tr": "Bavuluna fazla eşya koymamalısın.", "en": "You shouldn't put too many things in your suitcase."}, {"tr": "İklimine uygun giysiler seçmelisin.", "en": "You should choose clothes according to the climate."}, {"tr": "Rahat ayakkabılar almalısın.", "en": "You must take comfortable shoes."}, {"tr": "Yağmurluk bulundurman gerekir.", "en": "You need to have a raincoat."}, {"tr": "Güneş kremi sürmelisin.", "en": "You should apply sunscreen."}, {"tr": "Aşılarını kontrol ettirmelisin.", "en": "You must have your vaccinations checked."}, {"tr": "Sarı humma aşısı gibi özel aşılar gerekebilir.", "en": "Special vaccines like yellow fever may be required."}, {"tr": "Sağlık çantası hazırlamalısın (ağrı kesici, yara bandı).", "en": "You should prepare a first aid kit (painkiller, band-aid)."}, {"tr": "Reçeteli ilaçların varsa doktor raporu almayı unutma.", "en": "Don't forget to get a doctor's report if you have prescription drugs."}, {"tr": "Adaptasyon sürecinde kendine karşı sabırlı olmalısın.", "en": "You must be patient with yourself during the adaptation process."}, {"tr": "Kendini yalnız hissettiğinde aramaktan çekinmemelisin.", "en": "You shouldn't hesitate to call when you feel lonely."}, {"tr": "Yeni insanlarla tanışmak için etkinliklere katılmalısın.", "en": "You should attend events to meet new people."}, {"tr": "Dil kursuna yazılmak iyi bir fikir olabilir.", "en": "Signing up for a language course might be a good idea."}, {"tr": "Hata yapmaktan korkmamalısın.", "en": "You shouldn't be afraid of making mistakes."}, {"tr": "Herkes hata yapar, bu doğal.", "en": "Everyone makes mistakes; it's natural."}, {"tr": "En önemlisi, gitmeden önce İngilizce çalışmaya devam etmelisin.", "en": "Most importantly, you should keep studying English before you go."}, {"tr": "Yurt dışında çalışmak istiyorsan çalışma izni almak zorundasın.", "en": "If you want to work abroad, you have to get a work permit."}, {"tr": "Vergi numarası almak zorunludur.", "en": "It is obligatory to get a tax number."}, {"tr": "Sosyal güvenlik numarası için başvurman gerekir.", "en": "You need to apply for a social security number."}, {"tr": "Oturma izni için belediyeye kayıt yaptırmalısın.", "en": "You must register at the municipality for a residence permit."}, {"tr": "Adresini zamanında bildirmek zorundasın.", "en": "You have to report your address on time."}, {"tr": "Kira sözleşmeni saklamalısın, çok önemli.", "en": "You must keep your rental contract; it's very important."}, {"tr": "Faturalarını düzenli ödemelisin yoksa kredi skorun düşer.", "en": "You must pay your bills regularly; otherwise, your credit score drops."}, {"tr": "İş ararken referans çok önemlidir, o yüzden iyi ilişkiler kurmalısın.", "en": "References are very important when job hunting, so you should build good relationships."}, {"tr": "İş görüşmesine zamanında gitmelisin, geç kalmamalısın.", "en": "You must go to the interview on time; you shouldn't be late."}, {"tr": "El sıkışma ve göz teması kurmak onların kültüründe önemli olabilir.", "en": "Shaking hands and making eye contact may be important in their culture."}, {"tr": "Bahşiş kültürünü araştırmalısın.", "en": "You had better research the tipping culture."}, {"tr": "Bazı ülkelerde bahşiş vermemek kabalıktır.", "en": "In some countries, not tipping is rude."}, {"tr": "Gürültü konusunda dikkatli olmalısın.", "en": "You should be careful about noise."}, {"tr": "Gece sessizlik saatlerine uymak zorundasın.", "en": "You have to observe quiet hours at night."}, {"tr": "Çöpleri ayrıştırmak gerekir, yoksa ceza yersin.", "en": "You need to separate the trash; otherwise, you'll get a fine."}, {"tr": "Kırmızı ışıkta geçmemen gerektiğini söylememe gerek yok.", "en": "I don't need to tell you not to cross at a red light."}, {"tr": "Yaya geçidinde araçlar durur, bunu bilmelisin.", "en": "Cars stop at pedestrian crossings; you should know this."}, {"tr": "Bisiklet yollarına dikkat etmelisin.", "en": "You must pay attention to bicycle lanes."}, {"tr": "Sigorta yaptırmak şarttır, sakın ihmal etme.", "en": "It is essential to get insurance; don't you dare neglect it."}, {"tr": "Sağlık sistemi pahalı olabilir, risk almamalısın.", "en": "The healthcare system can be expensive; you shouldn't take risks."}, {"tr": "Yerel yemekleri mutlaka denemelisin.", "en": "You definitely must try local food."}, {"tr": "Sokak yemekleri harika olabilir ama hijyene dikkat et.", "en": "Street food can be great, but pay attention to hygiene."}, {"tr": "Suyun içilebilir olup olmadığını kontrol et.", "en": "Check if the water is drinkable."}, {"tr": "Musluk suyu içilir mi öğren.", "en": "Find out if tap water is safe to drink."}, {"tr": "Pazarlık kültürü var mı bak.", "en": "Check if there is a bargaining culture."}, {"tr": "Pazarlık yaparken saygılı olmalısın, haddini aşmamalısın.", "en": "You should be respectful when bargaining; you shouldn't cross the line."}, {"tr": "Fotoğraf çekerken insanlara sormalısın, izinsiz çekmemelisin.", "en": "You should ask people when taking photos; you shouldn't take without permission."}, {"tr": "Dini mekanlarda giyim kurallarına uymalısın.", "en": "You must obey the dress code in religious places."}, {"tr": "Ayakkabı çıkarmak gerekebilir, tetikte ol.", "en": "You may need to take your shoes off; be alert."}, {"tr": "Jest ve mimikler farklı anlamlara gelebilir, dikkatli olmalısın.", "en": "Gestures and mimics can have different meanings; you should be careful."}, {"tr": "\"OK\" işareti bazı ülkelerde hakarettir, bunu araştırmalısın.", "en": "The \"OK\" sign is an insult in some countries; you should research this."}, {"tr": "Kültür şoku yaşayabilirsin, bu normal.", "en": "You may experience culture shock; this is normal."}, {"tr": "Kendine zaman tanımalısın, hemen adapte olmayı beklememelisin.", "en": "You should give yourself time; you shouldn't expect to adapt immediately."}, {"tr": "Yalnızlık hissi normaldir, bununla başa çıkmak için stratejin olmalı.", "en": "The feeling of loneliness is normal; you should have a strategy to cope with it."}, {"tr": "Psikolojik destek almaktan utanmamalısın.", "en": "You shouldn't be ashamed of getting psychological support."}, {"tr": "Vatan hasreti çekersen Türk yemekleri yapan bir restoran bulmalısın.", "en": "If you feel homesick, you should find a restaurant that makes Turkish food."}, {"tr": "Online Türk marketlerinden sipariş verebilirsin.", "en": "You can order from online Turkish markets."}, {"tr": "Ama yerel kültürün içine girmeye çalışmak daha iyidir.", "en": "But it's better to try to immerse yourself in the local culture."}, {"tr": "Türk derneklerini ziyaret et, sana yardımcı olurlar.", "en": "You should visit Turkish associations; they will help you."}, {"tr": "Ama sadece Türklerle takılırsan dil öğrenemezsin.", "en": "But if you only hang out with Turks, you can't learn the language."}, {"tr": "Dengeyi kurmalısın, hem kendi kültürünü yaşat hem yeni kültürü öğren.", "en": "You should strike a balance; keep your own culture alive and learn the new one."}, {"tr": "Entegrasyon asimilasyon değildir, bunu unutma.", "en": "Integration is not assimilation; don't forget this."}, {"tr": "Kendi değerlerini kaybetmeden uyum sağlamalısın.", "en": "You should adapt without losing your own values."}, {"tr": "En önemli tavsiyem: Açık fikirli ol.", "en": "My most important advice: Be open-minded."}, {"tr": "Önyargılarınla gitme, her şeyi yaşa ve gör.", "en": "Don't go with your prejudices; live and see everything."}, {"tr": "Seyahat etmek, okumaktır.", "en": "Traveling is reading."}, {"tr": "Yurt dışına çıkmak, dünyayı sınıf yapmaktır.", "en": "Going abroad is making the world your classroom."}, {"tr": "Bu yüzden korkma, sadece hazırlan ve git.", "en": "So don't be afraid, just prepare and go."}, {"tr": "Hayat cesurlara güler.", "en": "Life smiles at the brave."}, {"tr": "Ve şimdi bu tavsiyeleri dinleyip harekete geçme zamanı.", "en": "And now it's time to take action by listening to this advice."}], "aktivite": "**Sabah (30 dk): Göçmen Rehberi**<br>- \"Yurt dışına taşınacak birine 20 tavsiyem\" listesi yaz.<br>- should/had better/ought to/must/have to kullan.<br><br>**Öğlen (30 dk): Kültürel Farkındalık**<br>- \"In my culture, you should... but in other cultures, you shouldn't...\" yapısıyla kültürel farkları anlatan 15 cümle yaz.<br><br>**Akşam (45 dk): \"My Advice for Expats\" Konuşması**<br>- 2-3 dakikalık \"Yeni bir ülkeye taşınacaklara tavsiyelerim\" konuşması.<br>- Modalları bolca kullan.<br>- Ses kaydı al."}, {"dayNum": "46", "title": "Clauses of Contrast (although/despite/in spite of)", "gramerDesc": "Bu günün gramer yapısını çalışacağız.", "kaliplar": [{"en": "Although I miss home, I'm happy here.", "tr": "Evimi özlememe rağmen burada mutluyum."}, {"en": "Despite the difficulties, I adapted.", "tr": "Zorluklara rağmen uyum sağladım."}, {"en": "In spite of not knowing the language, I managed.", "tr": "Dili bilmememe rağmen başardım."}, {"en": "Even though it was challenging, I never gave up.", "tr": "Zorlayıcı olmasına rağmen asla pes etmedim."}, {"en": "The city is expensive. However, the quality of life is high.", "tr": "Şehir pahalı. Bununla birlikte hayat kalitesi yüksek."}, {"en": "Though I was scared, I took the step.", "tr": "Korkmama rağmen adımı attım."}, {"en": "While I enjoy my new life, I still miss my old friends.", "tr": "Yeni hayatımdan keyif almama rağmen eski arkadaşlarımı özlüyorum."}, {"en": "Despite the culture shock, I feel at home now.", "tr": "Kültür şokuna rağmen şimdi kendimi evimde hissediyorum."}, {"en": "In spite of all the paperwork, it was worth it.", "tr": "Bütün evrak işlerine rağmen değdi."}, {"en": "Although it took time, I made new friends.", "tr": "Zaman almasına rağmen yeni arkadaşlar edindim."}], "kelimeler": [{"en": "although", "tr": "...-e rağmen", "ex": "Although it was hard..."}, {"en": "though", "tr": "...-e rağmen", "ex": "Though I was tired..."}, {"en": "even though", "tr": "...-e rağmen (vurgulu)", "ex": "Even though it rained..."}, {"en": "despite", "tr": "...-e rağmen (+ isim)", "ex": "Despite the rain..."}, {"en": "in spite of", "tr": "...-e rağmen (+ isim)", "ex": "In spite of difficulties..."}, {"en": "however", "tr": "bununla birlikte", "ex": "It was hard; however, I did it."}, {"en": "nevertheless", "tr": "yine de/buna rağmen", "ex": "It was hard; nevertheless, I did it."}, {"en": "nonetheless", "tr": "her şeye rağmen", "ex": "It was hard; nonetheless, I tried."}, {"en": "yet", "tr": "yine de (ama)", "ex": "It's hard, yet I love it."}, {"en": "still", "tr": "hâlâ/yine de", "ex": "It's hard; still, I continue."}, {"en": "on the one hand", "tr": "bir yandan", "ex": "On one hand, it's hard."}, {"en": "on the other hand", "tr": "diğer yandan", "ex": "On the other hand, it's fun."}, {"en": "while", "tr": "-iken / -e rağmen", "ex": "While it's hard, it's fun."}, {"en": "whereas", "tr": "oysa/halbuki", "ex": "I like tea, whereas he likes coffee."}, {"en": "unlike", "tr": "-den farklı olarak", "ex": "Unlike my friends, I adapted fast."}, {"en": "instead of", "tr": "-yerine", "ex": "Instead of complaining, I adapted."}, {"en": "rather than", "tr": "-mektense", "ex": "Rather than giving up, I fought."}, {"en": "overcome", "tr": "üstesinden gelmek", "ex": "I overcame the challenges."}, {"en": "struggle", "tr": "mücadele etmek", "ex": "I struggled but learned."}, {"en": "cope with", "tr": "başa çıkmak", "ex": "I coped with the stress."}], "cumleler": [{"tr": "Evimi özlememe rağmen burada mutluyum.", "en": "Although I miss home, I'm happy here."}, {"tr": "Zorluklara rağmen uyum sağladım.", "en": "Despite the difficulties, I adapted."}, {"tr": "Dili bilmememe rağmen başardım.", "en": "In spite of not knowing the language, I managed."}, {"tr": "Zorlayıcı olmasına rağmen asla pes etmedim.", "en": "Even though it was challenging, I never gave up."}, {"tr": "Şehir pahalı. Bununla birlikte hayat kalitesi yüksek.", "en": "The city is expensive. However, the quality of life is high."}, {"tr": "Korkmama rağmen adımı attım.", "en": "Though I was scared, I took the step."}, {"tr": "Yeni hayatımdan keyif almama rağmen eski arkadaşlarımı özlüyorum.", "en": "While I enjoy my new life, I still miss my old friends."}, {"tr": "Kültür şokuna rağmen şimdi kendimi evimde hissediyorum.", "en": "Despite the culture shock, I feel at home now."}, {"tr": "Bütün evrak işlerine rağmen değdi.", "en": "In spite of all the paperwork, it was worth it."}, {"tr": "Zaman almasına rağmen yeni arkadaşlar edindim.", "en": "Although it took time, I made new friends."}, {"tr": "Yağmur yağmasına rağmen dışarı çıktık.", "en": "Although it was raining, we went out."}, {"tr": "Hava soğuk olmasına rağmen yürüdüm.", "en": "Despite the cold weather, I walked."}, {"tr": "Yorgun olmama rağmen çalıştım.", "en": "In spite of being tired, I worked."}, {"tr": "Pahalı olmasına rağmen aldım.", "en": "Even though it was expensive, I bought it."}, {"tr": "Zor bir dönemdi; yine de mutluydum.", "en": "It was a hard period; nonetheless, I was happy."}, {"tr": "İngilizce zor; bununla birlikte çok eğlenceli.", "en": "English is hard; however, it's a lot of fun."}, {"tr": "Yalnızdım; yine de güçlüydüm.", "en": "I was alone; nevertheless, I was strong."}, {"tr": "Param azdı; her şeye rağmen hayatta kaldım.", "en": "I had little money; nonetheless, I survived."}, {"tr": "Dil bilmiyordum; oysa şimdi akıcı konuşuyorum.", "en": "I didn't know the language; whereas now I speak it fluently."}, {"tr": "Arkadaşlarım geri döndü, bense kaldım.", "en": "My friends returned, whereas I stayed."}, {"tr": "Şikayet etmek yerine çözüm aradım.", "en": "Instead of complaining, I looked for solutions."}, {"tr": "Vazgeçmektense savaştım.", "en": "Rather than giving up, I fought."}, {"tr": "Zorluklara rağmen gülümsemeyi başardım.", "en": "I managed to smile despite the difficulties."}, {"tr": "Alışık olmamama rağmen yemeği beğendim.", "en": "Although I wasn't used to it, I liked the food."}, {"tr": "Birçok hata yaptıysam da öğrendim.", "en": "Even though I made many mistakes, I learned."}, {"tr": "Sıcak olmasına rağmen ceket giydim.", "en": "Though it was hot, I wore a jacket."}, {"tr": "Sistemi anlamadıysam da sormaktan çekinmedim.", "en": "Although I didn't understand the system, I didn't hesitate to ask."}, {"tr": "Mesafeye rağmen dostluğumuz sürdü.", "en": "Our friendship continued despite the distance."}, {"tr": "İnternet kötüydü; yine de bağlandım.", "en": "The internet was bad; yet, I connected."}, {"tr": "Uçağı kaçırdım; bununla birlikte ertesi gün gidebildim.", "en": "I missed the plane; however, I could go the next day."}, {"tr": "Kültür farklılıkları vardı; buna rağmen anlaştık.", "en": "There were cultural differences; still, we got along."}, {"tr": "İlk başta zorlandım; ne var ki zamanla alıştım.", "en": "I struggled at first; however, I got used to it over time."}, {"tr": "Gürültüye rağmen uyudum.", "en": "In spite of the noise, I slept."}, {"tr": "Geç kalmasına rağmen onu bekledim.", "en": "Even though he/she was late, I waited for him/her."}, {"tr": "Paraya ihtiyacım olmasına rağmen yardım istemedim.", "en": "Although I needed money, I didn't ask for help."}, {"tr": "Gururuma rağmen özür diledim.", "en": "Despite my pride, I apologized."}, {"tr": "Korkusuna rağmen uçağa bindi.", "en": "In spite of his/her fear, he/she boarded the plane."}, {"tr": "Yalnızlığa rağmen mutlu olmayı öğrendim.", "en": "I learned to be happy despite loneliness."}, {"tr": "İmkanların kısıtlı olmasına rağmen başarılı oldum.", "en": "I succeeded even though the opportunities were limited."}, {"tr": "Hava muhalefetine rağmen yola çıktık.", "en": "We set off despite the bad weather."}, {"tr": "Uyarılara rağmen dinlemedi.", "en": "He/She didn't listen in spite of the warnings."}, {"tr": "Bütün engellere rağmen zirveye ulaştım.", "en": "I reached the top despite all the obstacles."}, {"tr": "Kendime olan inancımı hiç kaybetmedim; her şeye rağmen.", "en": "I never lost my faith in myself; despite everything."}, {"tr": "İnsanların ne dediğine rağmen yoluma devam ettim.", "en": "I continued on my path regardless of what people said."}, {"tr": "Düşüncelerim farklı; bununla birlikte saygılıyım.", "en": "My opinions are different; however, I am respectful."}, {"tr": "Sevmedim; yine de denedim.", "en": "I didn't like it; nevertheless, I tried."}, {"tr": "İngilizce bilmiyordum, şimdi ise 4000'den fazla cümle yazdım.", "en": "I didn't know English, whereas now I have written more than 4000 sentences."}, {"tr": "Vazgeçmek kolaydı oysa ben zoru seçtim.", "en": "Giving up was easy, whereas I chose the hard path."}, {"tr": "Pişman olmaktansa denemeyi seçtim.", "en": "Rather than regretting, I chose to try."}, {"tr": "Ve iyi ki de yapmışım.", "en": "And I'm glad I did."}, {"tr": "Ne kadar çok çalışsam da sanki yetmiyor.", "en": "However much I work, it feels like it's not enough. (Complex contrast)"}, {"tr": "Hangi ülkeye gidersen git, insan aynı insandır.", "en": "Wherever you go, people are the same."}, {"tr": "Ne olursa olsun ben buradayım.", "en": "No matter what happens, I am here."}, {"tr": "Her ne kadar zor olsa da bu dili öğreneceğim.", "en": "Difficult though it may be, I will learn this language."}, {"tr": "Parası olmasına rağmen mutlu değildi.", "en": "Rich as he was, he was not happy."}, {"tr": "Hayat ne kadar zor olursa olsun güzel.", "en": "However hard life is, it's beautiful."}, {"tr": "İstediğin kadar dene, vazgeçmediğin sürece başarırsın.", "en": "Try as much as you want; you will succeed as long as you don't give up."}, {"tr": "Uyum sağlamak zor; bununla birlikte imkansız değil.", "en": "Adapting is hard; nonetheless, it's not impossible."}, {"tr": "Dil öğrenmek zaman alır, bununla birlikte imkansız değildir.", "en": "Learning a language takes time; however, it's not impossible."}, {"tr": "Kültür şoku kaçınılmazdır; fakat üstesinden gelinebilir.", "en": "Culture shock is inevitable; yet it can be overcome."}, {"tr": "Yalnızlık hissi normaldir; oysa yalnız değilsindir.", "en": "The feeling of loneliness is normal; whereas you are not alone."}, {"tr": "Yeni bir ülkeye taşınmak cesaret ister, ne var ki pişman olmazsınız.", "en": "Moving to a new country requires courage; however, you won't regret it."}, {"tr": "Her şeye rağmen hayat devam ediyor.", "en": "Life goes on despite everything."}, {"tr": "Tüm olumsuzluklara rağmen umut var.", "en": "In spite of all the negativity, there is hope."}, {"tr": "Düşüncelerimiz farklı olabilir; yine de arkadaş kalabiliriz.", "en": "Our opinions may differ; still, we can remain friends."}, {"tr": "İstanbul pahalı olmasına rağmen yaşamaya değer.", "en": "Although Istanbul is expensive, it's worth living."}, {"tr": "Londra gri olmasına rağmen enerjisi yüksektir.", "en": "Though London is grey, its energy is high."}, {"tr": "Berlin soğuk olmasına rağmen insanları sıcaktır.", "en": "Despite Berlin being cold, its people are warm."}, {"tr": "Göçmen olmak zor; bununla birlikte insanı güçlendirir.", "en": "Being an immigrant is hard; nevertheless, it strengthens you."}, {"tr": "İki kültür arasında kalmak yorucu; fakat zenginleştirici.", "en": "Staying between two cultures is tiring; however, it's enriching."}, {"tr": "Anavatan özlemi çekmene rağmen yeni vatanını seversin.", "en": "In spite of missing your homeland, you love your new home."}, {"tr": "Bayramlarda için burkulur; yine de kutlarsın.", "en": "Your heart aches on holidays; nonetheless, you celebrate."}, {"tr": "Onların dilini konuşamazken şimdi rüyalarını görüyorsun.", "en": "Whereas you couldn't speak their language, now you dream in it."}, {"tr": "Dün yabancıydın, bugün buralısın.", "en": "Yesterday you were a stranger, whereas today you belong."}, {"tr": "Tüm zorluklara rağmen iyi ki gelmişim diyorsun.", "en": "Despite all the difficulties, you say, \"I'm glad I came.\""}, {"tr": "Keşke daha önce gelsem demek yerine iyi ki geldim diyorsun.", "en": "Instead of saying \"I wish I had come earlier,\" you say \"I'm glad I came.\""}, {"tr": "Ve bu his her şeye değer.", "en": "And this feeling is worth everything."}, {"tr": "Göçmenlik bir yolculuktur, varış noktası değil.", "en": "Immigration is a journey, not a destination."}, {"tr": "Kendini sürekli geliştirdiğin bir süreçtir.", "en": "It is a process in which you constantly improve yourself."}, {"tr": "Ve bu sürecin sonunda bambaşka biri olursun.", "en": "And at the end of this process, you become a completely different person."}, {"tr": "Ama özünde aynı kalırsın.", "en": "But at your core, you remain the same."}, {"tr": "Köklerin sağlam olmasına rağmen dalların rüzgarda salınır.", "en": "Although your roots are strong, your branches sway in the wind."}, {"tr": "Ve bu güzeldir.", "en": "And this is beautiful."}, {"tr": "Çünkü değişim büyümektir.", "en": "Because change is growth."}, {"tr": "Değişime direnmek yerine kucakla.", "en": "Instead of resisting change, embrace it."}, {"tr": "Hayat sana ne getirirse getirsin, gülümse.", "en": "Whatever life brings you, smile."}, {"tr": "Ne kadar zor olursa olsun, geçecek.", "en": "However hard it is, it will pass."}, {"tr": "Karanlık ne kadar yoğun olursa olsun, güneş doğacak.", "en": "However intense the darkness is, the sun will rise."}, {"tr": "Tüm bunlara rağmen umut hep var.", "en": "Despite all this, hope is always there."}, {"tr": "Ben bu yolculukta zorlandım; yine de devam ettim.", "en": "I struggled on this journey; yet I continued."}, {"tr": "Ağladığım geceler oldu; fakat sabah hep güldüm.", "en": "There were nights I cried; however, I always smiled in the morning."}, {"tr": "Vazgeçmeyi düşündüm; ne var ki devam ettim.", "en": "I thought about giving up; nevertheless, I continued."}, {"tr": "Zordu; yine de değdi.", "en": "It was hard; still, it was worth it."}, {"tr": "Bu cümlelerin sonuna yaklaşıyoruz; oysa yolculuğumuz devam ediyor.", "en": "We are approaching the end of these sentences; whereas our journey continues."}, {"tr": "Bugün 46. gün, her şeye rağmen buradayım.", "en": "Today is the 46th day; I'm here despite everything."}, {"tr": "İngilizce bilmezken şimdi yazıyorum; ne büyük değişim.", "en": "I didn't know English, whereas now I'm writing; what a big change."}, {"tr": "Oysa başlamak ne zordu.", "en": "Yet starting was so hard."}, {"tr": "Ama başladım ve devam ediyorum.", "en": "But I started and I'm continuing."}, {"tr": "Zorluklara rağmen vazgeçmedim.", "en": "Despite the difficulties, I didn't give up."}, {"tr": "Ve bu benim en büyük zaferim.", "en": "And this is my greatest victory."}], "aktivite": "**Sabah (30 dk): Zıtlık Yazma**<br>- \"Yurt dışına taşınmak: olumlu ve olumsuz yanları\" konulu 15 although/despite cümlesi yaz.<br>- \"Although it's hard, it's worth it.\" gibi.<br><br>**Öğlen (30 dk): Dönüştürme Pratiği**<br>- 10 cümleyi \"But\" ile yaz, sonra \"although/despite/however\" ile yeniden yaz.<br>- Örnek: \"It was hard. I did it.\" → \"Although it was hard, I did it.\"<br><br>**Akşam (45 dk): \"The Bright Side of Immigration\" Konuşması**<br>- 2-3 dakikalık konuşma.<br>- Göçmenliğin zorluklarına rağmen güzelliklerini anlat.<br>- although, despite, however kullan.<br>- Ses kaydı al."}, {"dayNum": "47", "title": "Expressing Expectations (be supposed to / be expected to)", "gramerDesc": "Bu günün gramer yapısını çalışacağız.", "kaliplar": [{"en": "I'm supposed to arrive on Monday.", "tr": "Pazartesi günü varmam gerekiyor/bekleniyor."}, {"en": "You are expected to adapt quickly.", "tr": "Hızlı uyum sağlaman beklenir."}, {"en": "The meeting is supposed to start at 9.", "tr": "Toplantının 9'da başlaması gerekiyor."}, {"en": "Am I supposed to tip here?", "tr": "Burada bahşiş vermem gerekiyor mu?"}, {"en": "You are not supposed to take photos in the museum.", "tr": "Müzede fotoğraf çekmemen gerekiyor."}, {"en": "Employees are expected to be on time.", "tr": "Çalışanlardan dakik olması beklenir."}, {"en": "What's expected of me in this role?", "tr": "Bu rolde benden ne bekleniyor?"}, {"en": "Is it supposed to rain today?", "tr": "Bugün yağmur yağması bekleniyor mu?"}, {"en": "He was supposed to call me, but he didn't.", "tr": "Beni araması gerekiyordu ama aramadı."}, {"en": "The new system is expected to increase efficiency.", "tr": "Yeni sistemin verimliliği artırması bekleniyor."}], "kelimeler": [{"en": "supposed to", "tr": "-mesi gerekmek", "ex": "I'm supposed to be there."}, {"en": "expected to", "tr": "-mesi beklenmek", "ex": "You're expected to adapt."}, {"en": "meant to", "tr": "amacı olmak", "ex": "It's meant to help."}, {"en": "required to", "tr": "-mek zorunda olmak", "ex": "You're required to attend."}, {"en": "allowed to", "tr": "-me izni olmak", "ex": "You're allowed to enter."}, {"en": "permitted to", "tr": "izinli olmak", "ex": "It's permitted to smoke."}, {"en": "forbidden to", "tr": "yasak olmak", "ex": "It's forbidden to enter."}, {"en": "norm", "tr": "norm/kural", "ex": "It's the norm here."}, {"en": "custom", "tr": "gelenek", "ex": "Local customs."}, {"en": "etiquette", "tr": "görgü kuralı", "ex": "Business etiquette."}, {"en": "rude", "tr": "kaba", "ex": "It's considered rude."}, {"en": "polite", "tr": "kibar", "ex": "It's polite to say thank you."}, {"en": "appropriate", "tr": "uygun", "ex": "It's appropriate to dress well."}, {"en": "inappropriate", "tr": "uygunsuz", "ex": "Shorts are inappropriate."}, {"en": "common", "tr": "yaygın", "ex": "It's common to tip."}, {"en": "typical", "tr": "tipik", "ex": "Typical behavior."}, {"en": "standard", "tr": "standart", "ex": "Standard procedure."}, {"en": "regulation", "tr": "yönetmelik", "ex": "Regulations require it."}, {"en": "policy", "tr": "politika/kural", "ex": "Company policy."}, {"en": "procedure", "tr": "prosedür", "ex": "Follow the procedure."}], "cumleler": [{"tr": "Pazartesi günü varmam gerekiyor.", "en": "I'm supposed to arrive on Monday."}, {"tr": "Hızlı uyum sağlaman beklenir.", "en": "You are expected to adapt quickly."}, {"tr": "Toplantının 9'da başlaması gerekiyor.", "en": "The meeting is supposed to start at 9."}, {"tr": "Burada bahşiş vermem gerekiyor mu?", "en": "Am I supposed to tip here?"}, {"tr": "Müzede fotoğraf çekmemen gerekiyor.", "en": "You are not supposed to take photos in the museum."}, {"tr": "Çalışanlardan dakik olması beklenir.", "en": "Employees are expected to be on time."}, {"tr": "Bu rolde benden ne bekleniyor?", "en": "What's expected of me in this role?"}, {"tr": "Bugün yağmur yağması bekleniyor mu?", "en": "Is it supposed to rain today?"}, {"tr": "Beni araması gerekiyordu ama aramadı.", "en": "He was supposed to call me, but he didn't."}, {"tr": "Yeni sistemin verimliliği artırması bekleniyor.", "en": "The new system is expected to increase efficiency."}, {"tr": "Saat 5'te orada olmam bekleniyor.", "en": "I'm expected to be there at 5."}, {"tr": "Bu evrakı doldurmam gerekiyor mu?", "en": "Am I supposed to fill out this form?"}, {"tr": "İşe başlamam gerekiyordu ama evraklar gecikti.", "en": "I was supposed to start work, but the paperwork was delayed."}, {"tr": "Vizenin iki hafta içinde çıkması bekleniyor.", "en": "The visa is expected to be approved within two weeks."}, {"tr": "Burada ayakkabı çıkarmam gerekiyor mu?", "en": "Am I supposed to take off my shoes here?"}, {"tr": "Onun gelmesi beklenmiyordu.", "en": "He wasn't expected to come."}, {"tr": "Projenin bitmesi gerekiyordu ama uzadı.", "en": "The project was supposed to finish, but it dragged on."}, {"tr": "Havaalanında karşılanmam gerekiyordu.", "en": "I was supposed to be met at the airport."}, {"tr": "Bu ülkede trafik soldan akar, bilmem gerekirdi.", "en": "Traffic flows on the left in this country; I was supposed to know that."}, {"tr": "İş görüşmesinde takım elbise giymem beklenir mi?", "en": "Am I expected to wear a suit at the job interview?"}, {"tr": "Sigara içmek yasak, bunu bilmen gerekirdi.", "en": "Smoking is forbidden; you were supposed to know that."}, {"tr": "Sessiz olmamız gerekiyor, burası kütüphane.", "en": "We are supposed to be quiet; this is a library."}, {"tr": "Çocukların 18 yaşına kadar okula gitmesi beklenir.", "en": "Children are expected to go to school until they are 18."}, {"tr": "Yemekten sonra çay içilmesi gelenektendir.", "en": "It is the custom that tea is drunk after the meal."}, {"tr": "Bayramda büyüklerin elini öpmek bizde adettir.", "en": "It is our custom to kiss the hands of elders on holidays."}, {"tr": "Yurt dışındayken kendi geleneklerini yaşatman beklenmez ama saygı duyman beklenir.", "en": "You are not expected to maintain your own traditions abroad, but you are expected to respect others'."}, {"tr": "İlk gün oryantasyon olması gerekiyor.", "en": "There is supposed to be an orientation on the first day."}, {"tr": "Oryantasyonda bana şirketi tanıtmaları gerekiyordu ama yapmadılar.", "en": "They were supposed to introduce the company to me at orientation, but they didn't."}, {"tr": "İK'nın bana bir mentor ataması bekleniyordu.", "en": "HR was supposed to assign me a mentor."}, {"tr": "Maaşın ayın 1'inde yatması gerekiyor.", "en": "The salary is supposed to be deposited on the 1st of the month."}, {"tr": "Bugün izinli olabilir miyim, yoksa gelmem mi gerekiyor?", "en": "Can I take the day off today, or am I supposed to come?"}, {"tr": "Kültürler arası eğitim almam gerekiyormuş.", "en": "I was supposed to receive cross-cultural training."}, {"tr": "Yerel yönetim entegrasyon kursu açmış, katılmam bekleniyor.", "en": "The local government opened an integration course; I am expected to attend."}, {"tr": "Bu kursta neler öğretilmesi bekleniyormuş?", "en": "What were they supposed to teach in this course?"}, {"tr": "Vatandaşlık sınavına girmeden önce 100 saat ders almam gerekiyormuş.", "en": "I'm supposed to take 100 hours of classes before taking the citizenship exam."}, {"tr": "Sınavda bana tarih sorulması bekleniyor.", "en": "I am expected to be asked about history in the exam."}, {"tr": "\"Yeterince entegre olmadığınız\" denmesinden korkuyorum.", "en": "I'm afraid of being told \"you haven't integrated enough.\""}, {"tr": "Oysa dil öğrenmek için elimden geleni yaptım.", "en": "Whereas I did my best to learn the language."}, {"tr": "Daha ne yapmam gerekiyordu ki?", "en": "What more was I supposed to do?"}, {"tr": "Beni anlamaları gerekirdi.", "en": "They were supposed to understand me."}, {"tr": "Ama anlamadılar.", "en": "But they didn't."}, {"tr": "Yine de pes etmedim.", "en": "Still, I didn't give up."}, {"tr": "Kendimi kanıtlamam gerekiyordu.", "en": "I was supposed to prove myself."}, {"tr": "Ve kanıtladım.", "en": "And I did."}, {"tr": "Şimdi benden saygı duyulması bekleniyor.", "en": "Now I am expected to be respected."}, {"tr": "Oysa ben sadece eşitlik istiyorum.", "en": "Whereas I just want equality."}, {"tr": "Yabancı olarak etiketlenmekten bıktım.", "en": "I'm tired of being labeled as a foreigner."}, {"tr": "\"Geri dön\" denmesini bekliyorsun bazen.", "en": "You sometimes expect to be told \"go back.\""}, {"tr": "Ama ben burayı seçtim, burası benim evim.", "en": "But I chose this place; this is my home."}, {"tr": "Ve beni kabul etmeleri gerekiyor.", "en": "And they are supposed to accept me."}, {"tr": "Japon kültüründe kartviziti iki elinizle vermeniz beklenir.", "en": "In Japanese culture, you are supposed to give your business card with both hands."}, {"tr": "Ortadoğu'da sol elle yemek yememen gerekir.", "en": "In the Middle East, you are not supposed to eat with your left hand."}, {"tr": "İskandinav ülkelerinde özel alana saygı duyulması beklenir.", "en": "In Scandinavian countries, private space is expected to be respected."}, {"tr": "İtalya'da yemekten sonra cappuccino söylememen gerekiyor.", "en": "In Italy, you are not supposed to order a cappuccino after a meal."}, {"tr": "Almanlar dakiklik bekler, 5 dakika geç kalmak kabalıktır.", "en": "Germans expect punctuality; being 5 minutes late is rude."}, {"tr": "Latin Amerika'da bir partiye tam zamanında gitmemen beklenir, geç gitmek adettendir.", "en": "In Latin America, you are not expected to go to a party exactly on time; being late is customary."}, {"tr": "Uzak Doğu'da \"hayır\" demek yerine \"belki\" demen beklenir.", "en": "In the Far East, you are expected to say \"maybe\" instead of \"no.\""}, {"tr": "İş yemeğinde hesabı kimin ödeyeceği kültürden kültüre değişir.", "en": "Who is supposed to pay the bill at a business meal varies from culture to culture."}, {"tr": "İngiltere'de kuyruğa saygı duyman beklenir, araya kaynayamazsın.", "en": "In England, you are expected to respect the queue; you can't cut in line."}, {"tr": "Hindistan'da bir tapınağa girerken ayakkabılarını çıkarman gerekir.", "en": "In India, you are supposed to take off your shoes when entering a temple."}, {"tr": "Çin'de hediye verirken kırmızı paket kâğıdı kullanman beklenir.", "en": "In China, you are expected to use red wrapping paper when giving a gift."}, {"tr": "Hediye saat alman uğursuzluk sayılır, bunu bilmen gerekirdi.", "en": "Buying a clock as a gift is considered bad luck; you were supposed to know that."}, {"tr": "Genel olarak ev sahibine çiçek götürmen beklenir.", "en": "In general, you are expected to bring flowers to the host."}, {"tr": "Ama krizantem almaman gerekir birçok Avrupa ülkesinde çünkü mezarlık çiçeğidir.", "en": "But you are not supposed to buy chrysanthemums in many European countries because they are funeral flowers."}, {"tr": "İş yerinde patronunla nasıl konuşman gerektiğini bilmelisin.", "en": "You should know how you are supposed to speak to your boss."}, {"tr": "Ona adıyla hitap etmen bekleniyor olabilir ya da soyadıyla.", "en": "You may be expected to address them by their first name or last name."}, {"tr": "E-mail'e \"Dear Sir/Madam\" diye başlaman gerekir resmi yazışmalarda.", "en": "You are supposed to start an email with \"Dear Sir/Madam\" in formal correspondence."}, {"tr": "Toplantıda söz almadan konuşmaman beklenir.", "en": "You are expected not to speak without taking the floor in a meeting."}, {"tr": "Fikrini söylemen beklenir ama haddini bilmen gerekir.", "en": "You are expected to share your opinion, but you need to know your limits."}, {"tr": "\"Ne düşünüyorsun?\" diye sorulması beklenir kültürüne göre.", "en": "You are expected to be asked \"What do you think?\" depending on the culture."}, {"tr": "Geri bildirim kültürü ülkeden ülkeye farklılık gösterir.", "en": "The feedback culture varies from country to country."}, {"tr": "Hollanda'da direkt olman beklenir, lafı dolandırmadan.", "en": "In the Netherlands, you are expected to be direct, without beating around the bush."}, {"tr": "Japonya'da ise aynı direktlik kaba bulunur.", "en": "In Japan, however, the same directness is considered rude."}, {"tr": "Ben neyin beklendiğini anlamaya çalışırken çok yoruldum.", "en": "I got very tired while trying to understand what was expected."}, {"tr": "\"Yanlış\" yapmaktan korktum hep.", "en": "I was always afraid of doing something \"wrong.\""}, {"tr": "Oysa kültür hata yapa yapa öğrenilmez mi?", "en": "But isn't culture learned by making mistakes?"}, {"tr": "\"Üzgünüm, bilmiyordum\" demeyi öğrendim.", "en": "I learned to say, \"Sorry, I didn't know.\""}, {"tr": "İnsanların anlayış göstermesi beklenir, değil mi?", "en": "People are expected to be understanding, aren't they?"}, {"tr": "Çoğu zaman gerçekten anlayışlılar.", "en": "Most of the time, they really are understanding."}, {"tr": "Sadece gülümseyip \"sorun değil\" demeleri gerekiyor.", "en": "They are just supposed to smile and say, \"no problem.\""}, {"tr": "Ve genelde öyle yapıyorlar.", "en": "And they usually do."}, {"tr": "İnsanlık her yerde aynı; sevgi, saygı, hoşgörü beklenir.", "en": "Humanity is the same everywhere; love, respect, tolerance are expected."}, {"tr": "Bunu anladığımda entegrasyonu çözdüm.", "en": "When I understood this, I solved integration."}, {"tr": "Entegrasyon bir yerin kuralına uymak değil, insanlığı bulmakmış.", "en": "Integration is not about obeying a place's rules, but about finding humanity."}, {"tr": "\"Nereden geliyorsun?\" sorusuna artık gülümseyerek cevap veriyorum.", "en": "I now answer the question \"Where are you from?\" with a smile."}, {"tr": "\"Buralıyım\" demem bekleniyor belki ama \"Türk'üm\" demekten gurur duyuyorum.", "en": "Maybe I'm expected to say \"I'm local,\" but I'm proud to say \"I'm Turkish.\""}, {"tr": "Çünkü köklerinle gurur duyman beklenir.", "en": "Because you are expected to be proud of your roots."}, {"tr": "Ve yeni vatanına da saygı duyman beklenir.", "en": "And you are expected to respect your new homeland too."}, {"tr": "İkisini birden yapabilirsin.", "en": "You can do both."}, {"tr": "Dünya vatandaşı olmak budur zaten.", "en": "This is what being a world citizen is."}, {"tr": "Bir ayağın Anadolu'da, bir ayağın Avrupa'da.", "en": "One foot in Anatolia, one foot in Europe."}, {"tr": "Kalbin ise evrensel değerlerde.", "en": "And your heart in universal values."}, {"tr": "Beklenen budur: İyi insan olman.", "en": "This is what is expected: For you to be a good person."}, {"tr": "Gerisi teferruat.", "en": "The rest is detail."}, {"tr": "Ben iyi insan olmaya çalışıyorum.", "en": "I'm trying to be a good person."}, {"tr": "Benden beklenen de bu olsun.", "en": "Let this be what is expected of me."}, {"tr": "Ve 47 günlük İngilizce yolculuğumda öğrendiğim en önemli şey:", "en": "And the most important thing I've learned in my 47-day English journey:"}, {"tr": "İngilizce sadece bir dil değil, bir köprü.", "en": "English is not just a language; it's a bridge."}, {"tr": "Bu köprüden geçmen bekleniyor.", "en": "You are expected to cross this bridge."}, {"tr": "Ve ben geçiyorum.", "en": "And I am crossing it."}], "aktivite": "**Sabah (30 dk): Kültürel Beklentiler Listesi**<br>- \"When visiting a new country, you are expected to...\" ile başlayan 20 kültürel davranış cümlesi yaz.<br><br>**Öğlen (30 dk): \"Am I supposed to...?\" Soruları**<br>- Yeni bir ülkede sorabileceğin 15 \"Am I supposed to...?\" sorusu yaz.<br>- Örnek: \"Am I supposed to tip? Am I supposed to take off my shoes?\"<br><br>**Akşam (45 dk): \"Cultural Expectations\" Konuşması**<br>- 2-3 dakikalık \"Bir ülkeye gitmeden önce bilmen gereken kültürel beklentiler\" konuşması.<br>- be supposed to / be expected to kullan.<br>- Ses kaydı al."}, {"dayNum": "48", "title": "All Future Forms Review + HAFTA 8 FİNAL", "gramerDesc": "Bu günün gramer yapısını çalışacağız.", "kaliplar": [{"en": "I will move abroad one day.", "tr": "Bir gün yurt dışına taşınacağım."}, {"en": "I'm going to apply for a visa next month.", "tr": "Gelecek ay vize başvurusu yapacağım."}, {"en": "I'm flying to London tomorrow.", "tr": "Yarın Londra'ya uçuyorum."}, {"en": "The plane leaves at 6 a.m.", "tr": "Uçak sabah 6'da kalkıyor."}, {"en": "I will be working there this time next year.", "tr": "Gelecek yıl bu zamanlar orada çalışıyor olacağım."}, {"en": "I will have learned the language by then.", "tr": "O zamana kadar dili öğrenmiş olacağım."}, {"en": "I'm about to start a new life.", "tr": "Yeni bir hayata başlamak üzereyim."}, {"en": "I'm supposed to arrive on Monday.", "tr": "Pazartesi varmam gerekiyor."}, {"en": "The conference is to be held in July.", "tr": "Konferans Temmuz'da yapılacak."}, {"en": "By 2030, I will have been living abroad for years.", "tr": "2030'a kadar yıllardır yurt dışında yaşıyor olacağım."}], "kelimeler": [{"en": "plan", "tr": "planlamak", "ex": "I'm planning to move."}, {"en": "intend", "tr": "niyet etmek", "ex": "I intend to stay."}, {"en": "aim", "tr": "hedeflemek", "ex": "I aim to learn English."}, {"en": "dream", "tr": "hayal etmek", "ex": "I dream of living abroad."}, {"en": "decide", "tr": "karar vermek", "ex": "I've decided to go."}, {"en": "prepare", "tr": "hazırlanmak", "ex": "I'm preparing documents."}, {"en": "arrange", "tr": "düzenlemek", "ex": "I've arranged accommodation."}, {"en": "book", "tr": "rezerve etmek", "ex": "I've booked a flight."}, {"en": "confirm", "tr": "onaylamak", "ex": "I've confirmed attendance."}, {"en": "postpone", "tr": "ertelemek", "ex": "The trip was postponed."}, {"en": "cancel", "tr": "iptal etmek", "ex": "The flight was cancelled."}, {"en": "schedule", "tr": "planlamak/ takvim", "ex": "It's scheduled for Monday."}, {"en": "predict", "tr": "tahmin etmek", "ex": "I predict success."}, {"en": "expect", "tr": "beklemek", "ex": "I expect to arrive soon."}, {"en": "hope", "tr": "ummak", "ex": "I hope to see you there."}, {"en": "look forward to", "tr": "dört gözle beklemek", "ex": "I look forward to it."}, {"en": "eventually", "tr": "eninde sonunda", "ex": "I'll get there eventually."}, {"en": "sooner or later", "tr": "er ya da geç", "ex": "Sooner or later, I'll go."}, {"en": "by", "tr": "-e kadar (zamansal)", "ex": "I'll be there by 5."}, {"en": "within", "tr": "içinde (süre)", "ex": "Within a year, I'll adapt."}], "cumleler": [{"tr": "Bir gün yurt dışına taşınacağım.", "en": "I will move abroad one day."}, {"tr": "Gelecek ay vize başvurusu yapacağım.", "en": "I'm going to apply for a visa next month."}, {"tr": "Yarın Londra'ya uçuyorum.", "en": "I'm flying to London tomorrow."}, {"tr": "Uçak sabah 6'da kalkıyor.", "en": "The plane leaves at 6 a.m."}, {"tr": "Gelecek yıl bu zamanlar orada çalışıyor olacağım.", "en": "This time next year, I will be working there."}, {"tr": "O zamana kadar dili öğrenmiş olacağım.", "en": "I will have learned the language by then."}, {"tr": "Yeni bir hayata başlamak üzereyim.", "en": "I'm about to start a new life."}, {"tr": "Pazartesi varmam gerekiyor.", "en": "I'm supposed to arrive on Monday."}, {"tr": "Konferans Temmuz'da yapılacak.", "en": "The conference is to be held in July."}, {"tr": "2030'a kadar yıllardır yurt dışında yaşıyor olacağım.", "en": "By 2030, I will have been living abroad for years."}, {"tr": "Sanırım ilk yıl zor olacak.", "en": "I think the first year will be hard."}, {"tr": "Ama çabuk adapte olacağım.", "en": "But I'm going to adapt quickly."}, {"tr": "Yarın bu saatlerde mülakatta oluyor olacağım.", "en": "This time tomorrow, I'll be in an interview."}, {"tr": "Haftaya bu saatlerde sonucu öğrenmiş olacağım.", "en": "This time next week, I will have learned the result."}, {"tr": "Hazirana kadar kesinlikle taşınmış olacağım.", "en": "By June, I will have definitely moved."}, {"tr": "Taşınır taşınmaz sana adresimi atacağım.", "en": "As soon as I move, I'll send you my address."}, {"tr": "İlk maaşımı aldığımda aileme para göndereceğim.", "en": "When I get my first salary, I'll send money to my family."}, {"tr": "Vize onaylanır onaylanmaz bilet alacağım.", "en": "I'll buy a ticket as soon as the visa is approved."}, {"tr": "Bir aksilik olmazsa Temmuz'da oradayım.", "en": "If nothing goes wrong, I'll be there in July."}, {"tr": "İşler planladığım gibi giderse her şey hazır olacak.", "en": "If things go as planned, everything will be ready."}, {"tr": "Eğer vize geç çıkarsa planlarımı ertelemek indir.", "en": "Because dreams are meant to come true."}, {"tr": "Bu cümleyi okuduğun telefonun saati şu an kaç?", "en": "What time is it on the phone you're reading this sentence?"}, {"tr": "İleride o saatte ne yapıyor olmayı hayal ederdin?", "en": "What did you dream of doing at that time in the future?"}, {"tr": "İşte o an şimdi.", "en": "That moment is now."}, {"tr": "Gelecek sandığın geldi bile.", "en": "The future you thought of has already come."}, {"tr": "Şimdi sırada yeni gelecekler var.", "en": "Now there are new futures ahead."}, {"tr": "Onları da planla, hayal et ve başar.", "en": "Plan them, dream of them, and achieve them too."}, {"tr": "Ben 48 gün önce başladım ve şimdi buradayım.", "en": "I started 48 days ago and now I'm here."}, {"tr": "48 gün sonra sen de bambaşka bir yerde olacaksın.", "en": "In 48 days, you'll be in a completely different place too."}, {"tr": "İngilizcen çok daha iyi olacak.", "en": "Your English will be much better."}, {"tr": "Ve kendinle gurur duyuyor olacaksın.", "en": "And you'll be proud of yourself."}, {"tr": "Bu plana başladığımdan beri 48 gün geçti.", "en": "48 days have passed since I started this plan."}, {"tr": "48 gün önce gelecekten korkuyordum.", "en": "48 days ago, I was afraid of the future."}, {"tr": "Şimdi ise geleceğe meydan okuyorum.", "en": "Now I'm challenging the future."}, {"tr": "Gelecek benden korksun!", "en": "Let the future be afraid of me!"}, {"tr": "Ben hazırım, geliyorum!", "en": "I'm ready, I'm coming!"}, {"tr": "Yurt dışı beni bekliyor.", "en": "Abroad is waiting for me."}, {"tr": "Uçak biletleri kapıda.", "en": "Flight tickets are at the door."}, {"tr": "Pasaportumda vize etiketi var.", "en": "I have a visa sticker in my passport."}, {"tr": "Bavulum hazır, laptopumu koydum, İngilizce kitaplarımı koydum.", "en": "My suitcase is ready; I put in my laptop, my English books."}, {"tr": "En önemlisi, umudumu koydum.", "en": "Most importantly, I put my hope in."}, {"tr": "Umut, gittiğin her yerde sana
