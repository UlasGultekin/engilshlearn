klı biriyim.", "en": "I am experienced, disciplined, and results-oriented."}, {"tr": "Sektörde tanınan bir isim olmayı hedefliyorum.", "en": "I aim to become a recognized name in the sector."}, {"tr": "İş ahlakına çok önem veririm.", "en": "I place great importance on work ethics."}, {"tr": "Dürüstlük ve şeffaflık benim için önemlidir.", "en": "Honesty and transparency are important to me."}, {"tr": "Şirketinize değer katacak projelere imza atmak istiyorum.", "en": "I want to undertake projects that will add value to your company."}, {"tr": "Uzun vadeli düşünür, kısa vadede uygularım.", "en": "I think long-term and execute in the short term."}, {"tr": "\"Yapılamaz\" sözünü sevmem, \"nasıl yapılır\" diye sorarım.", "en": "I don't like the phrase \"It can't be done\"; I ask \"How can it be done?\""}, {"tr": "Çözüm odaklıyım, sorun değil.", "en": "I am solution-oriented, not problem-oriented."}, {"tr": "İş arkadaşlarımla uyum içinde çalışırım.", "en": "I work in harmony with my colleagues."}, {"tr": "Kısacası, ben doğru adayım.", "en": "In short, I am the right candidate."}, {"tr": "Kişisel markamı \"güvenilir, yenilikçi ve sonuç odaklı\" olarak tanımlıyorum.", "en": "I define my personal brand as \"reliable, innovative, and results-driven.\""}, {"tr": "Ben bir problem çözücüyüm; karmaşık sorunları basit çözümlere indirgerim.", "en": "I am a problem solver; I reduce complex problems to simple solutions."}, {"tr": "Liderlik felsefem \"insanlara ilham ver ve yollarını aç\" üzerine kurulu.", "en": "My leadership philosophy is built on \"inspire people and pave their way.\""}, {"tr": "Rakamlar benim hikayemi anlatır: 3 yılda %150 büyüme.", "en": "Numbers tell my story: 150% growth in 3 years."}, {"tr": "Bu başarıyı ekibimle birlikte kazandım.", "en": "I achieved this success together with my team."}, {"tr": "Bireysel başarıdan çok takım başarısına önem veririm.", "en": "I value team success over individual success."}, {"tr": "Sektör trendlerini yakından takip eder, kendimi sürekli güncellerim.", "en": "I closely follow sector trends and continuously update myself."}, {"tr": "Dijitalleşme çağında kendini yenilemeyen yok olur.", "en": "In the age of digitalization, those who don't renew themselves perish."}, {"tr": "Ben kendimi her gün yeniliyorum.", "en": "I renew myself every day."}, {"tr": "İngilizce öğrenme sürecim de bunun bir parçası.", "en": "My English learning process is also part of this."}, {"tr": "Bu dil sayesinde global düşünebiliyorum.", "en": "Thanks to this language, I can think globally."}, {"tr": "Artık sadece yerel değil, uluslararası bir profesyonelim.", "en": "I am now not just a local, but an international professional."}, {"tr": "İngilizce özgeçmişimle dünyanın her yerinde iş arayabilirim.", "en": "I can look for a job anywhere in the world with my English CV."}, {"tr": "Bu özgüveni bana bu plan verdi.", "en": "This plan gave me this confidence."}, {"tr": "Bugün 67. gün ve ben bir markayım.", "en": "Today is the 67th day and I am a brand."}, {"tr": "\"İngilizce bilen, disiplinli, azimli profesyonel.\"", "en": "\"A professional who knows English, is disciplined, and determined.\""}, {"tr": "LinkedIn profilimde bu hikayeyi anlatacağım.", "en": "I will tell this story on my LinkedIn profile."}, {"tr": "Mülakatta bu yolculuğu paylaşacağım.", "en": "I will share this journey in an interview."}, {"tr": "Çünkü bu sadece bir dil öğrenme hikayesi değil.", "en": "Because this is not just a language learning story."}, {"tr": "Bu bir karakter, azim ve başarı hikayesi.", "en": "This is a story of character, determination, and success."}, {"tr": "İşverenler hikayeleri sever.", "en": "Employers love stories."}, {"tr": "Ve benim anlatacak harika bir hikayem var.", "en": "And I have a great story to tell."}, {"tr": "Sadece 67 günde 6700 cümle yazarak İngilizce öğrendim.", "en": "I learned English by writing 6700 sentences in just 67 days."}, {"tr": "Bu hikaye benim özgeçmişimin en güçlü yanı.", "en": "This story is the strongest part of my CV."}, {"tr": "Çünkü azmi, disiplini ve öğrenme aşkını gösteriyor.", "en": "Because it shows determination, discipline, and love for learning."}, {"tr": "Ben sadece İngilizce bilen biri değilim.", "en": "I am not just someone who knows English."}, {"tr": "Ben imkansızı başaran biriyim.", "en": "I am someone who achieves the impossible."}, {"tr": "Ve şirketinize de aynı ruhu getireceğim.", "en": "And I will bring the same spirit to your company."}, {"tr": "Benimle çalışmak demek, azimle çalışan biriyle çalışmak demek.", "en": "Working with me means working with someone who works with determination."}, {"tr": "Pes etmeyen, çözüm arayan, sonuç alan biri.", "en": "Someone who doesn't give up, seeks solutions, gets results."}, {"tr": "İşte ben buyum.", "en": "That's who I am."}, {"tr": "Eğer bu profile uygun bir pozisyonunuz varsa...", "en": "If you have a position suitable for this profile..."}, {"tr": "Bana ulaşmaktan çekinmeyin.", "en": "Don't hesitate to contact me."}, {"tr": "Çünkü ben hazırım.", "en": "Because I am ready."}, {"tr": "11 haftalık İngilizce eğitimimi tamamladım.", "en": "I have completed my 11-week English training."}, {"tr": "Ve şimdi profesyonel hayata atılmaya hazırım.", "en": "And now I am ready to step into professional life."}, {"tr": "Bu plan sadece bir başlangıçtı.", "en": "This plan was just a beginning."}, {"tr": "Asıl başarı bundan sonra gelecek.", "en": "The real success will come after this."}, {"tr": "Çünkü İngilizce artık benim silahım.", "en": "Because English is now my weapon."}, {"tr": "Onunla savaşları kazanacağım.", "en": "I will win battles with it."}, {"tr": "Kariyer savaşlarımı, hayat savaşlarımı.", "en": "My career battles, my life battles."}, {"tr": "Ve hepsini kazanacağım.", "en": "And I will win them all."}, {"tr": "Çünkü kazananlar asla pes etmez.", "en": "Because winners never give up."}, {"tr": "Ben de pes etmedim.", "en": "I didn't give up either."}, {"tr": "Ve şimdi buradayım.", "en": "And here I am."}, {"tr": "67 günlük bir yolculuğun zirvesinde.", "en": "At the peak of a 67-day journey."}, {"tr": "Bu zirveden manzara harika.", "en": "The view from this peak is wonderful."}, {"tr": "Ama daha yüksek zirveler var.", "en": "But there are higher peaks."}, {"tr": "Onlara da tırmanacağım.", "en": "I will climb them too."}, {"tr": "12. haftanın 1. günü bitti. Son 5 gün! 🎯🔥", "en": "Day 1 of week 12 is over. Last 5 days! 🎯🔥"}], "aktivite": "**Sabah (30 dk): Elevator Pitch Yazımı**<br>- 30 saniyelik, 60 saniyelik ve 90 saniyelik elevator pitch yaz.<br>- Üçü de seni farklı uzunlukta profesyonel olarak tanıtsın.<br><br>**Öğlen (30 dk): LinkedIn Özeti**<br>- LinkedIn için İngilizce profesyonel özet yaz (150 kelime).<br>- \"I am a... / My expertise is... / I'm passionate about...\" kalıplarını kullan.<br><br>**Akşam (45 dk): \"My Professional Brand\" Konuşması**<br>- 2-3 dakikalık \"Kendimi profesyonel olarak nasıl tanımlarım?\" konuşması.<br>- Elevator pitch tarzı, güçlü ve etkileyici.<br>- Ses kaydı al."}, {"dayNum": "68", "title": "Handling Difficult Interview Questions (Zor Mülakat Soruları)", "gramerDesc": "Bu günün gramer yapısını çalışacağız.", "kaliplar": [{"en": "That's a great question. Let me think for a moment.", "tr": "Bu harika bir soru. Bir an düşüneyim."}, {"en": "I haven't faced that exact situation, but here's how I would handle it...", "tr": "Bu durumla tam olarak karşılaşmadım ama şöyle ele alırdım..."}, {"en": "To be honest, I made a mistake there, but here's what I learned...", "tr": "Dürüst olmak gerekirse orada bir hata yaptım ama işte öğrendiklerim..."}, {"en": "I would describe my weakness as impatience, but I've been working on it by...", "tr": "Zayıflığımı sabırsızlık olarak tanımlarım ama şu şekilde üzerinde çalışıyorum..."}, {"en": "My salary expectation is negotiable, based on the overall package.", "tr": "Maaş beklentim toplam pakete bağlı olarak görüşülebilir."}, {"en": "I left my previous job because I was looking for new challenges.", "tr": "Önceki işimden ayrıldım çünkü yeni zorluklar arıyordum."}, {"en": "I see this gap in my resume as an opportunity for growth.", "tr": "Özgeçmişimdeki bu boşluğu bir gelişim fırsatı olarak görüyorum."}, {"en": "If I were in that situation, I would first...", "tr": "O durumda olsaydım önce... yapardım."}, {"en": "I don't have experience in that specific area, but I'm a fast learner.", "tr": "O alanda deneyimim yok ama hızlı öğrenirim."}, {"en": "What I can bring to this role is my unique combination of...", "tr": "Bu role getirebileceğim şey... benzersiz kombinasyonumdur."}], "kelimeler": [{"en": "handle", "tr": "başa çıkmak/ele almak", "ex": "Handle a difficult question."}, {"en": "approach", "tr": "yaklaşım", "ex": "My approach would be..."}, {"en": "resolve", "tr": "çözmek", "ex": "Resolve a conflict."}, {"en": "cope with", "tr": "başa çıkmak", "ex": "Cope with stress."}, {"en": "conflict", "tr": "çatışma/anlaşmazlık", "ex": "Workplace conflict."}, {"en": "disagreement", "tr": "anlaşmazlık", "ex": "Professional disagreement."}, {"en": "mistake", "tr": "hata", "ex": "A costly mistake."}, {"en": "feedback", "tr": "geri bildirim", "ex": "Negative feedback."}, {"en": "criticism", "tr": "eleştiri", "ex": "Constructive criticism."}, {"en": "failure", "tr": "başarısızlık", "ex": "Learning from failure."}, {"en": "salary", "tr": "maaş", "ex": "Salary expectation."}, {"en": "compensation", "tr": "tazminat/ücret paketi", "ex": "Total compensation."}, {"en": "benefit", "tr": "yan hak", "ex": "Employee benefits."}, {"en": "negotiation", "tr": "müzakere", "ex": "Salary negotiation."}, {"en": "flexibility", "tr": "esneklik", "ex": "Work flexibility."}, {"en": "work-life balance", "tr": "iş-yaşam dengesi", "ex": "Healthy work-life balance."}, {"en": "remote", "tr": "uzaktan", "ex": "Remote work policy."}, {"en": "hybrid", "tr": "hibrit", "ex": "Hybrid model."}, {"en": "notice period", "tr": "ihbar süresi", "ex": "My notice period is..."}, {"en": "availability", "tr": "müsaitlik/uygunluk", "ex": "My availability is..."}], "cumleler": [{"tr": "Bu harika bir soru. Bir an düşüneyim.", "en": "That's a great question. Let me think for a moment."}, {"tr": "Bu durumla tam olarak karşılaşmadım ama şöyle ele alırdım...", "en": "I haven't faced that exact situation, but here's how I would handle it..."}, {"tr": "Orada bir hata yaptım ama işte öğrendiklerim...", "en": "I made a mistake there, but here's what I learned..."}, {"tr": "Zayıflığımı sabırsızlık olarak tanımlarım ama üzerinde çalışıyorum.", "en": "I would describe my weakness as impatience, but I've been working on it."}, {"tr": "Maaş beklentim toplam pakete bağlı olarak görüşülebilir.", "en": "My salary expectation is negotiable, based on the overall package."}, {"tr": "Önceki işimden yeni zorluklar aradığım için ayrıldım.", "en": "I left my previous job because I was looking for new challenges."}, {"tr": "Özgeçmişimdeki bu boşluğu bir gelişim fırsatı olarak görüyorum.", "en": "I see this gap in my resume as an opportunity for growth."}, {"tr": "O durumda olsaydım önce sakinleşir, sonra analiz ederdim.", "en": "If I were in that situation, I would first calm down, then analyze."}, {"tr": "O alanda deneyimim yok ama hızlı öğrenirim.", "en": "I don't have experience in that specific area, but I'm a fast learner."}, {"tr": "Bu role getirebileceğim şey eşsiz kombinasyonumdur.", "en": "What I can bring to this role is my unique combination."}, {"tr": "Neden işsiz kaldınız?", "en": "Why were you unemployed?"}, {"tr": "Doğru pozisyonu bulmak için zaman ayırdım.", "en": "I took time to find the right position."}, {"tr": "Neden sizi işe alalım?", "en": "Why should we hire you?"}, {"tr": "Çünkü ben sadece çalışan değil, değer katan ortağım.", "en": "Because I'm not just an employee, but a value-adding partner."}, {"tr": "En büyük başarısızlığınız neydi?", "en": "What was your biggest failure?"}, {"tr": "Büyük bir projeyi zamanında teslim edemedim ama ders aldım.", "en": "I couldn't deliver a big project on time, but I learned my lesson."}, {"tr": "Eski patronunuz sizi nasıl tanımlardı?", "en": "How would your former boss describe you?"}, {"tr": "Güvenilir, çalışkan ve çözüm odaklı olarak tanımlardı.", "en": "They would describe me as reliable, hardworking, and solution-oriented."}, {"tr": "Stresle nasıl başa çıkarsınız?", "en": "How do you cope with stress?"}, {"tr": "Nefes egzersizleri yapar ve önceliklendirme yaparım.", "en": "I do breathing exercises and prioritize."}, {"tr": "Bir iş arkadaşınızla anlaşmazlık yaşarsanız ne yaparsınız?", "en": "What would you do if you had a disagreement with a colleague?"}, {"tr": "Özel olarak konuşur, ortak zemin ararım.", "en": "I would talk privately and seek common ground."}, {"tr": "5 yıl sonra kendinizi nerede görüyorsunuz?", "en": "Where do you see yourself in 5 years?"}, {"tr": "Bu alanda lider bir pozisyonda kendimi görüyorum.", "en": "I see myself in a leadership position in this field."}, {"tr": "Neden bu kadar çok iş değiştirdiniz?", "en": "Why did you change jobs so often?"}, {"tr": "Her değişiklik bana yeni bir beceri kattı.", "en": "Each change added a new skill to me."}, {"tr": "Hiç yalan söylemek zorunda kaldınız mı?", "en": "Have you ever had to lie?"}, {"tr": "Dürüstlük benim için her zaman ön plandadır.", "en": "Honesty has always been a priority for me."}, {"tr": "Ekip çalışmasına uygun musunuz?", "en": "Are you a team player?"}, {"tr": "Evet, ama gerektiğinde bağımsız da çalışırım.", "en": "Yes, but I can also work independently when needed."}, {"tr": "Zamanında yetiştiremeyeceğiniz bir iş verilirse ne yaparsınız?", "en": "What would you do if given a job you can't finish on time?"}, {"tr": "Erken iletişim kurar ve yardım isterim.", "en": "I would communicate early and ask for help."}, {"tr": "Hiç işten çıkarıldınız mı?", "en": "Have you ever been fired?"}, {"tr": "Evet, ama bu bana çok şey öğretti.", "en": "Yes, but it taught me a lot."}, {"tr": "Neden bu şirketi seçtiniz?", "en": "Why did you choose this company?"}, {"tr": "Vizyonunuz ve değerleriniz benimkilerle örtüşüyor.", "en": "Your vision and values align with mine."}, {"tr": "En büyük motivasyon kaynağınız nedir?", "en": "What is your biggest source of motivation?"}, {"tr": "Gelişim görmek ve fark yaratmak.", "en": "Seeing progress and making a difference."}, {"tr": "Kendinize 1-10 arası puan verin.", "en": "Rate yourself from 1-10."}, {"tr": "8 veririm; her zaman gelişime açığım.", "en": "I'd give an 8; I'm always open to improvement."}, {"tr": "Zor bir müşteriyle nasıl başa çıkarsınız?", "en": "How would you handle a difficult customer?"}, {"tr": "Empati kurar, sorunu anlar ve çözüm sunarım.", "en": "I would empathize, understand the problem, and offer a solution."}, {"tr": "Son dakika değişikliklerine nasıl tepki verirsiniz?", "en": "How do you react to last-minute changes?"}, {"tr": "Sakin kalır ve öncelik sırasını yeniden belirlerim.", "en": "I stay calm and reprioritize."}, {"tr": "Bize neden katılmak istiyorsunuz?", "en": "Why do you want to join us?"}, {"tr": "Büyüme vizyonunuz ve yenilikçi kültürünüz için.", "en": "For your growth vision and innovative culture."}, {"tr": "En zayıf yönünüzü tek kelimeyle söyleyin.", "en": "Tell me your biggest weakness in one word."}, {"tr": "Mükemmeliyetçilik, ama üzerinde çalışıyorum.", "en": "Perfectionism, but I'm working on it."}, {"tr": "Bana sormamı istediğiniz bir soru var mı?", "en": "Is there a question you want me to ask?"}, {"tr": "Evet, \"Bu şirkette beni en çok ne şaşırtır?\"", "en": "Yes, \"What would surprise me the most in this company?\""}, {"tr": "Davranışsal mülakat sorularına STAR metoduyla cevap veririm.", "en": "I answer behavioral interview questions with the STAR method."}, {"tr": "STAR: Durum, Görev, Aksiyon, Sonuç.", "en": "STAR: Situation, Task, Action, Result."}, {"tr": "Durum: Projede bütçe aşımı vardı.", "en": "Situation: There was a budget overrun in the project."}, {"tr": "Görevim: Bütçeyi dengelemek ve projeyi kurtarmak.", "en": "Task: To balance the budget and save the project."}, {"tr": "Aksiyon: Gereksiz harcamaları kestim ve tedarikçilerle pazarlık yaptım.", "en": "Action: I cut unnecessary expenses and negotiated with suppliers."}, {"tr": "Sonuç: Bütçeyi %20 altında tamamladık.", "en": "Result: We completed it 20% under budget."}, {"tr": "İşte böyle somut cevaplar veririm.", "en": "That's how I give concrete answers."}, {"tr": "\"Hayalinizdeki iş nedir?\" diye sorsalar...", "en": "If they asked, \"What is your dream job?\""}, {"tr": "\"Yaptığım işte fark yaratabildiğim her iş\" derim.", "en": "I'd say, \"Any job where I can make a difference in what I do.\""}, {"tr": "\"Hiçbir sorunuz olmasa ne sorardınız?\" sorusu...", "en": "The question \"What would you ask if you had no questions?\""}, {"tr": "\"Şirket kültürünüzü bir hikayeyle anlatır mısınız?\" derdim.", "en": "I'd say, \"Could you describe your company culture with a story?\""}, {"tr": "Maaş pazarlığında piyasa araştırmamı yapmış olarak gelirim.", "en": "I come to salary negotiation having done my market research."}, {"tr": "\"Bu pozisyon için bütçe aralığınız nedir?\" diye sorarım.", "en": "I ask, \"What is your budget range for this position?\""}, {"tr": "İlk maaş teklifini hemen kabul etmem, nazikçe pazarlık yaparım.", "en": "I don't accept the first offer immediately; I negotiate politely."}, {"tr": "\"Yan haklar konusunda esneklik var mı?\" diye sorarım.", "en": "I ask, \"Is there flexibility regarding fringe benefits?\""}, {"tr": "Uzaktan çalışma politikasını detaylıca öğrenirim.", "en": "I learn about the remote work policy in detail."}, {"tr": "İhbar süremi ve başlama tarihimi netleştiririm.", "en": "I clarify my notice period and start date."}, {"tr": "Mülakat sonunda mutlaka teşekkür e-postası gönderirim.", "en": "I definitely send a thank-you email after the interview."}, {"tr": "24 saat içinde kısa ama etkili bir teşekkür maili atarım.", "en": "I send a short but effective thank-you email within 24 hours."}, {"tr": "Bu mailde neden o işi istediğimi bir kez daha vurgularım.", "en": "In this email, I emphasize once more why I want that job."}, {"tr": "Mülakat sırasında not almak izin isterim.", "en": "I ask for permission to take notes during the interview."}, {"tr": "\"Sakıncası yoksa not alabilir miyim?\" derim.", "en": "I say, \"Do you mind if I take notes?\""}, {"tr": "Bu profesyonel ve ilgili olduğumu gösterir.", "en": "This shows that I am professional and interested."}, {"tr": "Cevapları bilmiyorsam \"bilmiyorum ama öğrenirim\" derim.", "en": "If I don't know the answer, I say, \"I don't know, but I can learn.\""}, {"tr": "Yalan söylemektense bilmediğimi kabul etmek daha iyidir.", "en": "Admitting not knowing is better than lying."}, {"tr": "Görüşmeciyle göz teması kurarım.", "en": "I make eye contact with the interviewer."}, {"tr": "Beden dilime dikkat ederim.", "en": "I pay attention to my body language."}, {"tr": "Dik oturur, gülümserim.", "en": "I sit upright and smile."}, {"tr": "Ses tonumu kontrol ederim, çok hızlı konuşmam.", "en": "I control my tone of voice; I don't speak too fast."}, {"tr": "Gerekirse \"Tekrar edebilir misiniz?\" diye sorarım.", "en": "If needed, I ask, \"Could you repeat that?\""}, {"tr": "Anlamadığım soruyu açıklattırmaktan çekinmem.", "en": "I don't hesitate to ask for clarification on a question I didn't understand."}, {"tr": "Bu da İngilizcemin profesyonel olduğunu gösterir.", "en": "This also shows that my English is professional."}, {"tr": "Görüşme sonunda 2-3 akıllı soru sorarım.", "en": "I ask 2-3 smart questions at the end of the interview."}, {"tr": "\"Bu pozisyondaki birini ilk 3 ayda nasıl değerlendirirsiniz?\"", "en": "\"How would you evaluate someone in this position in the first 3 months?\""}, {"tr": "\"Ekibin şu anki en büyük zorluğu nedir?\"", "en": "\"What is the team's biggest challenge right now?\""}, {"tr": "Bu sorular stratejik düşündüğümü gösterir.", "en": "These questions show that I think strategically."}, {"tr": "İşte profesyonel bir mülakat böyle yapılır.", "en": "This is how a professional interview is done."}, {"tr": "Ve ben bunu İngilizce yapabiliyorum.", "en": "And I can do this in English."}, {"tr": "68 günde bu seviyeye geldim.", "en": "I reached this level in 68 days."}, {"tr": "Bu başlı başına bir özgeçmiş maddesidir.", "en": "This is a CV bullet point in itself."}, {"tr": "\"12 haftada İngilizce mülakat yapabilir seviyeye geldi.\"", "en": "\"Reached a level to do interviews in English in 12 weeks.\""}, {"tr": "Bunu özgeçmişime yazmaktan gurur duyarım.", "en": "I am proud to write this on my CV."}, {"tr": "Artık İngilizce mülakat benim için bir engel değil.", "en": "Now an English interview is not an obstacle for me."}, {"tr": "Aksine, gücümü göstereceğim bir fırsat.", "en": "On the contrary, it's an opportunity to show my strength."}, {"tr": "Soruları anlıyorum, cevaplıyorum, hatta şaka bile yapıyorum.", "en": "I understand questions, answer them, and even make jokes."}, {"tr": "\"Why did the developer go broke? Because he used up all his cache!\"", "en": "\"Geliştirici neden iflas etti? Çünkü tüm cache'ini kullanmış!\""}, {"tr": "Esprimi anladıysan İngilizcen gerçekten iyi!", "en": "If you got my joke, your English is really good!"}, {"tr": "68. günde İngilizce espri yapacak seviyedeyim.", "en": "I'm at a level to make jokes in English on day 68."}, {"tr": "Bu inanılmaz! 🎤", "en": "This is incredible! 🎤"}, {"tr": "Mülakat ustası oldum, sırada canlı pratik var! 💼", "en": "I've become an interview master; live practice is next! 💼"}], "aktivite": "**Sabah (30 dk): Zor Sorular Listesi**<br>- En korktuğun 10 mülakat sorusunu yaz ve her birine STAR metoduyla İngilizce cevap hazırla.<br><br>**Öğlen (30 dk): Maaş Pazarlığı Diyaloğu**<br>- Bir işe alım uzmanıyla maaş pazarlığı diyaloğu yaz (karşılıklı 15 cümle).<br><br>**Akşam (45 dk): \"Hell Interview\" Canlandırması**<br>- 3-4 dakikalık hayali bir \"zor mülakat\" canlandırması yap.<br>- Bir arkadaşın sana zor sorular sorsun, sen cevapla.<br>- Ses kaydı al."}, {"dayNum": "69", "title": "Real-Life Scenarios (Restaurant, Airport, Hospital)", "gramerDesc": "Bu günün gramer yapısını çalışacağız.", "kaliplar": [{"en": "I'd like to make a reservation for two, please.", "tr": "İki kişilik rezervasyon yaptırmak istiyorum lütfen."}, {"en": "Could I see the menu, please?", "tr": "Menüyü görebilir miyim lütfen?"}, {"en": "Where is the check-in counter for Turkish Airlines?", "tr": "Türk Hava Yolları check-in kontuarı nerede?"}, {"en": "I have a connecting flight to New York.", "tr": "New York'a aktarmalı uçuşum var."}, {"en": "I'd like to book an appointment with Dr. Smith.", "tr": "Dr. Smith'ten randevu almak istiyorum."}, {"en": "I've been feeling unwell since yesterday.", "tr": "Dünden beri kendimi iyi hissetmiyorum."}, {"en": "Can you recommend a local dish?", "tr": "Yerel bir yemek önerebilir misiniz?"}, {"en": "Is there a pharmacy nearby?", "tr": "Yakınlarda eczane var mı?"}, {"en": "Could you call a taxi for me, please?", "tr": "Benim için bir taksi çağırabilir misiniz lütfen?"}, {"en": "I think there's a mistake on my bill.", "tr": "Sanırım hesabımda bir yanlışlık var."}], "kelimeler": [{"en": "reservation", "tr": "rezervasyon", "ex": "Make a reservation."}, {"en": "menu", "tr": "menü", "ex": "See the menu."}, {"en": "bill / check", "tr": "hesap", "ex": "Ask for the bill."}, {"en": "tip", "tr": "bahşiş", "ex": "Leave a tip."}, {"en": "boarding pass", "tr": "biniş kartı", "ex": "Show your boarding pass."}, {"en": "luggage / baggage", "tr": "bagaj", "ex": "Carry-on luggage."}, {"en": "departure", "tr": "kalkış", "ex": "Departure gate."}, {"en": "arrival", "tr": "varış", "ex": "Arrival hall."}, {"en": "delayed", "tr": "gecikmeli", "ex": "The flight is delayed."}, {"en": "cancelled", "tr": "iptal", "ex": "The flight is cancelled."}, {"en": "appointment", "tr": "randevu", "ex": "Doctor's appointment."}, {"en": "prescription", "tr": "reçete", "ex": "Write a prescription."}, {"en": "symptom", "tr": "belirti/semptom", "ex": "Show symptoms."}, {"en": "pharmacy", "tr": "eczane", "ex": "Find a pharmacy."}, {"en": "insurance", "tr": "sigorta", "ex": "Travel insurance."}, {"en": "emergency", "tr": "acil durum", "ex": "Emergency exit."}, {"en": "lost and found", "tr": "kayıp eşya", "ex": "Lost and found office."}, {"en": "exchange rate", "tr": "döviz kuru", "ex": "Check the exchange rate."}, {"en": "currency", "tr": "para birimi", "ex": "Local currency."}, {"en": "customs", "tr": "gümrük", "ex": "Go through customs."}], "cumleler": [{"tr": "İki kişilik rezervasyon yaptırmak istiyorum lütfen.", "en": "I'd like to make a reservation for two, please."}, {"tr": "Menüyü görebilir miyim lütfen?", "en": "Could I see the menu, please?"}, {"tr": "Türk Hava Yolları check-in kontuarı nerede?", "en": "Where is the check-in counter for Turkish Airlines?"}, {"tr": "New York'a aktarmalı uçuşum var.", "en": "I have a connecting flight to New York."}, {"tr": "Dr. Smith'ten randevu almak istiyorum.", "en": "I'd like to book an appointment with Dr. Smith."}, {"tr": "Dünden beri kendimi iyi hissetmiyorum.", "en": "I've been feeling unwell since yesterday."}, {"tr": "Yerel bir yemek önerebilir misiniz?", "en": "Can you recommend a local dish?"}, {"tr": "Yakınlarda eczane var mı?", "en": "Is there a pharmacy nearby?"}, {"tr": "Benim için bir taksi çağırabilir misiniz lütfen?", "en": "Could you call a taxi for me, please?"}, {"tr": "Sanırım hesabımda bir yanlışlık var.", "en": "I think there's a mistake on my bill."}, {"tr": "Masa ayırtmak istiyorum.", "en": "I'd like to reserve a table."}, {"tr": "Bu akşam için yeriniz var mı?", "en": "Do you have availability for tonight?"}, {"tr": "Ne kadar beklememiz gerekir?", "en": "How long do we need to wait?"}, {"tr": "Sipariş vermeye hazırım.", "en": "I'm ready to order."}, {"tr": "Başlangıç olarak çorba alacağım.", "en": "I'll have soup as a starter."}, {"tr": "Ana yemek olarak biftek istiyorum.", "en": "I'd like the steak for the main course."}, {"tr": "Orta pişmiş olsun lütfen.", "en": "Medium-rare, please."}, {"tr": "İçecek olarak su alırım.", "en": "I'll have water to drink."}, {"tr": "Garson, hesap lütfen!", "en": "Waiter, the bill, please!"}, {"tr": "Bahşiş dahil mi?", "en": "Is the tip included?"}, {"tr": "Kredi kartıyla ödeyebilir miyim?", "en": "Can I pay by credit card?"}, {"tr": "Pasaport kontrolü nerede?", "en": "Where is passport control?"}, {"tr": "Biniş kartımı aldım.", "en": "I got my boarding pass."}, {"tr": "Bavulumu kaybettim.", "en": "I lost my luggage."}, {"tr": "Kayıp eşya bürosu nerede?", "en": "Where is the lost and found office?"}, {"tr": "Uçuşum gecikti.", "en": "My flight has been delayed."}, {"tr": "Gate numarası değişti mi?", "en": "Has the gate number changed?"}, {"tr": "Pencere kenarı koltuk istiyorum.", "en": "I'd like a window seat."}, {"tr": "Başım çok ağrıyor.", "en": "I have a terrible headache."}, {"tr": "Ateşim var.", "en": "I have a fever."}, {"tr": "Midem bulanıyor.", "en": "I feel nauseous."}, {"tr": "Alerjik reaksiyon geçiriyorum.", "en": "I'm having an allergic reaction."}, {"tr": "Hastaneye gitmem gerekiyor.", "en": "I need to go to the hospital."}, {"tr": "Ambulans çağırır mısınız?", "en": "Can you call an ambulance?"}, {"tr": "Seyahat sigortam var.", "en": "I have travel insurance."}, {"tr": "Reçetemi doldurabilir misiniz?", "en": "Can you fill my prescription?"}, {"tr": "Ağrı kesici var mı?", "en": "Do you have any painkillers?"}, {"tr": "Günde iki kez alın.", "en": "Take it twice a day."}, {"tr": "Aç karnına almayın.", "en": "Don't take it on an empty stomach."}, {"tr": "Döviz bürosu nerede?", "en": "Where is the currency exchange?"}, {"tr": "Bugünkü döviz kuru nedir?", "en": "What is the exchange rate today?"}, {"tr": "Para bozdurabilir miyim?", "en": "Can I exchange money?"}, {"tr": "Gümrükten geçecek bir şeyiniz var mı?", "en": "Do you have anything to declare at customs?"}, {"tr": "Burası neresi? Haritada gösterebilir misiniz?", "en": "Where is this? Can you show me on a map?"}, {"tr": "Otele nasıl gidebilirim?", "en": "How can I get to the hotel?"}, {"tr": "Bu otobüs şehir merkezine gider mi?", "en": "Does this bus go to the city center?"}, {"tr": "Şuradan sağa dönün.", "en": "Turn right over there."}, {"tr": "Dümdüz gidin.", "en": "Go straight ahead."}, {"tr": "Yardımınız için teşekkürler!", "en": "Thank you for your help!"}, {"tr": "İyi günler!", "en": "Have a nice day!"}, {"tr": "Garson, siparişimi yanlış getirdiniz. Ben tavuk istemiştim, balık geldi.", "en": "Waiter, you brought my order wrong. I ordered chicken, but fish came."}, {"tr": "Çok özür dilerim, hemen düzelteceğim.", "en": "I'm very sorry; I'll correct it right away."}, {"tr": "Yemek çok lezzetliydi, şefe iltifatlarımı iletin lütfen.", "en": "The food was very delicious; please give my compliments to the chef."}, {"tr": "Glutensiz veya vegan seçenekleriniz var mı?", "en": "Do you have gluten-free or vegan options?"}, {"tr": "Fıstık alerjim var, bu yemek fıstık içeriyor mu?", "en": "I have a peanut allergy; does this dish contain peanuts?"}, {"tr": "Uçağımı kaçırdım, bir sonraki uçuş için ne yapabilirim?", "en": "I missed my flight; what can I do for the next flight?"}, {"tr": "Bekleme listesine alabilir misiniz?", "en": "Can you put me on the waiting list?"}, {"tr": "Transit vizeye ihtiyacım var mı?", "en": "Do I need a transit visa?"}, {"tr": "Duty-free'den bir parfüm aldım, poşetini açabilir miyim?", "en": "I bought a perfume from duty-free; can I open the bag?"}, {"tr": "Bavulumun tekerleği kırıldı, şikayette bulunmak istiyorum.", "en": "The wheel of my suitcase broke; I want to file a complaint."}, {"tr": "Doktor, kaç gündür öksürüyorum ve nefes almakta zorlanıyorum.", "en": "Doctor, I've been coughing for days and I'm having difficulty breathing."}, {"tr": "Göğsümü dinleyebilir misiniz?", "en": "Could you listen to my chest?"}, {"tr": "Röntgen çekilmesi gerekiyor.", "en": "An X-ray needs to be taken."}, {"tr": "Sonuçlar yarın çıkar.", "en": "The results will be out tomorrow."}, {"tr": "İlaçları düzenli kullanmazsanız iyileşemezsiniz.", "en": "You won't recover if you don't take the medicine regularly."}, {"tr": "Polis, çantam çalındı!", "en": "Officer, my bag has been stolen!"}, {"tr": "İçinde pasaportum ve kredi kartlarım vardı.", "en": "It had my passport and credit cards in it."}, {"tr": "Kamera kayıtlarına bakabilir misiniz?", "en": "Could you check the camera recordings?"}, {"tr": "Büyükelçiliğe gitmem gerekiyor, adresini bilmiyorum.", "en": "I need to go to the embassy; I don't know the address."}, {"tr": "Konsolosluktan acil pasaport çıkartabilir miyim?", "en": "Can I get an emergency passport from the consulate?"}, {"tr": "Oteldeki odamda klima çalışmıyor, değiştirmek istiyorum.", "en": "The air conditioner in my hotel room isn't working; I want to change rooms."}, {"tr": "Gürültüden uyuyamıyorum, sessiz bir oda rica ediyorum.", "en": "I can't sleep because of the noise; I'm requesting a quiet room."}, {"tr": "Toplu taşıma kartını nereden alabilirim?", "en": "Where can I get a public transportation card?"}, {"tr": "Kartıma nasıl bakiye yükleyebilirim?", "en": "How can I load credit onto my card?"}, {"tr": "İnternet paketi almak istiyorum.", "en": "I want to buy an internet package."}, {"tr": "SIM kartımı kaydettirmem gerekiyor mu?", "en": "Do I need to register my SIM card?"}, {"tr": "Kaza yaptık, ambulans çağırın!", "en": "We had an accident; call an ambulance!"}, {"tr": "Yaralı var mı?", "en": "Is there anyone injured?"}, {"tr": "Şoktayım, ne yapacağımı bilmiyorum.", "en": "I'm in shock; I don't know what to do."}, {"tr": "Sakin olun, yardım geliyor.", "en": "Stay calm; help is coming."}, {"tr": "Acil durum numarası bu ülkede kaç?", "en": "What is the emergency number in this country?"}, {"tr": "Yardım edin, yangın var!", "en": "Help, there is a fire!"}, {"tr": "Bu cümleleri öğrenmek gerçekten hayat kurtarabilir.", "en": "Learning these sentences can really save lives."}, {"tr": "İngilizce bilmek, yurt dışında güvende olmaktır.", "en": "Knowing English means being safe abroad."}, {"tr": "Başıma kötü bir şey gelirse kendimi ifade edebilirim.", "en": "If something bad happens to me, I can express myself."}, {"tr": "Bu da İngilizce öğrenmenin en somut faydasıdır.", "en": "This is the most tangible benefit of learning English."}, {"tr": "Dil sadece iletişim değil, hayatta kalma aracıdır.", "en": "Language is not just communication; it's a survival tool."}, {"tr": "Ve ben bu aracı nasıl kullanacağımı biliyorum.", "en": "And I know how to use this tool."}, {"tr": "Restoranda, havaalanında, hastanede, her yerde.", "en": "In a restaurant, at the airport, in a hospital, everywhere."}, {"tr": "Artık İngilizce konuşulan bir ülkede rahatça yaşayabilirim.", "en": "I can now comfortably live in an English-speaking country."}, {"tr": "Çünkü 69 günlük yoğun bir eğitim aldım.", "en": "Because I had 69 days of intensive training."}, {"tr": "Ve kendimi her senaryoya hazırladım.", "en": "And I prepared myself for every scenario."}, {"tr": "Bu özgüveni bana bu plan verdi.", "en": "This plan gave me this confidence."}, {"tr": "Şimdi gerçek hayatta test etme zamanı.", "en": "Now it's time to test it in real life."}, {"tr": "Bir sonraki yurt dışı seyahatimde çevirmene ihtiyacım yok.", "en": "I don't need a translator on my next trip abroad."}, {"tr": "Kendi başımın çaresine bakabilirim.", "en": "I can take care of myself."}, {"tr": "Ve bu paha biçilemez bir özgürlük.", "en": "And this is a priceless freedom."}, {"tr": "Dil özgürlüktür.", "en": "Language is freedom."}, {"tr": "Ben de özgürüm artık.", "en": "And I am free now."}, {"tr": "69. gün, gerçek hayata hazırım! ✈️🌍", "en": "Day 69, I'm ready for real life! ✈️🌍"}], "aktivite": "**Sabah (30 dk): Diyalog Yazımı**<br>- Restoran, havaalanı, hastane ve otel senaryoları için 4 ayrı İngilizce diyalog yaz (her biri 10-15 cümle).<br><br>**Öğlen (30 dk): Sesli Canlandırma**<br>- Yazdığın diyaloglardan 2 tanesini sesli canlandır. İki rolü de sen oyna.<br>- Telaffuz ve akıcılığa dikkat et.<br><br>**Akşam (45 dk): \"Real-Life Survival English\" Konuşması**<br>- 2-3 dakikalık \"Yurt dışında başıma gelebilecek bir acil durumu nasıl yönetirim?\" konuşması.<br>- Tüm günlük hayat kalıplarını kullan.<br>- Ses kaydı al."}, {"dayNum": "70", "title": "Phone & Video Call English", "gramerDesc": "Bu günün gramer yapısını çalışacağız.", "kaliplar": [{"en": "Hello, this is [Name] speaking. How can I help you?", "tr": "Merhaba, ben [İsim] görüşüyoruz. Nasıl yardımcı olabilirim?"}, {"en": "Could you please repeat that? I didn't quite catch it.", "tr": "Tekrar edebilir misiniz lütfen? Tam anlayamadım."}, {"en": "The line seems a bit choppy. Could you speak up a little?", "tr": "Hat biraz kesik gibi. Biraz daha yüksek sesle konuşabilir misiniz?"}, {"en": "Let me share my screen so you can see what I'm talking about.", "tr": "Ekranımı paylaşayım ki bahsettiğim şeyi görebilesiniz."}, {"en": "You're on mute! We can't hear you.", "tr": "Sesiniz kapalı! Sizi duyamıyoruz."}, {"en": "I think we have a bad connection. Let me call you back.", "tr": "Sanırım bağlantımız kötü. Sizi geri arayayım."}, {"en": "To summarize, we agreed on the deadline and the budget.", "tr": "Özetlemek gerekirse, son tarih ve bütçe konusunda anlaştık."}, {"en": "Let me get back to you on that by the end of the day.", "tr": "Gün sonuna kadar size bu konuda dönüş yapayım."}, {"en": "I'm sorry, I have to drop off. It was great talking to you.", "tr": "Üzgünüm, ayrılmam gerekiyor. Sizinle konuşmak harikaydı."}, {"en": "Looking forward to our next call. Have a great day!", "tr": "Bir sonraki görüşmemizi dört gözle bekliyorum. İyi günler!"}], "kelimeler": [{"en": "mute", "tr": "sessize almak", "ex": "You're on mute."}, {"en": "unmute", "tr": "sesini açmak", "ex": "Please unmute yourself."}, {"en": "speaker", "tr": "hoparlör", "ex": "Put it on speaker."}, {"en": "headset", "tr": "kulaklık", "ex": "Use a headset."}, {"en": "screen share", "tr": "ekran paylaşımı", "ex": "Let me share my screen."}, {"en": "bandwidth", "tr": "bant genişliği", "ex": "Low bandwidth."}, {"en": "lag", "tr": "gecikme", "ex": "There is a lag."}, {"en": "echo", "tr": "yankı", "ex": "There's an echo."}, {"en": "feedback", "tr": "geri bildirim (ses)", "ex": "Audio feedback."}, {"en": "connection", "tr": "bağlantı", "ex": "Stable connection."}, {"en": "dial", "tr": "aramak/tuşlamak", "ex": "Dial the number."}, {"en": "extension", "tr": "dahili hat", "ex": "Extension 101."}, {"en": "voicemail", "tr": "sesli mesaj", "ex": "Leave a voicemail."}, {"en": "hang up", "tr": "telefonu kapatmak", "ex": "Don't hang up."}, {"en": "call back", "tr": "geri aramak", "ex": "I'll call you back."}, {"en": "put through", "tr": "bağlamak (telefon)", "ex": "I'll put you through."}, {"en": "hold on", "tr": "hatta beklemek", "ex": "Hold on a second."}, {"en": "agenda", "tr": "gündem", "ex": "Today's agenda."}, {"en": "minutes", "tr": "toplantı notları", "ex": "Take minutes."}, {"en": "action items", "tr": "aksiyon maddeleri", "ex": "Review action items."}], "cumleler": [{"tr": "Merhaba, ben [İsim] görüşüyoruz. Nasıl yardımcı olabilirim?", "en": "Hello, this is [Name] speaking. How can I help you?"}, {"tr": "Tekrar edebilir misiniz lütfen? Tam anlayamadım.", "en": "Could you please repeat that? I didn't quite catch it."}, {"tr": "Hat biraz kesik gibi. Biraz daha yüksek sesle konuşabilir misiniz?", "en": "The line seems a bit choppy. Could you speak up a little?"}, {"tr": "Ekranımı paylaşayım ki bahsettiğim şeyi görebilesiniz.", "en": "Let me share my screen so you can see what I'm talking about."}, {"tr": "Sesiniz kapalı! Sizi duyamıyoruz.", "en": "You're on mute! We can't hear you."}, {"tr": "Sanırım bağlantımız kötü. Sizi geri arayayım.", "en": "I think we have a bad connection. Let me call you back."}, {"tr": "Özetlemek gerekirse, son tarih ve bütçe konusunda anlaştık.", "en": "To summarize, we agreed on the deadline and the budget."}, {"tr": "Gün sonuna kadar size bu konuda dönüş yapayım.", "en": "Let me get back to you on that by the end of the day."}, {"tr": "Üzgünüm, ayrılmam gerekiyor. Sizinle konuşmak harikaydı.", "en": "I'm sorry, I have to drop off. It was great talking to you."}, {"tr": "Bir sonraki görüşmemizi dört gözle bekliyorum. İyi günler!", "en": "Looking forward to our next call. Have a great day!"}, {"tr": "Alo, merhaba. Ahmet Bey'le görüşebilir miyim?", "en": "Hello, can I speak to Mr. Ahmet?"}, {"tr": "Kim arıyor acaba?", "en": "Who is calling, please?"}, {"tr": "Beni bağlayabilir misiniz?", "en": "Can you put me through?"}, {"tr": "Hatta kalın lütfen.", "en": "Hold the line, please."}, {"tr": "Kendisi şu anda müsait değil.", "en": "He is not available at the moment."}, {"tr": "Mesaj bırakmak ister misiniz?", "en": "Would you like to leave a message?"}, {"tr": "Beni geri arasın lütfen.", "en": "Please have him call me back."}, {"tr": "Görüntünüz dondu.", "en": "Your video froze."}, {"tr": "Sesi açabilir misiniz?", "en": "Can you unmute yourself?"}, {"tr": "Sizi çok kötü duyuyorum.", "en": "I can hear you very poorly."}, {"tr": "İnternetim yavaş. Kamerayı kapatabilir miyim?", "en": "My internet is slow. Can I turn off my camera?"}, {"tr": "Sunumu başlatıyorum.", "en": "I'm starting the presentation."}, {"tr": "Slaytı geçer misiniz lütfen?", "en": "Can you move to the next slide, please?"}, {"tr": "Bir sorum var.", "en": "I have a question."}, {"tr": "Sözümü kesmeyin lütfen, bitireyim.", "en": "Please don't interrupt; let me finish."}, {"tr": "Sıra sizde.", "en": "It's your turn."}, {"tr": "Toplantı kaydedilecek mi?", "en": "Will the meeting be recorded?"}, {"tr": "Gündeme sadık kalalım.", "en": "Let's stick to the agenda."}, {"tr": "Bunu sonra konuşalım.", "en": "Let's discuss this later."}, {"tr": "Süremiz doldu.", "en": "We're out of time."}, {"tr": "Katıldığınız için teşekkürler.", "en": "Thank you for joining."}, {"tr": "Toplantı notlarını mail atacağım.", "en": "I'll email the meeting minutes."}, {"tr": "Bir sonraki toplantı ne zaman?", "en": "When is the next meeting?"}, {"tr": "Takvime davet gönderir misin?", "en": "Can you send a calendar invite?"}, {"tr": "Bağlantı linkini paylaştım.", "en": "I shared the link."}, {"tr": "Zoom mu Teams mi kullanalım?", "en": "Should we use Zoom or Teams?"}, {"tr": "Arka planımı bulanıklaştırayım.", "en": "Let me blur my background."}, {"tr": "Kulaklığımı takıyorum.", "en": "I'm putting on my headset."}, {"tr": "Telesekretere düştü.", "en": "It went to voicemail."}, {"tr": "Numara meşgul.", "en": "The number is busy."}, {"tr": "Yanlış numara.", "en": "Wrong number."}, {"tr": "Dahili 101'i bağlar mısınız?", "en": "Can you connect me to extension 101?"}, {"tr": "Faks çekmek istiyorum.", "en": "I want to send a fax."}, {"tr": "Mesajınızı aldım.", "en": "I got your message."}, {"tr": "Sizi net duyamıyorum, sesiniz kesik.", "en": "I can't hear you clearly; you're breaking up."}, {"tr": "Sinyal yok / çekmiyor.", "en": "There is no signal / No reception."}, {"tr": "Şebeke yoğun.", "en": "The network is busy."}, {"tr": "Görüşme sona erdi.", "en": "The call ended."}, {"tr": "Telefondayım, sonra arasam?", "en": "I'm on the phone; can I call you later?"}, {"tr": "Herkese iyi günler, görüşürüz!", "en": "Have a great day everyone, bye!"}, {"tr": "Sayın Yetkili, ben [Şirket]'ten [İsim]. Size bir teklif sunmak için arıyorum.", "en": "Dear Sir/Madam, this is [Name] from [Company]. I'm calling to offer you a proposal."}, {"tr": "Zamanınız var mı, yoksa daha sonra mı arayayım?", "en": "Do you have time, or should I call back later?"}, {"tr": "Telefonu kapatmadan önce sonraki adımları netleştirelim.", "en": "Before we hang up, let's clarify the next steps."}, {"tr": "Size bir e-posta gönderdim, hesabınıza düştü mü?", "en": "I sent you an email; did you receive it?"}, {"tr": "Sizi duyabiliyor muyum? Evet, şimdi oldu.", "en": "Can you hear me? Yes, now it works."}, {"tr": "Lütfen kendinizi sessize alın, arka plan gürültüsü geliyor.", "en": "Please mute yourself; there is background noise."}, {"tr": "Toplantı sahibi olduğum için kaydı ben başlatacağım.", "en": "As the meeting host, I will start the recording."}, {"tr": "Ekranda imleci hareket ettirerek işaret edebilirsiniz.", "en": "You can point by moving your cursor on the screen."}, {"tr": "Altyazı özelliğini açtım, artık konuşulanları yazılı görebilirsiniz.", "en": "I turned on the caption feature; now you can see what is being said in writing."}, {"tr": "Bağlantım koptu, tekrar katılıyorum.", "en": "I got disconnected; I'm reconnecting."}, {"tr": "Dosyayı sohbet kısmına yükledim, herkes görebilir.", "en": "I uploaded the file to the chat; everyone can see it."}, {"tr": "Anket başlatıyorum, lütfen oylarınızı verin.", "en": "I'm launching a poll; please cast your votes."}, {"tr": "Ara odalara ayrılalım ve 10 dakika sonra burada buluşalım.", "en": "Let's break out into rooms and meet back here in 10 minutes."}, {"tr": "Beyaz tahta üzerinde fikirlerinizi yazabilirsiniz.", "en": "You can write your ideas on the whiteboard."}, {"tr": "Bu konuda hemfikir miyiz? El kaldırarak onaylayın.", "en": "Are we in agreement on this? Raise your hand to confirm."}, {"tr": "Toplantıyı burada sonlandıralım, herkese teşekkürler.", "en": "Let's wrap up the meeting here; thank you everyone."}, {"tr": "Aksiyon maddelerini özet geçiyorum...", "en": "I'm summarizing the action items..."}, {"tr": "Müşteri ile telefonda konuşurken profesyonel dil kullanın.", "en": "Use professional language when talking to a client on the phone."}, {"tr": "Kızgın bir müşteriyle konuşurken ses tonunuz sakin olsun.", "en": "Keep your tone calm when speaking with an angry customer."}, {"tr": "Özür dileyin, sorunu anlayın, çözüm sunun.", "en": "Apologize, understand the issue, offer a solution."}, {"tr": "\"Bu sorunu sizin için nasıl çözebilirim?\" diye sorun.", "en": "Ask, \"How can I resolve this issue for you?\""}, {"tr": "\"Anlayışınız için teşekkür ederim\" demeyi unutmayın.", "en": "Don't forget to say, \"Thank you for your understanding.\""}, {"tr": "Telefonda gülümseyin, gülümseme sesinize yansır.", "en": "Smile on the phone; the smile reflects in your voice."}, {"tr": "Karşınızdaki kişinin adını not alın ve hitap ederken kullanın.", "en": "Note the person's name and use it when addressing them."}, {"tr": "Telefonu kapatırken \"İyi günler dilerim\" deyin.", "en": "Say \"Have a nice day\" when hanging up."}, {"tr": "Video görüşmede kameraya bakın, ekrana değil.", "en": "Look at the camera in a video call, not the screen."}, {"tr": "Bu karşı tarafın gözünün içine bakıyormuşsunuz hissi verir.", "en": "This gives the impression that you are looking them in the eye."}, {"tr": "Arka planınızın dağınık olmamasına dikkat edin.", "en": "Make sure your background isn't messy."}, {"tr": "Işık yüzünüze gelsin, arkadan gelmesin.", "en": "The light should come onto your face, not from behind."}, {"tr": "Profesyonel görünmek için bu küçük detaylar önemlidir.", "en": "These small details are important to look professional."}, {"tr": "Sanal toplantı yorgunluğu gerçek.", "en": "Virtual meeting fatigue is real."}, {"tr": "Molalar verin, su için, esneyin.", "en": "Take breaks, drink water, stretch."}, {"tr": "Bütün gün ekrana bakmaktan gözleriniz yorulur.", "en": "Your eyes get tired from looking at the screen all day."}, {"tr": "20-20-20 kuralını uygulayın: 20 dakikada bir, 20 saniye, 20 metre uzağa bakın.", "en": "Apply the 20-20-20 rule: Every 20 minutes, look 20 meters away for 20 seconds."}, {"tr": "Telefon ve video görüşmeleri artık hayatımızın bir parçası.", "en": "Phone and video calls are now a part of our lives."}, {"tr": "Bu becerileri öğrenmek kariyer için şart.", "en": "Learning these skills is a must for a career."}, {"tr": "İngilizce toplantı yönetmek ayrı bir yetkinlik.", "en": "Managing a meeting in English is a separate competency."}, {"tr": "Bugün bu yetkinliği de kazandım.", "en": "Today I also gained this competency."}, {"tr": "Artık İngilizce bir toplantıya ev sa     async function showTranslation(text, element, rect) {
        if (!text || text.trim() === '') return;
        
        let targetRect = rect || element.getBoundingClientRect();
        
        transTooltip.innerHTML = `<div style="font-size: 12px; color: #aaa;">Çevriliyor...</div>`;
        transTooltip.classList.add('show');
        positionTooltip(targetRect);
        
        try {
            const translation = await fetchTranslation(text);
            if (translation) {
                transTooltip.innerHTML = `
                    <div style="font-weight: bold; margin-bottom: 4px; font-size: 13px; color: var(--primary-color);">${escapeHtml(text)}</div>
                    <div style="font-size: 14px;">${escapeHtml(translation)}</div>
                `;
            } else {
                transTooltip.innerHTML = `<div style="font-size: 12px; color: #ff8a80;">Çeviri yüklenemedi.</div>`;
            }
            positionTooltip(targetRect);
        } catch (err) {
            transTooltip.innerHTML = `<div style="font-size: 12px; color: #ff8a80;">Hata oluştu.</div>`;
            positionTooltip(targetRect);
        }
    }

    function positionTooltip(rect) {
        const tooltipWidth = transTooltip.offsetWidth;
        const tooltipHeight = transTooltip.offsetHeight;
        const scrollX = window.pageXOffset || document.documentElement.scrollLeft;
        const scrollY = window.pageYOffset || document.documentElement.scrollTop;
        
        let top = rect.top + scrollY - tooltipHeight - 10;
        let left = rect.left + scrollX + (rect.width / 2) - (tooltipWidth / 2);
        
        if (top < scrollY) {
            top = rect.bottom + scrollY + 10;
            transTooltip.classList.add('bottom-arrow');
        } else {
            transTooltip.classList.remove('bottom-arrow');
        }
        
        if (left < 10) left = 10;
        if (left + tooltipWidth > window.innerWidth - 10) {
            left = window.innerWidth - tooltipWidth - 10;
        }
        
        transTooltip.style.top = top + 'px';
        transTooltip.style.left = left + 'px';
    }

    function hideTooltip() {
        transTooltip.classList.remove('show');
        window.getSelection().removeAllRanges();
    }

        if (data && data[0]) {
            let result = '';
            data[0].forEach(item => {
                if (item[0]) result += item[0];
            });
            return result.trim();
        }
        return null;
    }

    function handleTextSelection(e) {
        const selection = window.getSelection();
        const selectedText = selection.toString().trim();
        if (selectedText.length > 0) {
            const range = selection.getRangeAt(0);
            const rect = range.getBoundingClientRect();
            showTranslation(selectedText, null, rect);
        }
    }

    // --- Voice Recorder Features ---
    let mediaRecorder = null;
    let audioChunks = [];
    let userAudioBlob = null;
    let userAudioUrl = null;
    let userAudioElement = null;

    async function toggleRecording(e) {
        e.stopPropagation();
        if (mediaRecorder && mediaRecorder.state === "recording") {
            mediaRecorder.stop();
            recordBtn.classList.remove('recording');
            recordBtn.textContent = '🎤';
        } else {
            audioChunks = [];
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                alert("Tarayıcınız veya protokolünüz (örneğin güvenli olmayan HTTP veya yerel dosya bağlantısı) ses kaydını desteklemiyor.");
                return;
            }
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.addEventListener('dataavailable', event => {
                    audioChunks.push(event.data);
                });
                mediaRecorder.addEventListener('stop', () => {
                    userAudioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                    userAudioUrl = URL.createObjectURL(userAudioBlob);
                    playRecordBtn.classList.remove('hidden');
                    stream.getTracks().forEach(track => track.stop());
                });
                
                mediaRecorder.start();
                recordBtn.classList.add('recording');
                recordBtn.textContent = '⏹️';
            } catch (err) {
                alert("Mikrofon izni alınamadı veya mikrofon bulunamadı: " + err.message);
            }
        }
    }

    function playUserRecording(e) {
        e.stopPropagation();
        if (userAudioUrl) {
            if (userAudioElement) {
                userAudioElement.pause();
            }
            userAudioElement = new Audio(userAudioUrl);
            userAudioElement.play();
        }
    }

    function stopRecordingIfActive() {
        if (mediaRecorder && mediaRecorder.state === "recording") {
            mediaRecorder.stop();
        }
    }

    // --- Completion Confetti Features ---
    const confettiCanvas = document.getElementById('confettiCanvas');
    const confettiCtx = confettiCanvas.getContext('2d');
    let confettiParticles = [];
    let confettiAnimationId = null;

    function resizeConfettiCanvas() {
        confettiCanvas.width = window.innerWidth;
        confettiCanvas.height = window.innerHeight;
    }

    class ConfettiParticle {
        constructor() {
            this.x = Math.random() * confettiCanvas.width;
            this.y = Math.random() * confettiCanvas.height - confettiCanvas.height;
            this.size = Math.random() * 8 + 6;
            this.color = `hsl(${Math.random() * 360}, 80%, 60%)`;
            this.speedX = Math.random() * 4 - 2;
            this.speedY = Math.random() * 5 + 4;
            this.rotation = Math.random() * 360;
            this.rotationSpeed = Math.random() * 10 - 5;
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            this.rotation += this.rotationSpeed;
        }
        draw() {
            confettiCtx.save();
            confettiCtx.translate(this.x, this.y);
            confettiCtx.rotate(this.rotation * Math.PI / 180);
            confettiCtx.fillStyle = this.color;
            confettiCtx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size);
            confettiCtx.restore();
        }
    }

    function triggerConfetti() {
        confettiParticles = [];
        for (let i = 0; i < 150; i++) {
            confettiParticles.push(new ConfettiParticle());
        }
        if (confettiAnimationId) {
            cancelAnimationFrame(confettiAnimationId);
        }
        animateConfetti();
    }

    function animateConfetti() {
        confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
        let active = false;
        confettiParticles.forEach(p => {
            p.update();
            p.draw();
            if (p.y < confettiCanvas.height) {
                active = true;
            }
        });
        if (active) {
            confettiAnimationId = requestAnimationFrame(animateConfetti);
        } else {
            confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
        }
    }

    // Attach translation event listeners
    document.addEventListener('click', (e) => {
        if (!transTooltip.contains(e.target)) {
            hideTooltip();
        }
    });

    enEl.addEventListener('mouseup', handleTextSelection);
    enEl.addEventListener('touchend', handleTextSelection);

    recordBtn.addEventListener('click', toggleRecording);
    playRecordBtn.addEventListener('click', playUserRecording);

    window.addEventListener('resize', resizeConfettiCanvas);
    resizeConfettiCanvas();

    function selectAnswer(knewIt) {
        answerSelection = knewIt;
        if(knewIt) {
            btnKnew.classList.add('selected');
            btnRepeat.classList.remove('selected');
        } else {
            btnRepeat.classList.add('selected');
            btnKnew.classList.remove('selected');
        }
    }

    function goToNextSentence() {
        if (answerSelection === null) {
            alert("Lütfen önce Doğru Bildim veya Tekrar Et seçeneğini işaretleyin.");
            return;
        }

        if (!answerSelection) {
            if (!isReviewMode) {
                wrongSentences.push(currentList[currentIndex]);
                updateWrongListUI();
            } else {
                wrongSentences.push(currentList[currentIndex]);
            }
        }

        currentIndex++;
        
        if (!isReviewMode && currentIndex > 0) {
            if (currentIndex === 50) {
                showMilestone("Yarı yoldasın! 🎯");
                return;
            } else if (currentIndex % 10 === 0 && currentIndex !== currentList.length && currentIndex !== 50) {
                showMilestone("Harika! " + currentIndex + " cümle tamamlandı! ☕");
                return;
            }
        }
        
        loadSentence();
    }
    
    function showMilestone(msg) {
        studyArea.classList.add('hidden');
        milestoneMsg.classList.remove('hidden');
        milestoneMsg.innerHTML = msg + '<br><br><button onclick="loadSentence()">Devam Et</button>';
    }

    function updateWrongListUI() {
        document.getElementById('wrongCount').textContent = wrongSentences.length;
        const ul = document.getElementById('wrongList');
        ul.innerHTML = '';
        wrongSentences.forEach((s) => {
            const li = document.createElement('li');
            li.innerHTML = `<strong>${escapeHtml(s.tr)}</strong> <br> <span style="color:var(--primary-color);">${escapeHtml(s.en)}</span>`;
            li.style.marginBottom = "10px";
            ul.appendChild(li);
        });
        if(wrongSentences.length > 0) {
            document.getElementById('reviewBtn').classList.remove('hidden');
        } else {
            document.getElementById('reviewBtn').classList.add('hidden');
        }
    }

    function toggleWrongList() {
        document.getElementById('wrongListContainer').classList.toggle('hidden');
    }
    
    function startWrongListReview() {
        if(wrongSentences.length === 0) return;
        isReviewMode = true;
        currentList = [...wrongSentences];
        wrongSentences = []; 
        updateWrongListUI();
        currentIndex = 0;
        document.getElementById('wrongListContainer').classList.add('hidden');
        loadSentence();
    }

    function endReview() {
        isReviewMode = false;
        currentList = sentences;
        currentIndex = currentList.length; // to show the completed screen again
        updateWrongListUI();
        loadSentence();
    }

    sIndexEl.addEventListener('change', (e) => {
        let val = parseInt(e.target.value);
        if (isNaN(val) || val < 1 || val > currentList.length) {
            alert("Lütfen 1 ile " + currentList.length + " arasında geçerli bir cümle numarası girin.");
            sIndexEl.value = currentIndex + 1;
            return;
        }
        currentIndex = val - 1;
        answerSelection = null;
        loadSentence();
    });

    sIndexEl.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            sIndexEl.blur();
        }
    });

    document.getElementById('daySelector').addEventListener('change', (e) => {
        renderDay(parseInt(e.target.value));
    });

    // Init day from localStorage or default to 0
    const savedDayIndex = safeStorage.getItem('currentDayIndex');
    let initialDay = 0;
    if (savedDayIndex !== null) {
        const parsed = parseInt(savedDayIndex);
        if (!isNaN(parsed) && parsed >= 0 && parsed < appData.length) {
            initialDay = parsed;
        }
    }
    document.getElementById('daySelector').value = initialDay;
    renderDay(initialDay);
</script>
</body>
