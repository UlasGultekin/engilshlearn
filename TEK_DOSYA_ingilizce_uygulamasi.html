rview."}, {"tr": "Hatta şaka bile yapacağım İngilizce.", "en": "I'll even make jokes in English."}, {"tr": "\"Why did the scarecrow win an award? Because he was outstanding in his field!\"", "en": "\"Korkuluk neden ödül kazandı? Çünkü tarlasında göze çarpıyordu!\" (İngilizce espri)"}, {"tr": "Bu espriyi anladıysan İngilizcen gelişmiş demektir.", "en": "If you understood this joke, it means your English has improved."}, {"tr": "İleride bir gün İngilizce rüya göreceksin.", "en": "One day in the future, you will dream in English."}, {"tr": "Ve o sabah uyandığında yüzünde bir gülümseme olacak.", "en": "And when you wake up that morning, there will be a smile on your face."}, {"tr": "\"Başardım\" diyeceksin.", "en": "You will say, \"I did it.\""}, {"tr": "Ben o anı görmek için sabırsızlanıyorum.", "en": "I can't wait to see that moment."}, {"tr": "Kendi anımı ve senin anını.", "en": "My moment and your moment."}, {"tr": "Çünkü bu planı uygulayan herkes başaracak.", "en": "Because everyone who follows this plan will succeed."}, {"tr": "Buna yürekten inanıyorum.", "en": "I believe this with all my heart."}, {"tr": "Yeter ki devam et.", "en": "Just keep going."}, {"tr": "Asla vazgeçme.", "en": "Never give up."}, {"tr": "Gelecekteki sen, şimdiki sana teşekkür edecek.", "en": "Your future self will thank your present self."}, {"tr": "\"İyi ki başlamışsın\" diyecek.", "en": "He/She will say, \"I'm glad you started.\""}, {"tr": "\"İyi ki devam etmişsin\" diyecek.", "en": "\"I'm glad you continued.\""}, {"tr": "Ve belki de \"İyi ki bu cümleleri yazmışsın\" diyecek.", "en": "And maybe he/she will say, \"I'm glad you wrote these sentences.\""}, {"tr": "Ben şimdiden söylüyorum: İyi ki başladım, iyi ki devam ediyorum.", "en": "I'm saying it already: I'm glad I started, I'm glad I'm continuing."}, {"tr": "8. hafta bitti, hedefe 4 kala! ✈️", "en": "Week 8 is over, 4 left to the goal! ✈️"}], "aktivite": "— HAFTA 8 FİNAL<br><br>**Sabah (30 dk): Tüm Gelecekleri Kullan**<br>- Gelecek planlarını anlatan 20 cümle yaz.<br>- Will, going to, Present Continuous, Future Continuous, Future Perfect hepsinden en az 3 cümle olsun.<br><br>**Öğlen (30 dk): Hafta 8 Genel Tekrar**<br>- 6 günde öğrendiğin tüm gramer konularını gözden geçir.<br>- Her konudan 3 örnek cümle yaz.<br><br>**Akşam (45 dk): Büyük Final — \"My Future Abroad\" Sunumu**<br>- 3-4 dakikalık kapsamlı bir \"Yurt Dışı Geleceğim\" sunumu yap.<br>- TÜM hafta 8 konularını kullan:<br>  - Future Continuous<br>  - Future Perfect<br>  - Should/Had better/Ought to (tavsiye)<br>  - Although/Despite (zıtlık)<br>  - Be supposed to / Be expected to (beklentiler)<br>  - Tüm Future Forms<br>- Ses kaydı al. YURT DIŞINA HAZIR KONUŞ! ✈️🎉"}, {"dayNum": "49", "title": "Expressing Opinions (In my opinion / I believe / I think)", "gramerDesc": "Bu günün gramer yapısını çalışacağız.", "kaliplar": [{"en": "In my opinion, English is essential for a career.", "tr": "Bence İngilizce kariyer için şarttır."}, {"en": "I believe that everyone should learn a foreign language.", "tr": "Herkesin yabancı dil öğrenmesi gerektiğine inanıyorum."}, {"en": "I think working abroad is a great experience.", "tr": "Bence yurt dışında çalışmak harika bir deneyim."}, {"en": "From my perspective, technology helps education.", "tr": "Benim bakış açıma göre teknoloji eğitime yardımcı olur."}, {"en": "As far as I'm concerned, health is more important than wealth.", "tr": "Bana kalırsa sağlık zenginlikten daha önemlidir."}, {"en": "It seems to me that people are too dependent on phones.", "tr": "Bana öyle geliyor ki insanlar telefonlara çok bağımlı."}, {"en": "Personally, I prefer face-to-face communication.", "tr": "Şahsen yüz yüze iletişimi tercih ederim."}, {"en": "I'm convinced that hard work pays off.", "tr": "Sıkı çalışmanın karşılığını verdiğine eminim."}, {"en": "There is no doubt that climate change is real.", "tr": "İklim değişikliğinin gerçek olduğuna şüphe yok."}, {"en": "To be honest, I'm not sure about that.", "tr": "Dürüst olmak gerekirse bundan emin değilim."}], "kelimeler": [{"en": "opinion", "tr": "fikir/görüş", "ex": "In my opinion..."}, {"en": "perspective", "tr": "bakış açısı", "ex": "From my perspective..."}, {"en": "idea", "tr": "fikir", "ex": "I have an idea about this."}, {"en": "argument", "tr": "argüman/sav", "ex": "My argument is that..."}, {"en": "reason", "tr": "sebep", "ex": "The reason is simple."}, {"en": "point", "tr": "nokta", "ex": "The point is that..."}, {"en": "view", "tr": "görüş", "ex": "In my view..."}, {"en": "agree", "tr": "katılmak", "ex": "I agree with you."}, {"en": "disagree", "tr": "katılmamak", "ex": "I disagree with that."}, {"en": "discussion", "tr": "tartışma", "ex": "Let's have a discussion."}, {"en": "topic", "tr": "konu", "ex": "The topic is interesting."}, {"en": "belief", "tr": "inanç", "ex": "It's my belief that..."}, {"en": "influence", "tr": "etkilemek", "ex": "This influences my view."}, {"en": "evidence", "tr": "kanıt", "ex": "The evidence shows..."}, {"en": "thought", "tr": "düşünce", "ex": "A thought occurred to me."}, {"en": "consider", "tr": "değerlendirmek", "ex": "I consider it important."}, {"en": "explain", "tr": "açıklamak", "ex": "Let me explain why."}, {"en": "defend", "tr": "savunmak", "ex": "I can defend my view."}, {"en": "conclusion", "tr": "sonuç", "ex": "My conclusion is..."}, {"en": "summarize", "tr": "özetlemek", "ex": "To summarize..."}], "cumleler": [{"tr": "Bence İngilizce kariyer için şarttır.", "en": "In my opinion, English is essential for a career."}, {"tr": "Herkesin yabancı dil öğrenmesi gerektiğine inanıyorum.", "en": "I believe that everyone should learn a foreign language."}, {"tr": "Bence yurt dışında çalışmak harika bir deneyim.", "en": "I think working abroad is a great experience."}, {"tr": "Benim bakış açıma göre teknoloji eğitime yardımcı olur.", "en": "From my perspective, technology helps education."}, {"tr": "Bana kalırsa sağlık zenginlikten daha önemlidir.", "en": "As far as I'm concerned, health is more important than wealth."}, {"tr": "Bana öyle geliyor ki insanlar telefonlara çok bağımlı.", "en": "It seems to me that people are too dependent on phones."}, {"tr": "Şahsen yüz yüze iletişimi tercih ederim.", "en": "Personally, I prefer face-to-face communication."}, {"tr": "Sıkı çalışmanın karşılığını verdiğine eminim.", "en": "I'm convinced that hard work pays off."}, {"tr": "İklim değişikliğinin gerçek olduğuna şüphe yok.", "en": "There is no doubt that climate change is real."}, {"tr": "Dürüst olmak gerekirse bundan emin değilim.", "en": "To be honest, I'm not sure about that."}, {"tr": "Bence uzaktan çalışmak verimliliği artırır.", "en": "In my opinion, remote working increases productivity."}, {"tr": "Ofiste çalışmanın daha iyi olduğunu düşünüyorum.", "en": "I think working at the office is better."}, {"tr": "Sosyal medyanın zararlı olduğuna inanıyorum.", "en": "I believe social media is harmful."}, {"tr": "Bana göre kitap okumak en iyi hobidir.", "en": "According to me, reading books is the best hobby."}, {"tr": "Yapay zekanın işimizi elimizden alacağını sanmıyorum.", "en": "I don't think AI will take our jobs away."}, {"tr": "Eğitimin her şeyin temeli olduğu görüşündeyim.", "en": "I am of the opinion that education is the foundation of everything."}, {"tr": "Egzersiz yapmanın ruh sağlığına iyi geldiğini düşünüyorum.", "en": "I think exercising is good for mental health."}, {"tr": "Herkesin eşit fırsatlara sahip olması gerektiğine inanıyorum.", "en": "I believe everyone should have equal opportunities."}, {"tr": "Bence seyahat etmek insanın ufkunu açar.", "en": "In my opinion, traveling broadens one's horizons."}, {"tr": "Müziğin ruhun gıdası olduğunu düşünüyorum.", "en": "I think music is food for the soul."}, {"tr": "Bana sorarsan İngilizce öğrenmek zor değil, sadece zaman alır.", "en": "If you ask me, learning English is not hard; it just takes time."}, {"tr": "Şöyle düşünüyorum: Pratik yapmadan dil öğrenilmez.", "en": "Here's what I think: You can't learn t of an exaggerated thought."}, {"tr": "Samimi söylüyorum, bu iş olmaz.", "en": "Honestly, this won't work."}, {"tr": "İçimden bir ses bunun yanlış olduğunu söylüyor.", "en": "A voice inside me says this is wrong."}, {"tr": "Yaygın kanının aksine, ben başarısızlığın iyi olduğunu düşünürüm.", "en": "Contrary to popular belief, I think failure is good."}, {"tr": "Ne düşündüğümü açıkça söylemek gerekirse...", "en": "To put it bluntly..."}, {"tr": "Lafı dolandırmayayım, bu teklif çok kötü.", "en": "Let me not beat around the bush; this offer is very bad."}, {"tr": "Bu benim kişisel görüşüm, herkes katılmayabilir.", "en": "This is my personal opinion; not everyone may agree."}, {"tr": "Özetle, bence zamanımızı boşa harcıyoruz.", "en": "In short, I think we're wasting our time."}, {"tr": "Ben böyle düşünüyorum, sen ne dersin?", "en": "This is what I think; what do you say?"}, {"tr": "Bana göre başarının sırrı sürekliliktir, yetenek değil.", "en": "In my view, the secret of success is consistency, not talent."}, {"tr": "Kesinlikle eminim ki disiplin, motivasyondan daha önemlidir.", "en": "I am absolutely certain that discipline is more important than motivation."}, {"tr": "Gözlemlediğim kadarıyla insanlar değişime direniyor.", "en": "From what I have observed, people resist change."}, {"tr": "Tecrübelerime dayanarak, iş hayatında en önemli şeyin iletişim olduğunu söyleyebilirim.", "en": "Based on my experience, I can say the most important thing in business life is communication."}, {"tr": "Bütün delilleri değerlendirdiğimde, suçlunun o olduğu sonucuna varıyorum.", "en": "When I evaluate all the evidence, I come to the conclusion that he/she is the guilty one."}, {"tr": "Bu konuda tereddütteyim, çünkü yeterli bilgim yok.", "en": "I'm hesitant on this issue because I don't have enough information."}, {"tr": "Emin olmamakla birlikte, projenin biteceğini sanmıyorum.", "en": "Although I'm not sure, I doubt the project will finish."}, {"tr": "Dünya görüşüme göre, insan doğası temelde iyidir.", "en": "According to my worldview, human nature is fundamentally good."}, {"tr": "İtiraf etmeliyim ki ben bu konuda biraz taraflıyım.", "en": "I must admit I'm a bit biased on this issue."}, {"tr": "Objektif olmaya çalışıyorum ama zor.", "en": "I'm trying to be objective, but it's hard."}, {"tr": "Bu fikri destekleyecek çok sayıda kanıt var.", "en": "There is a lot of evidence to support this idea."}, {"tr": "Verilere baktığımızda tam tersi bir gerçekle karşılaşıyoruz.", "en": "When we look at the data, we encounter the exact opposite truth."}, {"tr": "Benim savunduğum tez şudur: Az ama öz çalışmak.", "en": "The thesis I defend is this: Work less but work better."}, {"tr": "Bu argümanımı şu şekilde gerekçelendiriyorum...", "en": "I justify this argument of mine as follows..."}, {"tr": "İlk olarak, ikinci olarak, son olarak...", "en": "First of all, secondly, finally..."}, {"tr": "Peki ama neden böyle düşünüyorum?", "en": "But why do I think so?"}, {"tr": "Çünkü yılların verdiği tecrübe bana bunu öğretti.", "en": "Because years of experience have taught me this."}, {"tr": "Annemin de dediği gibi, \"Damlaya damlaya göl olur.\"", "en": "As my mother used to say, \"Drop by drop, a lake is formed.\""}, {"tr": "Büyüklerimizin sözünde hep bir hikmet vardır.", "en": "There is always wisdom in the words of our elders."}, {"tr": "Ben de onlara katılıyorum.", "en": "I agree with them too."}, {"tr": "Toplum olarak daha çok okumamız gerektiği kanaatindeyim.", "en": "I am of the conviction that as a society we need to read more."}, {"tr": "Eğitim sistemimizin köklü bir değişime ihtiyacı olduğu görüşündeyim.", "en": "I am of the view that our education system needs a radical change."}, {"tr": "Bunu yıllardır savunuyorum.", "en": "I have been defending this for years."}, {"tr": "Ve savunmaya devam edeceğim.", "en": "And I will continue to defend it."}, {"tr": "Fikrimi değiştirebilirim, yeterince kanıt sunulursa.", "en": "I can change my mind if enough evidence is presented."}, {"tr": "Ama şu ana kadar sunulan hiçbir şey beni tatmin etmedi.", "en": "But so far, nothing presented has satisfied me."}, {"tr": "Tartışma programlarında hep aynı şey oluyor.", "en": "The same thing always happens in debate programs."}, {"tr": "Herkes bağırıyor, kimse dinlemiyor.", "en": "Everyone is shouting; no one is listening."}, {"tr": "Oysa medeni bir tartışma böyle olmamalı.", "en": "However, a civilized discussion should not be like this."}, {"tr": "Önce dinlemeli, sonra cevap vermeliyiz.", "en": "We should first listen, then respond."}, {"tr": "Karşı tarafın fikrine saygı duymak demek, onu onaylamak değildir.", "en": "Respecting the other party's opinion doesn't mean approving it."}, {"tr": "Bunu unutuyoruz.", "en": "We forget this."}, {"tr": "Fikir ayrılığı düşmanlık değildir.", "en": "Disagreement is not hostility."}, {"tr": "Tam tersine, gelişimin motorudur.", "en": "On the contrary, it is the engine of progress."}, {"tr": "Eğer herkes aynı şeyi düşünseydi dünya dönmezdi.", "en": "If everyone thought the same, the world wouldn't turn."}, {"tr": "Ben farklı düşünceleri kucaklarım.", "en": "I embrace different ideas."}, {"tr": "Kendi doğrularıma sıkı sıkıya bağlı değilim.", "en": "I am not tightly attached to my own truths."}, {"tr": "Yanlış olduğumu kanıtlarsanız teşekkür ederim.", "en": "I'll thank you if you prove me wrong."}, {"tr": "Çünkü yanlışımı düzeltmek gelişmek demektir.", "en": "Because correcting my mistake means improving."}, {"tr": "Ve ben sürekli gelişmek istiyorum.", "en": "And I want to continuously improve."}, {"tr": "İşte bu İngilizce serüveni de bunun bir parçası.", "en": "This English adventure is part of that."}, {"tr": "Benim fikrimce herkes İngilizce öğrenebilir.", "en": "In my opinion, everyone can learn English."}, {"tr": "Yeterli zaman ve doğru yöntemle imkansız diye bir şey yok.", "en": "With enough time and the right method, there is no such thing as impossible."}, {"tr": "Ben buna inanıyorum.", "en": "I believe this."}, {"tr": "Ya sen? Sen bu konuda ne düşünüyorsun?", "en": "What about you? What do you think about this?"}, {"tr": "Unutma, senin fikrin de en az benimki kadar değerli.", "en": "Remember, your opinion is at least as valuable as mine."}, {"tr": "Düşüncelerini İngilizce ifade etmekten korkma.", "en": "Don't be afraid to express your thoughts in English."}, {"tr": "Yanlış gramerli bir fikir, hiç söylenmemiş doğru bir fikirden iyidir.", "en": "An opinion with incorrect grammar is better than a correct opinion never expressed."}, {"tr": "Ben buradayım ve fikrimi söylüyorum.", "en": "I am here and I am expressing my opinion."}, {"tr": "49 gündür İngilizce fikir üretiyorum! 🎉", "en": "I have been producing ideas in English for 49 days! 🎉"}], "aktivite": "**Sabah (30 dk): Fikir Belirtme Kalıpları**<br>- 10 farklı kalıpla (\"In my opinion\", \"I believe\", \"From my perspective\" vb.) 2'şer cümle yaz.<br>- Her kalıbı farklı konularda kullan.<br><br>**Öğlen (30 dk): Güncel Konular**<br>- Güncel 5 konu seç (teknoloji, eğitim, sağlık, çevre, ekonomi).<br>- Her biri hakkında fikrini belirten 3 cümle yaz.<br><br>**Akşam (45 dk): \"My Worldview\" Konuşması**<br>- 2-3 dakikalık \"Hayata bakış açım\" konuşması.<br>- Tüm fikir belirtme kalıplarını kullan.<br>- Ses kaydı al."}, {"dayNum": "50", "title": "Agreeing & Disagreeing Politely", "gramerDesc": "Bu günün gramer yapısını çalışacağız.", "kaliplar": [{"en": "I completely agree with you.", "tr": "Sana tamamen katılıyorum."}, {"en": "You're absolutely right.", "tr": "Kesinlikle haklısın."}, {"en": "I see your point, but I think differently.", "tr": "Demek istediğini anlıyorum ama farklı düşünüyorum."}, {"en": "I partly agree, but there is a problem.", "tr": "Kısmen katılıyorum ama bir sorun var."}, {"en": "I'm afraid I disagree.", "tr": "Maalesef katılmıyorum."}, {"en": "That's a good point, I hadn't thought of that.", "tr": "Bu iyi bir nokta, bunu düşünmemiştim."}, {"en": "I couldn't agree more.", "tr": "Daha fazla katılamazdım."}, {"en": "I respect your opinion, but I see things differently.", "tr": "Fikrine saygı duyuyorum ama olaylara farklı bakıyorum."}, {"en": "Let's agree to disagree.", "tr": "Aynı fikirde olmadığımızı kabul edelim."}, {"en": "You've convinced me!", "tr": "Beni ikna ettin!"}], "kelimeler": [{"en": "agree", "tr": "katılmak", "ex": "I agree with that point."}, {"en": "disagree", "tr": "katılmamak", "ex": "I must disagree here."}, {"en": "partly", "tr": "kısmen", "ex": "I partly agree."}, {"en": "entirely", "tr": "tamamen", "ex": "I entirely agree."}, {"en": "absolutely", "tr": "kesinlikle", "ex": "Absolutely right!"}, {"en": "respect", "tr": "saygı duymak", "ex": "I respect your view."}, {"en": "accept", "tr": "kabul etmek", "ex": "I accept your argument."}, {"en": "reject", "tr": "reddetmek", "ex": "I reject that idea."}, {"en": "oppose", "tr": "karşı çıkmak", "ex": "I oppose this plan."}, {"en": "support", "tr": "desteklemek", "ex": "I support your idea."}, {"en": "objection", "tr": "itiraz", "ex": "I have an objection."}, {"en": "counter-argument", "tr": "karşı argüman", "ex": "My counter-argument is..."}, {"en": "valid", "tr": "geçerli", "ex": "That's a valid point."}, {"en": "reasonable", "tr": "mantıklı", "ex": "It's a reasonable idea."}, {"en": "logical", "tr": "mantıklı", "ex": "That's not logical."}, {"en": "convincing", "tr": "ikna edici", "ex": "That's convincing."}, {"en": "weak", "tr": "zayıf (argüman)", "ex": "The argument is weak."}, {"en": "strong", "tr": "güçlü", "ex": "Your point is strong."}, {"en": "compromise", "tr": "uzlaşmak", "ex": "Let's compromise."}, {"en": "debate", "tr": "tartışmak", "ex": "Let's debate this."}], "cumleler": [{"tr": "Sana tamamen katılıyorum.", "en": "I completely agree with you."}, {"tr": "Kesinlikle haklısın.", "en": "You're absolutely right."}, {"tr": "Demek istediğini anlıyorum ama farklı düşünüyorum.", "en": "I see your point, but I think differently."}, {"tr": "Kısmen katılıyorum ama bir sorun var.", "en": "I partly agree, but there is a problem."}, {"tr": "Maalesef katılmıyorum.", "en": "I'm afraid I disagree."}, {"tr": "Bu iyi bir nokta, bunu düşünmemiştim.", "en": "That's a good point; I hadn't thought of that."}, {"tr": "Daha fazla katılamazdım.", "en": "I couldn't agree more."}, {"tr": "Fikrine saygı duyuyorum ama olaylara farklı bakıyorum.", "en": "I respect your opinion, but I see things differently."}, {"tr": "Aynı fikirde olmadığımızı kabul edelim.", "en": "Let's agree to disagree."}, {"tr": "Beni ikna ettin!", "en": "You've convinced me!"}, {"tr": "Sana katılıyorum.", "en": "I agree with you."}, {"tr": "Bence de öyle.", "en": "I think so too."}, {"tr": "Aynen öyle düşünüyorum.", "en": "I think exactly the same."}, {"tr": "Kesinlikle doğru.", "en": "That's absolutely correct."}, {"tr": "Buna hiç şüphe yok.", "en": "There is no doubt about it."}, {"tr": "Tam isabet!", "en": "Spot on!"}, {"tr": "Yüzde yüz haklısın.", "en": "You're a hundred percent right."}, {"tr": "Evet, mantıklı.", "en": "Yes, that makes sense."}, {"tr": "İşte ben de bundan bahsediyorum.", "en": "That's exactly what I'm talking about."}, {"tr": "O konuda sana katılıyorum.", "en": "I agree with you on that."}, {"tr": "Katılmıyorum.", "en": "I don't agree."}, {"tr": "Öyle düşünmüyorum.", "en": "I don't think so."}, {"tr": "Bence yanılıyorsun.", "en": "I think you're mistaken."}, {"tr": "O noktada sana katılmıyorum.", "en": "I disagree with you on that point."}, {"tr": "Yanlış anladığını düşünüyorum.", "en": "I think you've misunderstood."}, {"tr": "Bu pek doğru değil.", "en": "That's not quite right."}, {"tr": "Tam tersini düşünüyorum.", "en": "I think the exact opposite."}, {"tr": "Bunu söylediğin için üzgünüm ama katılmıyorum.", "en": "I'm sorry to say this, but I disagree."}, {"tr": "Demek istediğini anlıyorum ama...", "en": "I understand what you mean, but..."}, {"tr": "Haklı olabilirsin ama bence...", "en": "You might be right, but I think..."}, {"tr": "Evet, ama diğer taraftan...", "en": "Yes, but on the other hand..."}, {"tr": "Bu doğru olsa da şunu unutmamalıyız...", "en": "While that may be true, we shouldn't forget..."}, {"tr": "İyi bir noktaya değindin, lakin...", "en": "You made a good point, however..."}, {"tr": "Güzel söyledin ama beni ikna etmedi.", "en": "You said it well, but it didn't convince me."}, {"tr": "Argümanın geçerli ama eksik.", "en": "Your argument is valid but incomplete."}, {"tr": "Belki de ikimiz de kısmen haklıyız.", "en": "Maybe we're both partly right."}, {"tr": "Bir orta yol bulabiliriz.", "en": "We can find a middle ground."}, {"tr": "Uzlaşmaya varalım.", "en": "Let's reach a compromise."}, {"tr": "Kabul ediyorum, o noktada haksızmışım.", "en": "I admit I was wrong on that point."}, {"tr": "Beni ikna ettin, fikrimi değiştirdim.", "en": "You've convinced me; I've changed my mind."}, {"tr": "Tartışma için teşekkürler.", "en": "Thank you for the discussion."}, {"tr": "Seninle aynı fikirde olmamak güzel.", "en": "It's good to disagree with you."}, {"tr": "Bu sayede yeni şeyler öğreniyorum.", "en": "I'm learning new things this way."}, {"tr": "Sana katılmıyorum ama söylediklerini dinleyeceğim.", "en": "I don't agree with you, but I will listen to what you say."}, {"tr": "Fikrini duymak isterim.", "en": "I'd like to hear your opinion."}, {"tr": "Lütfen devam et, seni dinliyorum.", "en": "Please go on; I'm listening."}, {"tr": "Sözünü kesmek istemem ama bir şey söyleyebilir miyim?", "en": "I don't want to interrupt, but can I say something?"}, {"tr": "Sözünü kestim, özür dilerim.", "en": "I cut you off; I'm sorry."}, {"tr": "Söylediklerini özetleyeyim.", "en": "Let me summarize what you said."}, {"tr": "Anladığım kadarıyla sen şöyle düşünüyorsun...", "en": "As I understand it, you think..."}, {"tr": "Söylediklerinize tamamen katılıyorum; daha iyi ifade edilemezdi.", "en": "I completely agree with what you said; it couldn't be said better."}, {"tr": "Bu noktada hemfikiriz.", "en": "We are in agreement on this point."}, {"tr": "Görüşlerimiz örtüşüyor.", "en": "Our views coincide."}, {"tr": "Fikir birliğine vardığımıza sevindim.", "en": "I'm glad we've reached a consensus."}, {"tr": "Maalesef bu konuda anlaşamıyoruz.", "en": "Unfortunately, we disagree on this issue."}, {"tr": "Aramızda bir fikir ayrılığı var.", "en": "There is a difference of opinion between us."}, {"tr": "Bu noktada çelişiyoruz.", "en": "We are contradicting each other at this point."}, {"tr": "Söylediğin kendi içinde çelişkili.", "en": "What you said is contradictory in itself."}, {"tr": "Mantık hatası yapıyorsun.", "en": "You are making a logical fallacy."}, {"tr": "Bu bir kısır döngüye dönüştü.", "en": "This has turned into a vicious circle."}, {"tr": "Konuyu saptırıyorsun.", "en": "You are digressing from the topic."}, {"tr": "Asıl meseleye dönelim.", "en": "Let's get back to the main issue."}, {"tr": "Saman adam safsatası yapıyorsun.", "en": "You are making a straw man fallacy."}, {"tr": "Benim söylemediğim bir şeye karşı çıkıyorsun.", "en": "You are opposing something I didn't say."}, {"tr": "Lütfen argümanımı çarpıtma.", "en": "Please don't twist my argument."}, {"tr": "Objektif olmaya çalış.", "en": "Try to be objective."}, {"tr": "Duygusallığı bir kenara bırakıp mantıklı konuşalım.", "en": "Let's put emotions aside and speak logically."}, {"tr": "Kanıtın var mı?", "en": "Do you have evidence?"}, {"tr": "Kaynak gösterebilir misin?", "en": "Can you cite a source?"}, {"tr": "Bu istatistikler tezini çürütüyor.", "en": "These statistics disprove your thesis."}, {"tr": "Benim argümanımı çürütemedin.", "en": "You couldn't refute my argument."}, {"tr": "Pes ediyorum, sen kazandın.", "en": "I give up; you won."}, {"tr": "Bu tartışma çok verimli geçti.", "en": "This discussion was very productive."}, {"tr": "Sana katılmıyorum, ama seni anlıyorum.", "en": "I don't agree with you, but I understand you."}, {"tr": "Empati kurmaya çalışıyorum.", "en": "I'm trying to empathize."}, {"tr": "Kendimi senin yerine koyuyorum.", "en": "I'm putting myself in your shoes."}, {"tr": "Senin açından bakınca haklılık payın var.", "en": "From your perspective, you have a point."}, {"tr": "Ama olaya bir de şu pencereden bak.", "en": "But look at the issue from this window as well."}, {"tr": "Eleştirel düşünmek gerek.", "en": "We need to think critically."}, {"tr": "Her duyduğuna inanma.", "en": "Don't believe everything you hear."}, {"tr": "Sorgula, araştır, sonra karar ver.", "en": "Question, research, then decide."}, {"tr": "Eleştiriye açık ol.", "en": "Be open to criticism."}, {"tr": "Fikrimi değiştirmek beni küçültmez.", "en": "Changing my mind doesn't diminish me."}, {"tr": "Aksine büyütür.", "en": "On the contrary, it enlarges me."}, {"tr": "Sen de fikrini değiştirebilirsin.", "en": "You can also change your mind."}, {"tr": "Değişmez doğru yoktur.", "en": "There is no unchangeable truth."}, {"tr": "Newton bile yanıldı.", "en": "Even Newton was wrong."}, {"tr": "Einstein'ın teorisi çürütüldü.", "en": "Einstein's theory was refuted."}, {"tr": "O yüzden \"kesin doğru\" diye bir şey yok.", "en": "So there is no such thing as \"absolute truth.\""}, {"tr": "Her şey tartışmaya açık.", "en": "Everything is open to debate."}, {"tr": "Ben de tartışmaya açığım.", "en": "I am open to debate too."}, {"tr": "Bana karşı tez üretebilirsin.", "en": "You can produce arguments against me."}, {"tr": "Ama saygılı ve seviyeli olmak şartıyla.", "en": "But on condition of being respectful and courteous."}, {"tr": "Biz insanız, fikirlerimiz farklı olabilir.", "en": "We are human; our ideas can be different."}, {"tr": "Ama ortak noktada buluşabiliriz.", "en": "But we can meet at a common point."}, {"tr": "O ortak nokta da insan olmamızdır.", "en": "That common point is that we are human."}, {"tr": "İngilizce tartışmak ayrı bir beceri.", "en": "Debating in English is a separate skill."}, {"tr": "Bunu da öğreniyorum işte.", "en": "I'm learning that too."}, {"tr": "50 gün oldu ve fikirlerimi İngilizce savunabiliyorum.", "en": "It's be ast."}, {"tr": "\"Keşke\" demeyeceğim, \"iyi ki\" diyeceğim.", "en": "I won't say \"I wish,\" I'll say \"I'm glad.\""}, {"tr": "Olanlardan ders aldım.", "en": "I took a lesson from what happened."}, {"tr": "Bana bir şey öğretti.", "en": "It taught me something."}, {"tr": "Ve ben büyüdüm.", "en": "And I grew."}, {"tr": "Şimdi daha güçlüyüm.", "en": "Now I am stronger."}, {"tr": "İngilizce'ye daha erken başlasaydım şimdi anadil gibi konuşurdum.", "en": "If I had started English earlier, I would speak it like a native now."}, {"tr": "Bu planı daha önce keşfetseydim, şimdi B2 seviyesindeydim.", "en": "If I had discovered this plan earlier, I would be at B2 level now."}, {"tr": "Keşke lisedeyken değişim programına katılsaydım.", "en": "I wish I had joined an exchange program in high school."}, {"tr": "O zaman dünyaya bakış açım bambaşka olurdu.", "en": "My perspective on the world would have been completely different then."}, {"tr": "Yurt dışına çıksaydım belki de bambaşka bir hayatım olurdu.", "en": "If I had gone abroad, maybe I would have had a completely different life."}, {"tr": "Ama her şeyin bir zamanı var derler.", "en": "But they say there is a time for everything."}, {"tr": "Belki de geç kalmadım.", "en": "Maybe I'm not late."}, {"tr": "Belki de şimdi tam zamanı.", "en": "Maybe now is the right time."}, {"tr": "Eğer geçmişte takılıp kalırsam geleceği de mahvederim.", "en": "If I get stuck in the past, I will ruin the future too."}, {"tr": "Bunu anlamam yıllarımı aldı.", "en": "It took me years to understand this."}, {"tr": "Keşke daha önce anlasaydım demiyorum.", "en": "I'm not saying I wish I had understood earlier."}, {"tr": "Anladığım için mutluyum.", "en": "I'm happy that I understood."}, {"tr": "Bir hata yapmasaydım bu dersi alamazdım.", "en": "If I hadn't made a mistake, I wouldn't have learned this lesson."}, {"tr": "En büyük öğretmenim başarısızlıklarımdı.", "en": "My greatest teachers were my failures."}, {"tr": "Başarısız olsaydım bile denerdim.", "en": "Even if I had failed, I would have tried."}, {"tr": "Denememektense deneyip başarısız olmayı yeğlerim.", "en": "I would rather try and fail than not try at all."}, {"tr": "Ya beni kovsalardı? Ne yapardım?", "en": "What if they had fired me? What would I have done?"}, {"tr": "Muhtemelen yeni bir iş bulana kadar zorlanırdım.", "en": "I probably would have struggled until I found a new job."}, {"tr": "Ama sonunda bulurdum.", "en": "But I would have found one in the end."}, {"tr": "Hayat her zaman bir yol bulur.", "en": "Life always finds a way."}, {"tr": "Biri bana \"İngilizce zor\" deseydi vazgeçer miydim?", "en": "Would I have given up if someone had told me \"English is hard\"?"}, {"tr": "Eskiden belki evet, şimdi kesinlikle hayır.", "en": "Maybe yes before; definitely no now."}, {"tr": "Aksine hırslanırdım.", "en": "On the contrary, I would have been more determined."}, {"tr": "Bana \"yapamazsın\" dediklerinde daha çok asıldım.", "en": "When they told me \"you can't do it,\" I held on tighter."}, {"tr": "Keşke bana hep \"yapamazsın\" deselerdi, şimdi profesördüm!", "en": "I wish they had always told me \"you can't do it\"; I would be a professor now!"}, {"tr": "Mücadele ruhumu körükledi.", "en": "It fueled my fighting spirit."}, {"tr": "Eğer pes etseydim bugün bu cümleleri yazıyor olmazdım.", "en": "If I had given up, I wouldn't be writing these sentences today."}, {"tr": "Eğer 50 gün önce başlamasaydım, hâlâ sıfırdım.", "en": "If I hadn't started 50 days ago, I would still be at zero."}, {"tr": "Ama başladım ve buradayım.", "en": "But I started and I'm here."}, {"tr": "Küçücük bir adım attım ve dev dağlar aştım.", "en": "I took a tiny step and crossed giant mountains."}, {"tr": "Sana da tavsiyem: Başla.", "en": "My advice to you: Start."}, {"tr": "Yarın başlasaydın, bugün başlamış olmayacaktın.", "en": "If you had started tomorrow, you wouldn't have started today."}, {"tr": "Bugün başla ki yarın \"iyi ki\" de.", "en": "Start today so that tomorrow you say \"I' his too."}, {"tr": "Umarım birçok kişiye ilham olduğu görülür.", "en": "I hope it is seen that it has inspired many people."}, {"tr": "Öğrenmenin yaşı olmadığı bir kez daha ispatlandı.", "en": "It has been proven once again that there is no age for learning."}, {"tr": "İsteyen herkesin bu dili öğrenebileceği kanıksandı.", "en": "It has been accepted that anyone who wants can learn this language."}, {"tr": "Yeterli emek ve zaman verildiğinde sonuç alınacağı biliniyor.", "en": "It is known that results will be achieved when enough effort and time are given."}, {"tr": "\"Emek olmadan yemek olmaz\" atasözü hatırlatıldı.", "en": "The proverb \"No pain, no gain\" was reminded."}, {"tr": "Türkçesi \"Emek olmadan yemek olmaz\"dır.", "en": "In Turkish, it's \"There is no food without effort.\""}, {"tr": "Ben de emeğimi verdim ve meyvesini yiyorum.", "en": "I put in my effort and I am reaping the fruits."}, {"tr": "Siz de yiyorsunuz.", "en": "You are reaping them too."}, {"tr": "Birlikte güzel bir ziyafet çektiğimiz söylenebilir.", "en": "It can be said that we are having a great feast together."}, {"tr": "Ve bu ziyafetin adı İngilizce!", "en": "And the name of this feast is English!"}, {"tr": "52. gün ve hâlâ açım, daha çok öğrenmek istiyorum! 📚", "en": "Day 52 and I'm still hungry; I want to learn more! 📚"}], "aktivite": "**Sabah (30 dk): Resmi Görüş Bildirme**<br>- \"It is said/believed/thought that...\" ile 20 resmi görüş cümlesi yaz.<br>- Ekonomi, eğitim, teknoloji, sağlık, çevre konularında olsun.<br><br>**Öğlen (30 dk): Dönüştürme**<br>- 15 aktif görüş cümlesini pasif hale getir.<br>- Örnek: \"People say English is easy.\" → \"It is said that English is easy.\"<br><br>**Akşam (45 dk): \"General Beliefs\" Konuşması**<br>- 2-3 dakikalık \"Toplumda yaygın olan görüşler ve benim karşı çıktıklarım\" konuşması.<br>- \"It is said that..., but I think...\" yapısını kullan.<br>- Ses kaydı al."}, {"dayNum": "53", "title": "Clauses of Reason & Result (due to / as a result / therefore / since)", "gramerDesc": "Bu günün gramer yapısını çalışacağız.", "kaliplar": [{"en": "I succeeded due to hard work.", "tr": "Sıkı çalışma sayesinde başardım."}, {"en": "Since it rained, we stayed home.", "tr": "Yağmur yağdığı için evde kaldık."}, {"en": "The project failed because of poor planning.", "tr": "Proje kötü planlama yüzünden başarısız oldu."}, {"en": "I was tired; therefore, I went to bed.", "tr": "Yorgundum; bu nedenle yattım."}, {"en": "As a result of the strike, flights were cancelled.", "tr": "Grevin sonucu olarak uçuşlar iptal edildi."}, {"en": "Seeing as you're here, let's start.", "tr": "Madem buradasın, başlayalım."}, {"en": "The reason why I stayed is that I was sick.", "tr": "Kalmamın sebebi hastaydım."}, {"en": "Consequently, we lost the deal.", "tr": "Sonuç olarak anlaşmayı kaybettik."}, {"en": "Thanks to English, I can travel.", "tr": "İngilizce sayesinde seyahat edebiliyorum."}, {"en": "I decided to leave due to the fact that I wasn't happy.", "tr": "Mutlu olmadığım gerçeğinden dolayı ayrılmaya karar verdim."}], "kelimeler": [{"en": "because of", "tr": "yüzünden/sayesinde", "ex": "Because of the rain..."}, {"en": "due to", "tr": "nedeniyle", "ex": "Due to traffic..."}, {"en": "owing to", "tr": "sayesinde/nedeniyle", "ex": "Owing to his help..."}, {"en": "thanks to", "tr": "sayesinde (+ pozitif)", "ex": "Thanks to your support..."}, {"en": "since", "tr": "-diği için (madem)", "ex": "Since you asked..."}, {"en": "as", "tr": "çünkü/-diği için", "ex": "As it was late..."}, {"en": "therefore", "tr": "bu nedenle", "ex": "I was late; therefore..."}, {"en": "consequently", "tr": "sonuç olarak", "ex": "Consequently, we won."}, {"en": "as a result", "tr": "sonuç olarak", "ex": "As a result, it failed."}, {"en": "thus", "tr": "böylece/bu sebeple", "ex": "Thus, we decided."}, {"en": "for this reason", "tr": "bu sebepten", "ex": "For this reason, I left."}, {"en": "that's why", "tr": "işte bu yüzden", "ex": "That's why I came."}, {"en": "accordingly", "tr": "bu doğrultuda", "ex": "We acted accordingly."}, {"en": "in consequence", "tr": "neticesinde", "ex": "In consequence, he left."}, {"en": "the reason why", "tr": "sebebi şu ki", "ex": "The reason why is..."}, {"en": "lead to", "tr": "yol açmak", "ex": "It led to problems."}, {"en": "result in", "tr": "sonuçlanmak", "ex": "It resulted in failure."}, {"en": "bring about", "tr": "meydana getirmek", "ex": "It brought about change."}, {"en": "cause", "tr": "sebep olmak", "ex": "It caused trouble."}, {"en": "trigger", "tr": "tetiklemek", "ex": "It triggered a crisis."}], "cumleler": [{"tr": "Sıkı çalışma sayesinde başardım.", "en": "I succeeded due to hard work."}, {"tr": "Yağmur yağdığı için evde kaldık.", "en": "Since it rained, we stayed home."}, {"tr": "Proje kötü planlama yüzünden başarısız oldu.", "en": "The project failed because of poor planning."}, {"tr": "Yorgundum; bu nedenle yattım.", "en": "I was tired; therefore, I went to bed."}, {"tr": "Grevin sonucu olarak uçuşlar iptal edildi.", "en": "As a result of the strike, flights were cancelled."}, {"tr": "Madem buradasın, başlayalım.", "en": "Seeing as you're here, let's start."}, {"tr": "Kalmamın sebebi hastaydım.", "en": "The reason why I stayed is that I was sick."}, {"tr": "Sonuç olarak anlaşmayı kaybettik.", "en": "Consequently, we lost the deal."}, {"tr": "İngilizce sayesinde seyahat edebiliyorum.", "en": "Thanks to English, I can travel."}, {"tr": "Mutlu olmadığım gerçeğinden dolayı ayrılmaya karar verdim.", "en": "I decided to leave due to the fact that I wasn't happy."}, {"tr": "Trafik yüzünden geç kaldım.", "en": "I was late because of the traffic."}, {"tr": "Senin sayende başardım.", "en": "I succeeded thanks to you."}, {"tr": "Yardımın sayesinde işi alabildim.", "en": "I was able to get the job owing to your help."}, {"tr": "Hasta olduğu için gelemedi.", "en": "He/She couldn't come because he/she was sick."}, {"tr": "Geç olduğu için eve döndüm.", "en": "As it was late, I returned home."}, {"t  "Bunun doğrudan bir sonucu olarak yalnızlık hissi arttı.", "en": "As a direct result of this, the feeling of loneliness increased."}, {"tr": "Pandemi nedeniyle evden çalışma modeline geçildi.", "en": "The remote working model was adopted due to the pandemic."}, {"tr": "Bunun bir yan etkisi olarak toplantılar verimsizleşti.", "en": "Meetings became inefficient as a side effect of this."}, {"tr": "Ancak bunun sayesinde trafik sorunu azaldı.", "en": "However, traffic problems decreased thanks to this."}, {"tr": "Her şeyin bir artısı ve eksisi var.", "en": "Everything has pros and cons."}, {"tr": "Olaylara sebep-sonuç penceresinden bakmak gerekir.", "en": "One must look at events from a cause-and-effect window."}, {"tr": "Eğer sebebi bulursan, sonucu değiştirebilirsin.", "en": "If you find the cause, you can change the result."}, {"tr": "Ben başarısızlığımın sebeplerini buldum.", "en": "I found the reasons for my failure."}, {"tr": "Ve onları düzeltmeye başladım.", "en": "And I started to fix them."}, {"tr": "İngilizcede başarısızlığımın sebebi pratik eksikliğiydi.", "en": "The reason for my failure in English was lack of practice."}, {"tr": "Şimdi her gün pratik yaparak bu sebebi ortadan kaldırdım.", "en": "Now I eliminated this reason by practicing every day."}, {"tr": "Sonuç olarak İngilizcem gelişti.", "en": "As a result, my English improved."}, {"tr": "Sürekli çalıştığım için artık düşünmeden konuşabiliyorum.", "en": "I can now speak without thinking because I studied continuously."}, {"tr": "Dolayısıyla kendime olan güvenim arttı.", "en": "Consequently, my self-confidence increased."}, {"tr": "Bu sayede iş hayatımda da başarılı oldum.", "en": "Thus, I became successful in my business life too."}, {"tr": "Neden sonuç zinciri böyledir.", "en": "The cause-and-effect chain is like this."}, {"tr": "Küçük bir adım atarsın, sonuçları kartopu gibi büyür.", "en": "You take a small step, and the results snowball."}, {"tr": "Ben de 53 gün önce bir adım attım.", "en": "I also took a step 53 days ago."}, {"tr": "Ve sonuçları tahmin edemezdiniz.", "en": "And you couldn't have predicted the results."}, {"tr": "5300 cümle yazdım!", "en": "I wrote 5300 sentences!"}, {"tr": "Bunun sebebi sadece bu plana sadık kalmamdı.", "en": "The reason for this was just sticking to this plan."}, {"tr": "Sadakat ve disiplin sonuç getirdi.", "en": "Loyalty and discipline brought results."}, {"tr": "Aynı şeyi sen de başarabilirsin.", "en": "You can achieve the same thing."}, {"tr": "Çünkü formül belli: Çalış, sonuç al.", "en": "Because the formula is clear: Work, get results."}, {"tr": "Sebep-sonuç ilişkisi evrenseldir.", "en": "The cause-and-effect relationship is universal."}, {"tr": "İngilizce çalışırsan İngilizce öğrenirsin.", "en": "If you study English, you learn English."}, {"tr": "Bu kadar basit.", "en": "It's that simple."}, {"tr": "İşte bu yüzden buradayım.", "en": "That's why I'm here."}, {"tr": "Ve işte bu yüzden devam ediyorum! 📈", "en": "And that's why I'm continuing! 📈"}], "aktivite": "**Sabah (30 dk): Sebep-Sonuç Zinciri**<br>- \"Because / Since / Due to / Therefore / As a result\" ile 20 cümle yaz.<br>- Her bağlacı 4 kez kullanmaya çalış.<br><br>**Öğlen (30 dk): Başarı ve Başarısızlık Analizi**<br>- İngilizce öğrenme sürecindeki başarı ve başarısızlıklarının sebeplerini analiz eden 15 cümle yaz.<br><br>**Akşam (45 dk): \"Why I Succeeded / Why I Failed\" Konuşması**<br>- 2-3 dakikalık konuşma.<br>- Hem başarısızlık hem başarı sebeplerini anlat.<br>- because of, thanks to, due to, therefore, as a result kullan.<br>- Ses kaydı al."}, {"dayNum": "54", "title": "Gerund & Infinitive in Argumentation + HAFTA 9 FİNAL", "gramerDesc": "Bu günün gramer yapısını çalışacağız.", "kaliplar": [{"en": "Learning English is essential.", "tr": "İngilizce öğrenmek şarttır."}, {"en": "To learn English, you need practice.", "tr": "İngilizce öğrenmek için pratik gerek."}, {"en": "I recommend practicing every day.", "tr": "Her gün pratik yapmayı öneririm."}, {"en": ": "Gerçekten de, bu çok önemli.", "en": "Indeed, this is very important."}, {"tr": "Aslında, ben de aynı şeyi düşünüyordum.", "en": "In fact, I was thinking the same thing."}, {"tr": "Aslına bakılırsa, sana katılıyorum.", "en": "As a matter of fact, I agree with you."}, {"tr": "Tam tersine, şiddetle karşı çıkıyorum.", "en": "On the contrary, I strongly oppose."}, {"tr": "Ne de olsa, insanız hata yaparız.", "en": "After all, we are human; we make mistakes."}, {"tr": "Sonuçta, önemli olan ders almaktır.", "en": "After all, the important thing is to take a lesson."}, {"tr": "Her şeyi göz önünde bulundurursak, buna değer.", "en": "All in all, it's worth it."}, {"tr": "Genel olarak değerlendirdiğimizde, başarılıyız.", "en": "Overall, we are successful."}, {"tr": "Dengeye bakılırsa, artıları daha fazla.", "en": "On balance, the pros outweigh the cons."}, {"tr": "Esasen, mesele bir iletişim sorunudur.", "en": "Essentially, the issue is a communication problem."}, {"tr": "Temelde, iki taraf da haklı.", "en": "Fundamentally, both sides are right."}, {"tr": "Nihayetinde, karar senin.", "en": "Ultimately, the decision is yours."}, {"tr": "Yani, anlaşabildik mi?", "en": "That is to say, have we reached an agreement?"}, {"tr": "Açıkçası, pek tatmin olmadım.", "en": "Honestly, I'm not very satisfied."}, {"tr": "Şahsi fikrimi sorarsan, olumlu.", "en": "If you ask my personal opinion, it's positive."}, {"tr": "Lafı dolandırmadan söyleyeyim, olmaz.", "en": "Let me put it bluntly: It won't work."}, {"tr": "İzninle bir şey eklemek isterim.", "en": "With your permission, I'd like to add something."}, {"tr": "Konuşmana saygı duyuyorum.", "en": "I respect your speech."}, {"tr": "Ama birkaç noktaya değinmek istiyorum.", "en": "But I'd like to touch on a few points."}, {"tr": "Seni desteklemediğimi düşünme.", "en": "Don't think I don't support you."}, {"tr": "Sadece farklı bir açıdan bakıyorum.", "en": "I'm just looking from a different angle."}, {"tr": "Eleştirimi yapıcı olarak algıla.", "en": "Take my criticism as constructive."}, {"tr": "Amacım seni kırmak değil.", "en": "My aim is not to hurt you."}, {"tr": "Daha iyi bir çözüm bulmaya çalışıyorum.", "en": "I'm trying to find a better solution."}, {"tr": "Birlikte daha iyisini yapabiliriz.", "en": "We can do better together."}, {"tr": "Benimle aynı fikirde olmanı beklemiyorum.", "en": "I don't expect you to agree with me."}, {"tr": "Sadece beni dinle, yeter.", "en": "Just listen to me; that's enough."}, {"tr": "Ben de seni dinliyorum.", "en": "I'm listening to you too."}, {"tr": "Tartışmanın sonunda birbirimizi anladık.", "en": "At the end of the discussion, we understood each other."}, {"tr": "Bu bile başlı başına bir başarı.", "en": "Even this in itself is a success."}, {"tr": "Tartışarak öğreniyoruz.", "en": "We are learning by discussing."}, {"tr": "Öncelikle belirtmek isterim ki, bu bir suçlama değil.", "en": "First of all, I'd like to state that this is not an accusation."}, {"tr": "Meseleyi açıklığa kavuşturmak gerekirse...", "en": "To clarify the issue..."}, {"tr": "Konuyu dağıtmadan ana noktaya odaklanalım.", "en": "Let's focus on the main point without digressing from the topic."}, {"tr": "Söylediklerimi yanlış anlamışsın.", "en": "You have misunderstood what I said."}, {"tr": "Demek istediğim aslında şuydu...", "en": "What I actually meant was..."}, {"tr": "Şimdi sırayla gidelim, önce seni dinleyelim.", "en": "Let's go in order now; let's listen to you first."}, {"tr": "Sözünü kesmeden dinleyeceğim.", "en": "I will listen without interrupting you."}, {"tr": "Lütfen ben de sözümü tamamlayayım.", "en": "Please let me finish my sentence too."}, {"tr": "Birbimizin sözünü kesersek hiçbir yere varamayız.", "en": "If we interrupt each other, we'll get nowhere."}, {"tr": "İddialarını somut verilerle desteklemelisin.", "en": "You should support your claims with concrete data."}, {"tr": "Duyduğum kadarıyla bir güven sorunu var.", "en": "From what I've heard, there is a trust issue."}, {"tr": "Bunu çözmek için şeffaflık şart.", "en": "Transparency is a must to solve this."}, {"tr": "Karşılıklı anlayışla her sorunu çözeriz.", "en": "We can solve any problem with mutual understanding."}, {"tr": "Kurumsal aidiyet duygusunu artırmak zorundayız.", "en": "We have to increase the sense of corporate belonging."}, {"tr": "Aksi takdirde yetenek kaybı yaşarız.", "en": "Otherwise, we will experience a brain drain."}, {"tr": "Çalışan memnuniyetini artırmanın yollarını aramalıyız.", "en": "We must look for ways to increase employee satisfaction."}, {"tr": "Bu da maaştan öte, değer görmekle ilgilidir.", "en": "And this is about being valued, beyond salary."}, {"tr": "İnsanlar duyulmak ister.", "en": "People want to be heard."}, {"tr": "Ben de şimdi sizi duyuyorum.", "en": "And I am hearing you now."}, {"tr": "Bugünkü konuşmamızın özeti şudur:", "en": "The summary of our conversation today is:"}, {"tr": "Birlikte çalışırsak başarırız.", "en": "If we work together, we will succeed."}, {"tr": "Bireysel başarı değil, takım başarısı önemli.", "en": "It's not individual success, but team success that matters."}, {"tr": "Toplantıyı burada bağlamak istiyorum.", "en": "I'd like to wrap up the meeting here."}, {"tr": "Katılımınız ve değerli fikirleriniz için teşekkür ederim.", "en": "Thank you for your participation and valuable ideas."}, {"tr": "Anlaşamasak da tartışmak güzeldi.", "en": "Even though we didn't agree, discussing was nice."}, {"tr": "Bir sonraki toplantıda bu konuyu tekrar ele alalım.", "en": "Let's address this issue again at the next meeting."}, {"tr": "O zamana kadar araştırma yapalım.", "en": "Let's do some research until then."}, {"tr": "Veri toplamak için herkese görev dağılımı yapalım.", "en": "Let's distribute tasks to everyone to collect data."}, {"tr": "Daha sağlıklı bir tartışma için bilgi şart.", "en": "Information is a must for a healthier discussion."}, {"tr": "Bilinçsiz tartışma sadece gürültüdür.", "en": "Uninformed discussion is just noise."}, {"tr": ifficult situation, I first stay calm, then analyze."}, {"tr": "Analitik düşünme yeteneğim sayesinde karmaşık verileri anlamlandırabiliyorum.", "en": "I can make sense of complex data thanks to my analytical thinking ability."}, {"tr": "İletişim becerilerim sayesinde ekip içi çatışmaları kolayca çözebiliyorum.", "en": "I can easily resolve conflicts within the team thanks to my communication skills."}, {"tr": "Liderlik benim için sadece yönetmek değil, ilham vermektir.", "en": "Leadership for me is not just managing, but inspiring."}, {"tr": "Birlikte çalıştığım insanların potansiyellerini ortaya çıkarmalarına yardımcı olurum.", "en": "I help the people I work with to reveal their potential."}, {"tr": "Detay odaklılığım sayesinde hatalar büyümeden yakalarım.", "en": "Thanks to being detail-oriented, I catch mistakes before they grow."}, {"tr": "Zaman yönetimi konusunda Eisenhower matrisini kullanırım.", "en": "I use the Eisenhower matrix for time management."}, {"tr": "Önceliklendirme yaparak en kritik işleri zamanında bitiririm.", "en": "I finish the most critical tasks on time by prioritizing."}, {"tr": "Uyum yeteneğim sayesinde yeni teknolojilere ve süreçlere hızla alışırım.", "en": "I quickly get used to new technologies and processes thanks to my adaptability."}, {"tr": "Duygusal zekâm sayesinde ekip arkadaşlarımın moralini yüksek tutarım.", "en": "I keep my teammates' morale high thanks to my emotional intelligence."}, {"tr": "Kendimi sürekli geliştirmek için online kurslar alıyorum.", "en": "I take online courses to continuously improve myself."}, {"tr": "Şu ana kadar 3 farklı programlama dili öğrendim.", "en": "I have learned 3 different programming languages so far."}, {"tr": "Bu da öğrenmeye ne kadar açık olduğumu gösterir.", "en": "This shows how open I am to learning."}, {"tr": "Müşteri odaklı yaklaşımım sayesinde şikayetleri fırsata çeviririm.", "en": "I turn complaints into opportunities thanks to my customer-oriented approach."}, {"tr": "Bir müşterim rking on is time management."}, {"tr": "Mükemmeliyetçi olma eğilimindeyim ama bırakmayı öğreniyorum.", "en": "I tend to be a perfectionist, but I'm learning to let go."}, {"tr": "Eskiden yüzleşmekten kaçınırdım ama şimdi sorunlara doğrudan yaklaşıyorum.", "en": "I used to avoid confrontation, but now I address issues directly."}, {"tr": "Kodlamada çok deneyimli değilim ama kurslar alıyorum.", "en": "I'm not very experienced in coding, but I'm taking courses."}, {"tr": "Zayıflığım çok sık evet dememdir.", "en": "My weakness is that I say yes too often."}, {"tr": "Bazen detaylara çok odaklanıp büyük resmi kaçırırım.", "en": "I sometimes focus too much on details and miss the big picture."}, {"tr": "Sabrımı geliştirmem gerektiğinin farkındayım.", "en": "I'm aware that I need to improve my patience."}, {"tr": "Daha girişken olmak için aktif olarak çalışıyorum.", "en": "I'm actively working on becoming more assertive."}, {"tr": "Bazen hayır demekte zorlanırım.", "en": "I sometimes struggle to say no."}, {"tr": "Aşırı düşünme eğilimindeyim.", "en": "I tend to overthink."}, {"tr": "Sunum yaparken heyecanlanabilirim.", "en": "I can get nervous while giving presentations."}, {"tr": "Yeni bir ekiple tanışırken utangaç olabilirim.", "en": "I can be shy when meeting a new team."}, {"tr": "Ama buzlar kırıldıktan sonra rahatlarım.", "en": "But I relax after the ice is broken."}, {"tr": "Bazen geri bildirim verirken zorlanırım.", "en": "I sometimes struggle when giving feedback."}, {"tr": "Ama bunu geliştirmek için kitap okuyorum.", "en": "But I'm reading books to improve this."}, {"tr": "Hatalarımı kabul etmekte zorlanmam ama düzeltmeye çalışırım.", "en": "I don't struggle to admit my mistakes, but I try to fix them."}, {"tr": "İşleri bazen son dakikaya bırakırım.", "en": "I sometimes leave things to the last minute."}, {"tr": "Ama artık planlayıcı kullanıyorum.", "en": "But now I'm using a planner."}, {"tr": "Yabancı dil konusunda kendimi geliştirmeliyim.", "en": "I need to improve myself in foreign languages."}, {"tr": "İşte bu yüzden İngilizce çalışıyorum.", "en": "That's why I'm studying English."}, {"tr": "Geri bildirim aldım, aceleci olduğumu söylediler.", "en": "I received feedback; they said I'm hasty."}, {"tr": "Şimdi karar vermeden önce bir gece düşünüyorum.", "en": "Now I sleep on it before making a decision."}, {"tr": "Bazen sesim fazla alçak çıkabiliyor.", "en": "Sometimes my voice can come out too low."}, {"tr": "Ama diksiyon eğitimi aldım ve düzeliyor.", "en": "But I took diction training and it's improving."}, {"tr": "Rapor yazarken çok vakit harcıyorum.", "en": "I spend too much time writing reports."}, {"tr": "Şablonlar oluşturarak bu süreyi kısaltıyorum.", "en": "I'm shortening this time by creating templates."}, {"tr": "Dijital araçları kullanmakta bazen zorlanırım.", "en": "I sometimes struggle with using digital tools."}, {"tr": "Ama Youtube'dan eğitim videoları izliyorum.", "en": "But I'm watching tutorial videos on YouTube."}, {"tr": "Büyük resmi görmekte zorlandığım olmuştur.", "en": "There have been times when I struggled to see the big picture."}, {"tr": "Bunun için mentorumdan yardım alıyorum.", "en": "I'm getting help from my mentor for this."}, {"tr": "Stresli anlarda sabırsız olabilirim.", "en": "I can be impatient in stressful moments."}, {"tr": "Nefes egzersizleri yaparak sakinleşiyorum.", "en": "I calm down by doing breathing exercises."}, {"tr": "En büyük zayıflığım kendime çok yüklenmek.", "en": "My biggest weakness is being too hard on myself."}, {"tr": "Ama öz şefkat üzerine çalışıyorum.", "en": "But I'm working on self-compassion."}, {"tr": "Çok fazla sorumluluk alıyorum, bu da tükenmişliğe yol açıyor.", "en": "I take on too much responsibility, and this leads to burnout."}, {"tr": "Artık sınır koymayı öğreniyorum.", "en": "I'm now learning to set boundaries."}, {"tr": "Hayır demeyi öğrenmek benim için büyük bir adımdı.", "en": "Learning to say no was a big step for me."}, {"tr": "Bazen pasif agresif olabiliyorum, bunu biliyorum.", "en": "I can be passive-aggressive sometimes; I know this."}, {"tr": "Ve bu konuda farkındalık kazandım.", "en": "And I've gained awareness about this."}, {"tr": "Şimdi duygularımı daha açık ifade ediyorum.", "en": "Now I express my feelings more openly."}, {"tr": "Liderlik konusunda kendimi yetersiz hissettiğim anlar oldu.", "en": "There were moments when I felt inadequate in leadership."}, {"tr": "Ama küçük adımlarla bu korkuyu yendim.", "en": "But I overcame this fear with small steps."}, {"tr": "Mükemmel olmak zorunda değilim, yeterince iyi olabilirim.", "en": "I don't have to be perfect; I can be good enough."}, {"tr": "Bu zihniyet değişikliği bana çok şey kattı.", "en": "This mindset change added a lot to me."}, {"tr": "Zayıf yönlerimi gizlemek yerine onlarla yüzleşirim.", "en": "Instead of hiding my weaknesses, I confront them."}, {"tr": "Onları birer gelişim fırsatı olarak görürüm.", "en": "I see them as opportunities for growth."}, {"tr": "Zayıflık aslında güce dönüşebilir.", "en": "A weakness can actually turn into a strength."}, {"tr": "Yeter ki farkında ol ve çalış.", "en": "As long as you are aware and work on it."}, {"tr": "İK uzmanları zayıf yön sorusunu samimiyeti ölçmek için sorar.", "en": "HR experts ask the weakness question to measure sincerity."}, {"tr": "\"Mükemmeliyetçiyim\" demek klişedir ve artık gerçekçi bulunmaz.", "en": "Saying \"I'm a perfectionist\" is cliché and no longer found realistic."}, {"tr": "Onun yerine gerçek bir zayıflığı kabul edip gelişim planı sunmalısın.", "en": "Instead, you should admit a real weakness and present an improvement plan."}, {"tr": "Ben de görüşmede şöyle derim: \"Zaman yönetimimde zorlanıyordum.\"", "en": "I will say in the interview: \"I used to struggle with time management.\""}, {"tr": "\"Ama Pomodoro tekniğini öğrendim ve üretkenliğim %40 arttı.\"", "en": "\"But I learned the Pomodoro technique and my productivity increased by 40%.\""}, {"tr": "Zayıflığımı istatistikle destekleyerek gelişimimi kanıtlarım.", "en": "I prove my improvement by supporting my weakness with statistics."}, {"tr": "Daha önce İngilizce konuşma konusunda özgüvensizdim.", "en": "Previously, I lacked confidence in speaking English."}, {"tr": "Ama şimdi her gün pratik yapıyor ve gelişiyorum.", "en": "But now I practice every day and I'm improving."}, {"tr": "Bu plana başladığımda konuşamazdım, şimdi 5600 cümle yazdım.", "en": "When I started this plan, I couldn't speak; now I've written 5600 sentences."}, {"tr": "İşte bu somut bir gelişim göstergesidir.", "en": "This is a concrete indicator of improvement."}, {"tr": "Mülakatta zayıf yön sorusuna asla \"hiç zayıf yönüm yok\" deme.", "en": "Never say \"I have no weaknesses\" to the weakness question in an interview."}, {"tr": "Bu kibir veya öz farkındalık eksikliği olarak algılanır.", "en": "This is perceived as arrogance or lack of self-awareness."}, {"tr": "Bunun yerine samimi ve çözüm odaklı ol.", "en": "Instead, be sincere and solution-oriented."}, {"tr": "Bir başka zayıflığım: Aşırı empati yapıyorum.", "en": "Another weakness of mine: I empathize too much."}, {"tr": "Müşterinin sorununu kendi sorunum gibi görüp strese giriyorum.", "en": "I see the client's problem as my own and get stressed."}, {"tr": "Bunu yönetmek için duygusal dayanıklılık eğitimi aldım.", "en": "I took emotional resilience training to manage this."}, {"tr": "Şimdi profesyonel mesafeyi koruyarak yardım edebiliyorum.", "en": "Now I can help while maintaining professional distance."}, {"tr": "Aşırı detaycılığım yüzünden bazen işleri yetiştiremiyordum.", "en": "I sometimes couldn't finish work on time because of my excessive attention to detail."}, {"tr": "Şimdi 80/20 kuralını uyguluyorum: sonucun %80'ini veren %20'ye odaklanıyorum.", "en": "Now I apply the 80/20 rule: I focus on the 20% that gives 80% of the result."}, {"tr": "Bu sayede hem hızlı hem kaliteli iş çıkarıyorum.", "en": "In this way, I deliver both fast and quality work."}, {"tr": "Eleştiriye açık olmak da benim için gelişim alanıydı.", "en": "Being open to criticism was also an area of improvement for me."}, {"tr": "Eskiden savunmaya geçerdim, şimdi \"teşekkür ederim\" diyorum.", "en": "I used to get defensive; now I say \"thank you.\""}, {"tr": "Bu değişim sayesinde iş arkadaşlarımla ilişkim güçlendi.", "en": "My relationship with my colleagues strengthened thanks to this change."}, {"tr": "\"Hayır\" diyememek kariyerimin başında beni çok yordu.", "en": "Not being able to say \"no\" exhausted me a lot at the beginning of my career."}, {"tr": "Şimdi \"Hayır, ama şöyle yardımcı olabilirim\" demeyi öğrendim.", "en": "Now I learned to say \"No, but I can help this way.\""}, {"tr": "Bu hem beni koruyor hem ilişkileri zedelemiyor.", "en": "This both protects me and doesn't damage relationships."}, {"tr": "Zayıf yönlerimi anlatırken aslında ne kadar güçlü olduğumu gösteririm.", "en": "When describing my weaknesses, I actually show how strong I am."}, {"tr": "Çünkü zayıflığını bilen insan güçlüdür.", "en": "Because a person who knows their weakness is strong."}, {"tr": "Öz farkındalık, duygusal zekanın en önemli bileşenidir.", "en": "Self-awareness is the most important component of emotional intelligence."}, {"tr": "Ve ben öz farkındalığımı sürekli geliştiriyorum.", "en": "And I am continuously improving my self-awareness."}, {"tr": "Geri bildirim kültürüne inanırım.", "en": "I believe in the feedback culture."}, {"tr": "360 derece değerlendirme sonuçlarımı ciddiye alırım.", "en": "I take my 360-degree evaluation results seriously."}, {"tr": "Bana söylenen gelişim alanlarını not alır ve eylem planı yaparım.", "en": "I note down the improvement areas told to me and make an action plan."}, {"tr": "Bu planı da uygularım, rafa kaldırmam.", "en": "I also implement this plan; I don't shelve it."}, {"tr": "Gelişim süreci bitmeyen bir yolculuktur.", "en": "The development process is an endless journey."}, {"tr": "Ben de bu yolculuğun tadını çıkarıyorum.", "en": "And I am enjoying this journey."}, {"tr": "Zayıflıklarımı paylaşmak beni insan yapar.", "en": "Sharing my weaknesses makes me human."}, {"tr": "Robot değiliz, mükemmel değiliz.", "en": "We are not robots; we are not perfect."}, {"tr": "Önemli olan farkında olup gelişmek.", "en": "The important thing is to be aware and improve."}, {"tr": "Ben gelişime açık bir insanım.", "en": "I am a person open to improvement."}, {"tr": "Ve bu da belki de en büyük gücüm.", "en": "And maybe this is my greatest strength too."}, {"tr": "Görüşmede zayıf yönümü sorduklarında gülümseyerek anlatırım.", "en": "When they ask about my weakness in an interview, I will tell it with a smile."}, {"tr": "Çünkü zayıflık utanılacak değil, geliştirilecek bir şeydir.", "en": "Because weakness is not something to be ashamed of, but something to be improved."}, {"tr": "İşveren de bunu bilir.", "en": "The employer knows this too."}, {"tr": "Asıl tehlike zayıflığının farkında olmayan adaydır.", "en": "The real danger is the candidate who is unaware of their weaknesses."}, {"tr": "Ben farkındayım.", "en": "I am aware."}, {"tr": "Ve gelişiyorum.", "en": "And I am improving."}, {"tr": "İngilizcemin gelişimi de bunun kanıtı.", "en": "The improvement of my English is also proof of this."}, {"tr": "56 gün önce zayıftı, şimdi güçleniyor!", "en": "56 days ago it was weak; now it's getting stronger!"}, {"tr": "Ve itiraf etmekten gurur duyuyorum! 💪", "en": "And I'm proud to admit it! 💪"}], "aktivite": "**Sabah (30 dk): Zayıflığı Gelişime Çevirme**<br>- 10 zayıf yönünü \"I used to... but now I...\" veya \"I sometimes... but I'm working on...\" kalıbıyla yaz.<br>- Her birine somut gelişim kanıtı ekle.<br><br>**Öğlen (30 dk): Mülakat Provası**<br>- \"What is your biggest weakness?\" sorusuna STAR metoduna benzer şekilde cevap veren 5 paragraf yaz.<br>- Her cevap: Zayıflık + Farkındalık + Aksiyon + Sonuç içersin.<br><br>**Akşam (45 dk): \"My Weakness, My Growth\" Konuşması**<br>- 2-3 dakikalık \"Zayıf yönler owth goals align with my personal goals."}, {"tr": "Bu yüzden burası benim için ideal bir yer.", "en": "That's why this place is ideal for me."}, {"tr": "Uzun vadede şirkete değer katacak projelere imza atmak istiyorum.", "en": "In the long term, I want to undertake projects that will add value to the company."}, {"tr": "10 yıl sonra geriye dönüp baktığımda \"İyi ki buradaydım\" demek istiyorum.", "en": "When I look back 10 years from now, I want to say \"I'm glad I was here.\""}, {"tr": "Kariyerim boyunca bir iz bırakmak istiyorum.", "en": "I want to leave a mark throughout my career."}, {"tr": "\"O buradayken neler başardı\" desinler.", "en": "Let them say, \"Look what he/she achieved while he/she was here.\""}, {"tr": "Hedefim sadece maaş değil, anlam.", "en": "My goal is not just salary, but meaning."}, {"tr": "Yaptığım işin bir önemi olmalı.", "en": "The work I do should have significance."}, {"tr": "İnsanların hayatına dokunmalıyım.", "en": "I should touch people's lives."}, {"tr": "Ürünümüzle, hizmetimizle, liderliğimizle...", "en": "With our product, our service, our leadership..."}, {"tr": "Gelecek planlarımda sosyal sorumluluk da var.", "en": "Social responsibility is also in my future plans."}, {"tr": "Bilgi birikimimi dezavantajlı gruplarla paylaşmak istiyorum.", "en": "I want to share my knowledge with disadvantaged groups."}, {"tr": "Ücretsiz eğitimler vermeyi planlıyorum.", "en": "I plan to give free trainings."}, {"tr": "İngilizce öğrenme fırsatı olmayanlara bu planı ulaştırmak istiyorum.", "en": "I want to deliver this plan to those who don't have the opportunity to learn English."}, {"tr": "Çünkü bilgi paylaştıkça çoğalır.", "en": "Because knowledge multiplies as it is shared."}, {"tr": "Bu plan da paylaşarak büyüdü.", "en": "This plan also grew by sharing."}, {"tr": "Kariyerimin zirvesinde hayır işleriyle uğraşacağım.", "en": "At the peak of my career, I will be engaged in charity work."}, {"tr": "Vakıf kurmayı bile düşünüyorum.", "en": "I am even thinking of establishing a foundation."}, {"tr": "\"Eğitimde Fırsat Eşitliği\" için çalışacağım.", "en": "I will work for \"Equal Opportunity in Education.\""}, {"tr": "İşte benim büyük resmim bu.", "en": "This is my big picture."}, {"tr": "Sadece iş değil, bir misyon.", "en": "Not just a job, but a mission."}, {"tr": "Umarım siz de bu misyonda bana eşlik edersiniz.", "en": "I hope you will accompany me on this mission too."}, {"tr": "Görüşmede kariyer hedefimi sorduklarında böyle cevap vereceğim.", "en": "I will answer like this when they ask about my career goal in the interview."}, {"tr": "Sadece ne istediğimi değil, neden istediğimi de anlatacağım.", "en": "I will explain not only what I want, but why I want it."}, {"tr": "Çünkü \"neden\" olmadan \"ne\" olmaz.", "en": "Because without \"why,\" there is no \"what.\""}, {"tr": "Benim nedenim: Dünyayı daha iyi bir yer yapmak.", "en": "My why is: To make the world a better place."}, {"tr": "Kulağa büyük geliyor, biliyorum.", "en": "It sounds big, I know."}, {"tr": "Ama büyük işler büyük hayallerle başlar.", "en": "But big things start with big dreams."}, {"tr": "Ben de hayal ediyorum.", "en": "I am also dreaming."}, {"tr": "Ve hayallerimi gerçekleştirmek için her gün bir adım atıyorum.", "en": "And I take a step every day to realize my dreams."}, {"tr": "Bugün 58. gün ve hâlâ yoldayım.", "en": "Today is the 58th day and I'm still on the road."}, {"tr": "5800 cümlelik bir hayal bu.", "en": "This is a dream of 5800 sentences."}, {"tr": "Ve bu hayalin sonuna yaklaşıyorum.", "en": "And I'm approaching the end of this dream."}, {"tr": "Ama bu son, yeni bir başlangıç.", "en": "But this end is a new beginning."}, {"tr": "Bu plan bittiğinde İngilizce öğrenme yolculuğum bitmeyecek.", "en": "When this plan ends, my English learning journey won't end."}, {"tr": "Çünkü dil öğrenmek bir varış değil, sürekli bir yolculuktur.", "en": "Because learning a language is not a destination; it's a continuous journey."}, {"tr": "Ve ben bu yolculuğa aşığım.", "en": "And I am in love with this journey."}, {"tr": "Gelecekteki ben, şimdiki bana teşekkür edecek.", "en": "My future self will thank my present self."}, {"tr": "\"İyi ki o plana başlamışsın ve devam etmişsin\" diyecek.", "en": "He/She will say, \"I'm glad you started that plan and continued.\""}, {"tr": "Ve ben o günü dört gözle bekliyorum! 🌟", "en": "And I'm looking forward to that day! 🌟"}], "aktivite": "**Sabah (30 dk): Kariyer Zaman Çizelgesi**<br>- 1 yıl, 3 yıl, 5 yıl, 10 yıl ve 20 yıl için kariyer hedeflerini anlatan 15 cümle yaz.<br>- Her zaman dilimi için farklı future form kullan (plan to, will, will be, will have, aim to).<br><br>**Öğlen (30 dk): Şirkete Değer Katma**<br>- \"If I join your company, I will...\" yapısıyla 15 cümle yaz.<br>- Somut katkıları ve yenilikleri anlat.<br><br>**Akşam (45 dk): \"Where Do You See Yourself in 5 Years?\" Konuşması**<br>- 2-3 dakikalık \"5 yıl içinde kendimi nerede görüyorum?\" konuşması.<br>- Tüm future formları kullan.<br>- Ses kaydı al."}, {"dayNum": "59", "title": "Modal Verbs for Professionalism (would, could, may, might)", "gramerDesc": "Bu günün gramer yapısını çalışacağız.", "kaliplar": [{"en": "I would like to join your team.", "tr": "Ekibinize katılmak isterim."}, {"en": "Could you tell me more about the role?", "tr": "Bana rol hakkında daha fazla bilgi verebilir misiniz?"}, {"en": "I would be happy to provide references.", "tr": "Referans vermekten mutluluk duyarım."}, {"en": "May I ask what the next steps are?", "tr": "Sonraki adımların ne olduğunu sorabilir miyim?"}, {"en": "I might need some time to think about the offer.", "tr": "Teklif hakkında düşünmek için biraz zamana ihtiyaç duyabilirim."}, {"en": "Would it be possible to work remotely?", "tr": "Uzaktan çalışmak mümkün olabilir mi?"}, {"en": "I could start immediately if needed.", "tr": "Gerekirse hemen başlayabilirim."}, {"en": "I would appreciate your feedback.", "tr": "Geri bildiriminizi takdir ederim."}, {"en": "Might I suggest an alternative solution?", "tr": "Alternatif bir çözüm önerebilir miyim?"}, {"en": "I would prefer to discuss this further.", "tr": "Bunu daha fazla tartışmayı tercih ederim."}], "kelimeler": [{"en": "would", "tr": "-erdi (kibar istek)", "ex": "I would like to apply."}, {"en": "could", "tr": "-ebilir miydi", "ex": "Could you help me?"}, {"en": "may", "tr": "-ebilir miyim (izin)", "ex": "May I come in?"}, {"en": "might", "tr": "-ebilir (düşük ihtimal)", "ex": "I might be available."}, {"en": "appreciate", "tr": "takdir etmek", "ex": "I would appreciate it."}, {"en": "consider", "tr": "değerlendirmek", "ex": "I would consider it."}, {"en": "suggest", "tr": "önermek", "ex": "Might I suggest..."}, {"en": "recommend", "tr": "tavsiye etmek", "ex": "I would recommend..."}, {"en": "prefer", "tr": "tercih etmek", "ex": "I would prefer..."}, {"en": "be happy to", "tr": "memnuniyetle", "ex": "I'd be happy to help."}, {"en": "be delighted to", "tr": "memnuniyetle (daha resmi)", "ex": "I'd be delighted to join."}, {"en": "be grateful", "tr": "minnettar olmak", "ex": "I'd be grateful if..."}, {"en": "opportunity", "tr": "fırsat", "ex": "I'd welcome the opportunity."}, {"en": "possible", "tr": "mümkün", "ex": "Would it be possible...?"}, {"en": "convenient", "tr": "uygun", "ex": "Would it be convenient...?"}, {"en": "available", "tr": "müsait", "ex": "Would you be available...?"}, {"en": "wonder if", "tr": "acaba diye merak etmek", "ex": "I was wondering if..."}, {"en": "perhaps", "tr": "belki", "ex": "Perhaps we could..."}, {"en": "kindly", "tr": "nazikçe", "ex": "Could you kindly...?"}, {"en": "unfortunately", "tr": "maalesef", "ex": "Unfortunately, I can't."}], "cumleler": [{"tr": "Ekibinize katılmak isterim.", "en": "I would like to join your team."}, {"tr": "Bana rol hakkında daha fazla bilgi verebilir misiniz?", "en": "Could you tell me more about the role?"}, {"tr": "Referans vermekten mutluluk duyarım.", "en": "I would be happy to provide references."}, {"tr": "Sonraki adımların ne olduğunu sorabilir miyim?", "en": "May I ask what the next steps are?"}, {"tr": "Teklif hakkında düşünmek için biraz zamana ihtiyaç duyabilirim.", "en": "I might need some time to think about the offer."}, {"tr": "Uzaktan çalışmak mümkün olabilir mi?", "en": "Would it be possible to work remotely?"}, {"tr": "Gerekirse hemen başlayabilirim.", "en": "I could start immediately if needed."}, {"tr": "Geri bildiriminizi takdir ederim.", "en": "I would appreciate your feedback."}, {"tr": "Alternatif bir çözüm önerebilir miyim?", "en": "Might I suggest an alternative solution?"}, {"tr": "Bunu daha fazla tartışmayı tercih ederim.", "en": "I would prefer to discuss this further."}, {"tr": "Bir soru sorabilir miyim?", "en": "May I ask a question?"}, {"tr": "Özgeçmişimi size gönderebilir miyim?", "en": "Could I send you my CV?"}, {"tr": "Acaba başlama tarihini konuşabilir miyiz?", "en": "I was wondering if we could discuss the start date."}, {"tr": "Müsaitseniz sizi arayabilir miyim?", "en": "Could I call you if you are available?"}, {"tr": "Bana bu fırsatı verdiğiniz için minnettarım.", "en": "I am grateful for giving me this opportunity."}, {"tr": "Toplantıyı yarın yapsak olur mu?", "en": "Would it be possible to have the meeting tomorrow?"}, {"tr": "Biraz daha düşünmek isteyebilirim.", "en": "I might want to think a bit more."}, {"tr": "Becerilerimin bu pozisyona uygun olduğunu düşünüyorum.", "en": "I believe my skills would suit this position."}, {"tr": "Referans olarak sizi gösterebilir miyim?", "en": "Could I list you as a reference?"}, {"tr": "Belki de birlikte bir kahve içebiliriz.", "en": "Perhaps we could have a coffee together."}, {"tr": "Maaş aralığınızı öğrenebilir miyim?", "en": "Could I learn your salary range?"}, {"tr": "Esnek çalışma saatleri mümkün müdür?", "en": "Would flexible working hours be possible?"}, {"tr": "Sana yardım etmekten mutluluk duyarım.", "en": "I would be happy to help you."}, {"tr": "Başka bir sorunuz olursa lütfen çekinmeyin.", "en": "If you have any further questions, please don't hesitate."}, {"tr": "Teklifinizi değerlendireceğim.", "en": "I would consider your offer."}, {"tr": "Cevabınızı bekliyor olacağım.", "en": "I will be waiting for your reply."}, {"tr": "Telefon numaranızı alabilir miyim?", "en": "Could I get your phone number?"}, {"tr": "Bana biraz daha zaman verebilir misiniz?", "en": "Could you give me a bit more time?"}, {"tr": "Bu pozisyon için uygun olabilirim.", "en": "I might be suitable for this position."}, {"tr": "Görüşme için teşekkür ederim.", "en": "I would like to thank you for the interview."}, {"tr": "Teklifiniz beni heyecanlandırdı.", "en": "Your offer would excite me."}, {"tr": "Umarım birlikte çalışabiliriz.", "en": "I hope we could work together."}, {"tr": "Sormak istediğiniz başka bir şey var mı?", "en": "Is there anything else you would like to ask?"}, {"tr": "Cevap vermek için bir gün izin isteyebilir miyim?", "en": "May I have a day to respond?"}, {"tr": "Bu karar benim için çok önemli.", "en": "This decision would be very important for me."}, {"tr": "Sizinle çalışmak bir onur olur.", "en": "It would be an honor to work with you."}, {"tr": "Acaba yardım edebilir misiniz?", "en": "I wonder if you could help."}, {"tr": "Sözleşmeyi inceleyebilir miyim?", "en": "Could I review the contract?"}, {"tr": "Belki yarın tekrar görüşebiliriz.", "en": "Perhaps we could meet again tomorrow."}, {"tr": "Size bir teklifim olabilir.", "en": "I might have a proposal for you."}, {"tr": "Lütfen beni anlayışla karşılayın.", "en": "Please be understanding."}, {"tr": "Şu an müsait değilim.", "en": "I might not be available right now."}, {"tr": "Sizi temin ederim ki...", "en": "I can assure you that..."}, {"tr": "Bu konuda deneyimliyimdir.", "en": "I would say I am experienced in this."}, {"tr": "İşi kabul etmeden önce aileme danışabilir miyim?", "en": "Could I consult my family before accepting the job?"}, {"tr": "Lojman imkanı var mı?", "en": "Would there be accommodation?"}, {"tr": "Deneme süresi ne kadar?", "en": "How long would the probation period be?"}, {"tr": "Bu proje beni gerçekten heyecanlandırdı.", "en": "This project would really excite me."}, {"tr": "Belki de doğru aday benim.", "en": "Perhaps I am the right candidate."}, {"tr": "Kendimi size kanıtlamak isterim.", "en": "I would like to prove myself to you."}, {"tr": "Acaba şirket kültürünüz hakkında biraz daha bilgi verebilir misiniz?", "en": "I was wondering if you could tell me a bit more about your company culture."}, {"tr": "İşe alım sürecinizin sonraki aşamaları nelerdir?", "en": "What would the next stages of your recruitment process be?"}, {"tr": "Maaş paketine ek olarak yan haklar da sunuyor musunuz?", "en": "Might I ask if you offer fringe benefits in addition to the salary package?"}, {"tr": "Bu pozisyon için bütçenizin ne olduğunu öğrenebilir miyim?", "en": "Could I learn what your budget is for this position?"}, {"tr": "Eğer uygun görürseniz deneme çalışması yapabilirim.", "en": "If you would see fit, I could do a trial work."}, {"tr": "Portfolyomu sizinle paylaşmaktan mutluluk duyarım.", "en": "I would be delighted to share my portfolio with you."}, {"tr": "Umarım başvurum olumlu değerlendirilir.", "en": "I hope my application would be evaluated favorably."}, {"tr": "Başvurumu değerlendirdiğiniz için teşekkür ederim.", "en": "I would like to thank you for considering my application."}, {"tr": "Daha önce bu tür bir projede yer alma şansım olmuştu.", "en": "I had had the chance to be involved in such a project before."}, {"tr": "Ekibinize değer katabileceğime inanıyorum.", "en": "I believe I could add value to your team."}, {"tr": "Sektördeki yenilikleri yakından takip ediyorum.", "en": "I have been closely following the innovations in the sector."}, {"tr": "Uzun vadeli bir kariyer planım var.", "en": "I would say I have a long-term career plan."}, {"tr": "Karşılıklı beklentileri netleştirmek isterim.", "en": "I would like to clarify mutual expectations."}, {"t ccess."}, {"tr": "Bugün ektiğim tohumları, 10 yıl sonra orman olarak göreceğim.", "en": "I will see the seeds I plant today as a forest in 10 years."}, {"tr": "İşte bu yüzden Future Perfect Continuous en sevdiğim zaman olabilir.", "en": "That's why Future Perfect Continuous might be my favorite tense."}, {"tr": "Çünkü emeğin, sabrın ve sürekliliğin gramer halidir.", "en": "Because it is the grammatical form of effort, patience, and continuity."}, {"tr": "\"3 ayda İngilizce\" vaatlerine inanmam.", "en": "I don't believe in \"English in 3 months\" promises."}, {"tr": "Benim hedefim 3 yıl, 5 yıl, 10 yıl sonrası.", "en": "My goal is 3 years, 5 years, 10 years later."}, {"tr": "O zamana kadar her gün bir tuğla koyuyor olacağım.", "en": "I will have been placing one brick every day until then."}, {"tr": "Ve sonunda bir kale inşa etmiş olacağım.", "en": "And in the end, I will have built a castle."}, {"tr": "Gelecek yıl bu zamanlar İngilizce bir işte çalışıyor olacağım.", "en": "This time next year, I will have been working in an English-speaking job."}, {"tr": "Terfi aldığımda 5 yıldır bu şirkette çalışıyor olacağım.", "en": "When I get promoted, I will have been working at this company for 5 years."}, {"tr": "Kendi işimi kurduğumda 20 yıllık bir deneyim biriktirmiş olacağım.", "en": "When I start my own business, I will have been accumulating 20 years of experience."}, {"tr": "Emeklilik konuşmasını yaparken gözlerim dolacak.", "en": "My eyes will fill up while giving my retirement speech."}, {"tr": "O an \"değdi\" diyeceğim.", "en": "At that moment, I will say, \"It was worth it.\""}, {"tr": "Çünkü bir ömür boyu süren bir çabanın sonucu olacak.", "en": "Because it will be the result of a lifelong effort."}, {"tr": "Hedeflerim için gece gündüz çalışıyor olacağım.", "en": "I will have been working day and night for my goals."}, {"tr": "Ve bu çalışmanın meyvelerini topluyor olacağım.", "en": "And I will have been reaping the fruits of this labor."}, {"tr": "Torunlarıma İngilizce masal okuyor olacağım.", "en": "I will have been reading English fairy tales to my grandchildren."}, {"tr": "Onlar \"Dede/Nene nasıl öğrendin?\" diye soracak.", "en": "They will ask, \"Grandpa/Grandma, how did you learn?\""}, {"tr": "Ben de onlara bu planı anlatacağım.", "en": "And I will tell them about this plan."}, {"tr": "\"Ben 61. günde hayal etmiştim\" diyeceğim.", "en": "I will say, \"I dreamed it on the 61st day.\""}, {"tr": "\"Ve o hayal gerçek oldu\" diyeceğim.", "en": "\"And that dream came true,\" I will say."}, {"tr": "Gelecek, bugünün hayallerinden ibarettir.", "en": "The future consists of today's dreams."}, {"tr": "Ben hayal ediyorum, bu yüzden var olacak.", "en": "I am dreaming, therefore it will exist."}, {"tr": "Zaman su gibi akıp gidiyor olacak.", "en": "Time will have been flowing like water."}, {"tr": "Ama ben akıntıya karşı yüzüyor olacağım.", "en": "But I will have been swimming against the current."}, {"tr": "Ve kıyıya ulaşan ilk kişi ben olacağım.", "en": "And I will be the first person to reach the shore."}, {"tr": "Yıllar sonra bu cümleleri okuduğumda gülümseyeceğim.", "en": "I will smile when I read these sentences years later."}, {"tr": "\"İyi ki başlamışım\" diyeceğim.", "en": "I will say, \"I'm glad I started.\""}, {"tr": "\"İyi ki devam etmişim\" diyeceğim.", "en": "\"I'm glad I continued,\" I will say."}, {"tr": "Ve \"İyi ki vazgeçmemişim\" diyeceğim.", "en": "And \"I'm glad I didn't give up,\" I will say."}, {"tr": "Bu plan benim hayatımı değiştirdi.", "en": "This plan changed my life."}, {"tr": "Umarım seninkini de değiştiriyordur.", "en": "I hope it has been changing yours too."}, {"tr": "Çünkü bir insanın hayatına dokunmak paha biçilemez.", "en": "Because touching a person's life is priceless."}, {"tr": "Ben şu an 6100 cümle yazmış oluyorum.", "en": "I will have written 6100 sentences by now."}, {"tr": "Ve bu inanılmaz bir rakam.", "en": "And this is an incredible number."}, {"tr": "Bu rakamı gördüğümde gururlanıyorum.", "
