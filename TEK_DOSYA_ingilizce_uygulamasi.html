u günün gramer yapısını çalışacağız.", "kaliplar": [{"en": "If I had studied harder at school, I would be a doctor now.", "tr": "Okulda daha sıkı çalışsaydım şimdi doktor olurdum."}, {"en": "If I were more disciplined, I would have finished the project on time.", "tr": "Daha disiplinli olsaydım projeyi zamanında bitirirdim."}, {"en": "If she had taken the job offer, she would be living in London now.", "tr": "İş teklifini kabul etseydi şimdi Londra'da yaşıyor olurdu."}, {"en": "If I hadn't learned English, I wouldn't be writing these sentences now.", "tr": "İngilizce öğrenmeseydim şimdi bu cümleleri yazıyor olmazdım."}, {"en": "If he were more organized, he wouldn't have missed the deadline.", "tr": "Daha organize olsaydı teslim tarihini kaçırmazdı."}, {"en": "If I had saved more money, I would be retired now.", "tr": "Daha çok para biriktirseydim şimdi emekli olurdum."}, {"en": "If I knew the answer, I would have told you yesterday.", "tr": "Cevabı bilsem dün sana söylerdim."}, {"en": "If you had followed my advice, you wouldn't be in this situation.", "tr": "Tavsiyemi dinleseydin şimdi bu durumda olmazdın."}, {"en": "If she weren't so talented, she wouldn't have won the competition.", "tr": "Bu kadar yetenekli olmasaydı yarışmayı kazanamazdı."}, {"en": "If I didn't believe in myself, I would have given up long ago.", "tr": "Kendime inanmasaydım çoktan pes ederdim."}], "kelimeler": [{"en": "would have", "tr": "-erdi (geçmiş)", "ex": "I would have succeeded."}, {"en": "could have", "tr": "-ebilirdi", "ex": "I could have tried harder."}, {"en": "should have", "tr": "-meliydi", "ex": "I should have started earlier."}, {"en": "might have", "tr": "-ebilirdi (ihtimal)", "ex": "He might have won."}, {"en": "otherwise", "tr": "aksi takdirde", "ex": "Otherwise, I would be rich."}, {"en": "if so", "tr": "eğer öyleyse", "ex": "If so, I would have come."}, {"en": "if not", "tr": "eğer değilse", "ex": "If not, what would you do?"}, {"en": "regret", "tr": "pişmanlık", "ex": "I regret not going."}, {"en": "remorse", "tr": "vicdan azabı", "ex": "Deep remorse."}, {"en": "guilt", "tr": "suçluluk", "ex": "Feeling of guilt."}, {"en": "reflection", "tr": "yansıma/düşünme", "ex": "Self-reflection."}, {"en": "past", "tr": "geçmiş", "ex": "The past shapes the present."}, {"en": "present", "tr": "şimdiki zaman", "ex": "The present is a gift."}, {"en": "consequence", "tr": "sonuç", "ex": "Every action has consequences."}, {"en": "outcome", "tr": "netice", "ex": "Different outcome."}, {"en": "scenario", "tr": "senaryo", "ex": "Alternate scenario."}, {"en": "imagine", "tr": "hayal etmek", "ex": "Imagine if..."}, {"en": "suppose", "tr": "varsaymak", "ex": "Suppose you had..."}, {"en": "what if", "tr": "ya olsaydı", "ex": "What if you had never started?"}, {"en": "lesson", "tr": "ders", "ex": "Valuable lesson."}], "cumleler": [{"tr": "Okulda daha sıkı çalışsaydım şimdi doktor olurdum.", "en": "If I had studied harder at school, I would be a doctor now."}, {"tr": "Daha disiplinli olsaydım projeyi zamanında bitirirdim.", "en": "If I were more disciplined, I would have finished the project on time."}, {"tr": "İş teklifini kabul etseydi şimdi Londra'da yaşıyor olurdu.", "en": "If she had taken the job offer, she would be living in London now."}, {"tr": "İngilizce öğrenmeseydim şimdi bu cümleleri yazıyor olmazdım.", "en": "If I hadn't learned English, I wouldn't be writing these sentences now."}, {"tr": "Daha organize olsaydı teslim tarihini kaçırmazdı.", "en": "If he were more organized, he wouldn't have missed the deadline."}, {"tr": "Daha çok para biriktirseydim şimdi emekli olurdum.", "en": "If I had saved more money, I would be retired now."}, {"tr": "Cevabı bilsem dün sana söylerdim.", "en": "If I knew the answer, I would have told you yesterday."}, {"tr": "Tavsiyemi dinleseydin şimdi bu durumda olmazdın.", "en": "If you had followed my advice, you wouldn't be in this situation."}, {"tr": "Bu kadar yetenekli olmasaydı yarışmayı kazanamazdı.", "en": "If she weren't so talented, she wouldn't have won the competition."}, {"tr": "Kendime inanmasaydım çoktan pes ederdim.", "en": "If I didn't believe in myself, I would have given up long ago."}, {"tr": "Dün gece içki içmeseydim bugün başım ağrımazdı.", "en": "If I hadn't drunk alcohol last night, I wouldn't have a headache now."}, {"tr": "Spor yapmayı sevmeseydim bu kadar fit olmazdım.", "en": "If I didn't like exercising, I wouldn't be this fit now."}, {"tr": "Annemi dinlemiş olsaydım şimdi pişman olmazdım.", "en": "If I had listened to my mother, I wouldn't be regretful now."}, {"tr": "Kredi kartına bu kadar yüklenmeseydim şimdi borçlu olmazdım.", "en": "If I hadn't maxed out my credit card, I wouldn't be in debt now."}, {"tr": "Cesaretim olsaydı onu yemeğe davet ederdim.", "en": "If I were brave, I would have invited him/her to dinner."}, {"tr": "Cevabı bilseydim parmağımı kaldırırdım.", "en": "If I had known the answer, I would have raised my hand."}, {"tr": "Araba ehliyetim olsaydı o işi alırdım.", "en": "If I had a driver's license, I would have gotten that job."}, {"tr": "Daha genç olsaydım maratona katılırdım.", "en": "If I were younger, I would have joined the marathon."}, {"tr": "Evim olsaydı evlenme teklif ederdim.", "en": "If I had a house, I would have proposed."}, {"tr": "Bilgisayarım daha iyi olsaydı o oyunu oynayabilirdim.", "en": "If my computer were better, I could have played that game."}, {"tr": "İngilizcem iyi olmasaydı bu fırsatı kaçırırdım.", "en": "If my English weren't good, I would have missed this opportunity."}, {"tr": "Sabırlı olmasaydım bu planın ilk haftasında bırakırdım.", "en": "If I weren't patient, I would have quit in the first week of this plan."}, {"tr": "Eğer bu plan olmasaydı şimdi İngilizce bilmezdim.", "en": "If it weren't for this plan, I wouldn't know English now."}, {"tr": "Geçmişe yolculuk yapabilseydim birçok şeyi değiştirirdim.", "en": "If I could travel back in time, I would have changed many things."}, {"tr": "Geleceği görebilseydim farklı yatırım yapardım.", "en": "If I could see the future, I would have invested differently."}, {"tr": "Kekeme olmasaydı sunumda başarılı olurdu.", "en": "If he weren't shy, he would have succeeded in the presentation."}, {"tr": "Uçağa yetişseydim şimdi Paris'te olurdum.", "en": "If I had caught the plane, I would be in Paris now."}, {"tr": "Alarmım çalmasaydı hâlâ uyuyor olurdum.", "en": "If my alarm hadn't rung, I would still be sleeping now."}, {"tr": "Hava güzel olsaydı pikniğe giderdik.", "en": "If the weather were nice, we would have gone on a picnic."}, {"tr": "Param olsaydı o arabayı alırdım.", "en": "If I had money, I would have bought that car."}, {"tr": "Zamanda geri gidebilseydim, gençliğime İngilizce öğren derdim.", "en": "If I could go back in time, I would tell my younger self to learn English."}, {"tr": "Yeterince uyusaydım şimdi enerjik hissederdim.", "en": "If I had slept enough, I would feel energetic now."}, {"tr": "Su içseydim başım ağrımazdı.", "en": "If I had drunk water, I wouldn't have a headache."}, {"tr": "Doktor olsaydım kendimi tedavi ederdim.", "en": "If I were a doctor, I would have treated myself."}, {"tr": "Zengin olsaydım dünyaya yardım ederdim.", "en": "If I were rich, I would have helped the world."}, {"tr": "Eğer bu kadar kibirli olmasaydı dostlarını kaybetmezdi.", "en": "If he weren't so arrogant, he wouldn't have lost his friends."}, {"tr": "Eğer dikkatli araba kullansaydı kaza yapmazdı.", "en": "If he had driven carefully, he wouldn't have had an accident."}, {"tr": "Şu an burada olmasaydın bu cümleleri kim okuyacaktı?", "en": "If you weren't here now, who would have read these sentences?"}, {"tr": "Bu plana başlamasaydın şimdi ne yapıyor olurdun?", "en": "If you hadn't started this plan, what would you be doing now?"}, {"tr": "Muhtemelen sıkılıyor olurdun. Ama şimdi İngilizce öğreniyorsun.", "en": "You would probably be bored. But now you are learning English."}, {"tr": "Karışık koşul cümleleri zordur ama çok güçlüdür.", "en": "Mixed conditionals are hard but very powerful."}, {"tr": "Geçmişle bugünü birbirine bağlarlar.", "en": "They connect the past and the present."}, {"tr": "Nedense bana felsefi gelirler hep.", "en": "They always seem philosophical to me for some reason."}, {"tr": "Sebep sonuç ilişkisini en güçlü anlatan yapı budur.", "en": "This is the structure that best expresses the cause-and-effect relationship."}, {"tr": "Eğer şu an İngilizce okuyabiliyorsan, geçmişte bir şeyi doğru yaptın demektir.", "en": "If you can read English now, it means you did something right in the past."}, {"tr": "Geçmişteki doğru kararlar bugünün mutluluğudur.", "en": "Right decisions in the past are today's happiness."}, {"tr": "Bugünkü doğru kararlar da yarının mutluluğu olacak.", "en": "Today's right decisions will be tomorrow's happiness too."}, {"tr": "Ben bugün doğru kararı verdim: İngilizce çalışmaya devam etmek.", "en": "I made the right decision today: To continue studying English."}, {"tr": "Bu plana devam etme kararım beni buraya getirdi.", "en": "My decision to continue this plan brought me here."}, {"tr": "62 gündür buradayım, karma koşulları öğreniyorum.", "en": "I have been here for 62 days, learning mixed conditionals."}, {"tr": "Eğer bu plan olmasaydı, İngilizceye dair tüm umudumu kaybetmiş olurdum.", "en": "If it weren't for this plan, I would have lost all hope regarding English."}, {"tr": "Ama bu plan sayesinde şimdi ayakta ve güçlüyüm.", "en": "But thanks to this plan, I am standing and strong now."}, {"tr": "Eğer dün ölmüş olsaydım, bugün bu cümleyi yazıyor olmazdım.", "en": "If I had died yesterday, I wouldn't be writing this sentence today."}, {"tr": "Ama yaşıyorum ve bu bir mucize.", "en": "But I am alive, and this is a miracle."}, {"tr": "Eğer çocukken piyano çalmayı öğrenseydim, şimdi bir virtüöz olurdum.", "en": "If I had learned to play the piano as a child, I would be a virtuoso now."}, {"tr": "Ama İngilizceyi öğrendiğim için piyano bilmemem umurumda değil.", "en": "But I don't care that I don't know piano because I learned English."}, {"tr": "Eğer engellere takılsaydım, şimdi olduğum yerde olamazdım.", "en": "If I had stumbled on obstacles, I wouldn't be where I am now."}, {"tr": "Hayat bana çelme taksa da ben hep ayağa kalktım.", "en": "Even though life tripped me, I always stood back up."}, {"tr": "Eğer kalkmamış olsaydım, şimdi yerde sürünüyor olurdum.", "en": "If I hadn't gotten up, I would be crawling on the ground now."}, {"tr": "Ama havada uçuyorum.", "en": "But I am flying in the air."}, {"tr": "Kanatlarım İngilizce.", "en": "My wings are English."}, {"tr": "Bu dil özgürlüğümün anahtarıdır.", "en": "This language is the key to my freedom."}, {"tr": "Eğer bu anahtarı almasaydım, şimdi kafeste olurdum.", "en": "If I hadn't taken this key, I would be in a cage now."}, {"tr": "Kafesin kapısı açık, istersen çıkabilirsin.", "en": "The cage door is open; you can leave if you want."}, {"tr": "Ama çıkmak cesaret ister.", "en": "But it takes courage to leave."}, {"tr": "Ben o cesareti gösterdim.", "en": "I showed that courage."}, {"tr": "Ve şimdi gökyüzündeyim.", "en": "And now I am in the sky."}, {"tr": "Eğer bir gün düşersem, İngilizcem beni kaldıracak.", "en": "If I fall one day, my English will lift me up."}, {"tr": "Eğer düşmeseydim, kalkmayı öğrenemezdim.", "en": "If I hadn't fallen, I wouldn't have learned to get up."}, {"tr": "Başarısızlıklarım başarılarımın öğretmenidir.", "en": "My failures are the teachers of my successes."}, {"tr": "Eğer hata yapmasaydım, doğruyu nasıl bulurdum?", "en": "If I hadn't made mistakes, how would I have found the truth?"}, {"tr": "Eğer dünyayı değiştirebilseydim, önce eğitimi değiştirirdim.", "en": "If I could change the world, I would have changed education first."}, {"tr": "Çünkü cehalet tüm kötülüklerin anasıdır.", "en": "Because ignorance is the mother of all evils."}, {"tr": "Eğer herkes İngilizce bilseydi, dünya daha barışçıl bir yer olurdu.", "en": "If everyone knew English, the world would be a more peaceful place."}, {"tr": "İletişim kurdukça önyargılar yıkılır.", "en": "Prejudices are broken as communication is established."}, {"tr": "Ben de bir köprü olmak istiyorum.", "en": "I want to be a bridge too."}, {"tr": "İngilizce benim köprüm.", "en": "English is my bridge."}, {"tr": "Ya seninki ne olacak?", "en": "What will yours be?"}, {"tr": "Bir gün bu soruyu cevaplayacaksın.", "en": "One day you will answer this question."}, {"tr": "Eğer bu plana devam edersen, cevabın İngilizce olacak.", "en": "If you continue this plan, your answer will be in English."}, {"tr": "Eğer devam etmezsen, ne olacağını asla bilemeyeceksin.", "en": "If you don't continue, you will never know what would have happened."}, {"tr": "Ve belirsizlik, başarısızlıktan daha kötüdür.", "en": "And uncertainty is worse than failure."}, {"tr": "Başarısızlık en azından bir sonuçtur.", "en": "Failure is at least a result."}, {"tr": "Belirsizlik ise sonsuz bir keşkedir.", "en": "Uncertainty, on the other hand, is an endless \"what if.\""}, {"tr": "Ben \"ne olurdu\"ları \"ne oldu\"ya çevirdim.", "en": "I turned \"what would have been\" into \"what happened.\""}, {"tr": "Ve şimdi 6200 \"ne oldu\" yazdım.", "en": "And now I have written 6200 \"what happeneds.\""}, {"tr": "Bunların her biri bir adım, bir karar, bir emek.", "en": "Each one is a step, a decision, an effort."}, {"tr": "Eğer bir tanesini bile eksik yazsaydım, şimdi bu özgüvene sahip olmazdım.", "en": "If I had written even one less, I wouldn't have this confidence now."}, {"tr": "Hiçbir şey tesadüf değil.", "en": "Nothing is a coincidence."}, {"tr": "Her cümlenin bir anlamı var.", "en": "Every sentence has a meaning."}, {"tr": "Bu plan hayatımın metaforu oldu.", "en": "This plan has become the metaphor of my life."}, {"tr": "Disiplin, süreklilik, inanç.", "en": "Discipline, continuity, faith."}, {"tr": "Bu üçü olmasaydı şimdi burada olmazdım.", "en": "If it weren't for these three, I wouldn't be here now."}, {"tr": "Ama buradayım ve devam ediyorum.", "en": "But I am here and I am continuing."}, {"tr": "Bitmesine az kaldı.", "en": "There is little left to finish."}, {"tr": "62. günün sonundayım.", "en": "I am at the end of the 62nd day."}, {"tr": "Eğer bu günleri saymasaydım, geçen zamanın farkına varamazdım.", "en": "If I hadn't counted these days, I wouldn't have realized the passage of time."}, {"tr": "Ama farkındayım ve minnettarım.", "en": "But I am aware and grateful."}, {"tr": "Bu yolculuk beni büyüttü.", "en": "This journey has grown me."}, {"tr": "Ve büyümeye devam edeceğim! 🌱", "en": "And I will continue to grow! 🌱"}], "aktivite": "**Sabah (30 dk): Geçmiş-Bugün Bağlantısı**<br>- 10 \"If I had V3..., I would be... now\" ve 10 \"If I were..., I would have V3...\" cümlesi yaz.<br>- Hayatından gerçek örnekler ver.<br><br>**Öğlen (30 dk): Karar Analizi**<br>- Geçmişte verdiğin 5 önemli kararın şu anki hayatını nasıl etkilediğini mixed conditional ile anlat.<br>- \"If I hadn't decided to..., I wouldn't be... now.\"<br><br>**Akşam (45 dk): \"What If...?\" Felsefi Konuşma**<br>- 2-3 dakikalık \"Hayatımın dönüm noktaları ve bugüne etkileri\" konuşması.<br>- Mixed conditionals kullan.<br>- Ses kaydı al."}, {"dayNum": "63", "title": "Expressing Purpose, Reason & Result (Advanced)", "gramerDesc": "Bu günün gramer yapısını çalışacağız.", "kaliplar": [{"en": "I study hard with a view to getting a promotion.", "tr": "Terfi almak amacıyla sıkı çalışırım."}, {"en": "I saved money for the purpose of buying a house.", "tr": "Ev almak amacıyla para biriktirdim."}, {"en": "I'm learning English so as to work abroad.", "tr": "Yurt dışında çalışmak üzere İngilizce öğreniyorum."}, {"en": "My motivation stems from the desire to help others.", "tr": "Motivasyonum başkalarına yardım etme arzusundan kaynaklanır."}, {"en": "Owing to my hard work, I achieved my goals.", "tr": "Sıkı çalışmam sayesinde hedeflerime ulaştım."}, {"en": "The reason why I persist is that I believe in myself.", "tr": "Israr etmemin sebebi kendime inanmamdır."}, {"en": "This plan was created with the intention of helping learners.", "tr": "Bu plan öğrencilere yardım etme niyetiyle oluşturuldu."}, {"en": "I practice daily in the hope of becoming fluent.", "tr": "Akıcı olma umuduyla her gün pratik yaparım."}, {"en": "I took the course with the aim of improving my skills.", "tr": "Becerilerimi geliştirme hedefiyle kursu aldım."}, {"en": "My ultimate purpose in life is to make a difference.", "tr": "Hayattaki nihai amacım bir fark yaratmaktır."}], "kelimeler": [{"en": "with a view to", "tr": "amacıyla", "ex": "I study with a view to learning."}, {"en": "for the purpose of", "tr": "amacıyla", "ex": "For the purpose of growth."}, {"en": "with the intention of", "tr": "niyetiyle", "ex": "With the intention of helping."}, {"en": "in the hope of", "tr": "umuduyla", "ex": "In the hope of succeeding."}, {"en": "with the aim of", "tr": "hedefiyle", "ex": "With the aim of improving."}, {"en": "so as to", "tr": "-mek üzere", "ex": "So as to understand better."}, {"en": "in order to", "tr": "-mek için", "ex": "In order to achieve."}, {"en": "owing to", "tr": "sayesinde/-den dolayı", "ex": "Owing to practice, I improved."}, {"en": "on account of", "tr": "nedeniyle", "ex": "On account of my effort."}, {"en": "by virtue of", "tr": "sayesinde/vasıtasıyla", "ex": "By virtue of hard work."}, {"en": "as a consequence of", "tr": "sonucu olarak", "ex": "As a consequence of studying."}, {"en": "the reason why", "tr": "sebebi şu ki", "ex": "The reason why is simple."}, {"en": "stems from", "tr": "-den kaynaklanmak", "ex": "It stems from passion."}, {"en": "arises from", "tr": "-den doğmak", "ex": "It arises from necessity."}, {"en": "originates from", "tr": "kökeni", "ex": "It originates from a dream."}, {"en": "driven by", "tr": "tarafından güdülenmek", "ex": "Driven by ambition."}, {"en": "motivated by", "tr": "tarafından motive edilmek", "ex": "Motivated by success."}, {"en": "inspired by", "tr": "tarafından ilham almak", "ex": "Inspired by my family."}, {"en": "devoted to", "tr": "kendini adamış", "ex": "Devoted to excellence."}, {"en": "committed to", "tr": "bağlı/kararlı", "ex": "Committed to growth."}], "cumleler": [{"tr": "Terfi almak amacıyla sıkı çalışırım.", "en": "I study hard with a view to getting a promotion."}, {"tr": "Ev almak amacıyla para biriktirdim.", "en": "I saved money for the purpose of buying a house."}, {"tr": "Yurt dışında çalışmak üzere İngilizce öğreniyorum.", "en": "I'm learning English so as to work abroad."}, {"tr": "Motivasyonum başkalarına yardım etme arzusundan kaynaklanır.", "en": "My motivation stems from the desire to help others."}, {"tr": "Sıkı çalışmam sayesinde hedeflerime ulaştım.", "en": "Owing to my hard work, I achieved my goals."}, {"tr": "Israr etmemin sebebi kendime inanmamdır.", "en": "The reason why I persist is that I believe in myself."}, {"tr": "Bu plan öğrencilere yardım etme niyetiyle oluşturuldu.", "en": "This plan was created with the intention of helping learners."}, {"tr": "Akıcı olma umuduyla her gün pratik yaparım.", "en": "I practice daily in the hope of becoming fluent."}, {"tr": "Becerilerimi geliştirme hedefiyle kursu aldım.", "en": "I took the course with the aim of improving my skills."}, {"tr": "Hayattaki nihai amacım bir fark yaratmaktır.", "en": "My ultimate purpose in life is to make a difference."}, {"tr": "Daha iyi bir iş bulmak amacıyla İngilizce öğreniyorum.", "en": "I'm learning English with a view to finding a better job."}, {"tr": "Sağlığımı korumak için spor yaparım.", "en": "I exercise in order to maintain my health."}, {"tr": "Stresi azaltmak amacıyla meditasyon yaparım.", "en": "I meditate for the purpose of reducing stress."}, {"tr": "Bilgimi paylaşmak üzere buradayım.", "en": "I am here so as to share my knowledge."}, {"tr": "Başarım sıkı çalışmamdan kaynaklanmaktadır.", "en": "My success stems from my hard work."}, {"tr": "Motivasyonum insanların hayatına dokunma arzusundan doğar.", "en": "My motivation arises from the desire to touch people's lives."}, {"tr": "Disiplinli olmam sayesinde bu planı sürdürüyorum.", "en": "Owing to being disciplined, I am maintaining this plan."}, {"tr": "Zamanımı iyi yönetmem sayesinde çok şey başardım.", "en": "I achieved a lot on account of managing my time well."}, {"tr": "Düzenli çalışma sayesinde İngilizcem gelişti.", "en": "My English improved by virtue of regular study."}, {"tr": "Pratik yapmamın sonucu olarak akıcılığım arttı.", "en": "As a consequence of practicing, my fluency increased."}, {"tr": "Öz güvenim pratik yapmaktan geliyor.", "en": "My confidence originates from practicing."}, {"tr": "Başarı arzusuyla hareket ediyorum.", "en": "I am driven by the desire for success."}, {"tr": "Ailem tarafından motive ediliyorum.", "en": "I am motivated by my family."}, {"tr": "Büyük liderlerden ilham alıyorum.", "en": "I am inspired by great leaders."}, {"tr": "Mükemmeliyete kendimi adadım.", "en": "I am devoted to excellence."}, {"tr": "Sürekli gelişime bağlıyım.", "en": "I am committed to continuous improvement."}, {"tr": "Huzuru bulma umuduyla meditasyon yapıyorum.", "en": "I meditate in the hope of finding peace."}, {"tr": "Yeni kültürler tanıma hedefiyle seyahat ediyorum.", "en": "I travel with the aim of experiencing new cultures."}, {"tr": "Fark yaratma niyetiyle bu işi seçtim.", "en": "I chose this job with the intention of making a difference."}, {"tr": "Kendimi geliştirmek amacıyla kitap okuyorum.", "en": "I read books for the purpose of improving myself."}, {"tr": "Daha iyi bir ebeveyn olmak üzere eğitim alıyorum.", "en": "I'm taking training so as to be a better parent."}, {"tr": "Örnek olma amacıyla dürüst yaşarım.", "en": "I live honestly with a view to setting an example."}, {"tr": "Kendimi kanıtlamak için çok çalışıyorum.", "en": "I work hard in order to prove myself."}, {"tr": "Amacım dünyayı değiştirmek.", "en": "My purpose is to change the world."}, {"tr": "Hedefim zirveye ulaşmak.", "en": "My aim is to reach the top."}, {"tr": "Sebebim ise tutku.", "en": "My reason, however, is passion."}, {"tr": "Tutkum olmadan başarı olmaz.", "en": "Without my passion, there is no success."}, {"tr": "Başarısızlık korkusundan değil, başarı arzusundan koşuyorum.", "en": "I run not from fear of failure, but from the desire for success."}, {"tr": "Hayalinin peşinden gitme cesareti göster.", "en": "Show the courage to chase your dream."}, {"tr": "Ben gösterdim ve buradayım.", "en": "I showed it and I am here."}, {"tr": "Her şey bir amaç uğruna.", "en": "Everything is for a purpose."}, {"tr": "Her cümlenin bir sebebi var.", "en": "Every sentence has a reason."}, {"tr": "Ve her sonucun bir açıklaması.", "en": "And every result has an explanation."}, {"tr": "Sebepsiz sonuç, amaçsız eylem olmaz.", "en": "There is no result without a reason, no action without purpose."}, {"tr": "Benim amacım İngilizce öğrenmekti.", "en": "My purpose was to learn English."}, {"tr": "Sonucum ise bu plan oldu.", "en": "My result became this plan."}, {"tr": "Ve bu plan senin hayatına dokundu.", "en": "And this plan touched your life."}, {"tr": "İşte amaç, sebep ve sonuç budur.", "en": "This is purpose, reason, and result."}, {"tr": "Her şey birbirine bağlı.", "en": "Everything is connected."}, {"tr": "Ve ben bu bağlantıları İngilizce anlatabiliyorum.", "en": "And I can explain these connections in English."}, {"tr": "Varoluş amacımı sorguladığımda hep aynı cevabı buluyorum: İnsanlara yardım etmek.", "en": "When I question my purpose in life, I always find the same answer: To help people."}, {"tr": "Beni her sabah yataktan kaldıran şey, bir gün birinin hayatını değiştirme ihtimalidir.", "en": "What gets me out of bed every morning is the possibility of changing someone's life one day."}, {"tr": "İngilizce öğrenmemin altında yatan sebep budur.", "en": "This is the underlying reason why I am learning English."}, {"tr": "Dil bir amaç değil, bir araçtır.", "en": "Language is not a purpose; it's a tool."}, {"tr": "Asıl amaç, o araçla bir köprü kurmaktır.", "en": "The real purpose is to build a bridge with that tool."}, {"tr": "O köprüden insanlar geçsin, fikirler geçsin, umutlar geçsin.", "en": "Let people cross that bridge, let ideas cross, let hopes cross."}, {"tr": "Ben o köprünün bir ayağı olmayı amaçlıyorum.", "en": "I aim to be one pillar of that bridge."}, {"tr": "Bu yüzden İngilizce öğreniyorum.", "en": "That's why I'm learning English."}, {"tr": "Sırf İngilizce biliyorum diye kibir yapmak için değil.", "en": "Not to be arrogant just because I know English."}, {"tr": "Tam tersine, bilgimi paylaşmak için.", "en": "On the contrary, to share my knowledge."}, {"tr": "Öğrendiğim her şeyi başkalarına aktarma niyetiyle öğreniyorum.", "en": "I learn with the intention of passing on everything I learn to others."}, {"tr": "Bu plan da bu niyetin bir ürünüdür.", "en": "This plan is also a product of this intention."}, {"tr": "Bu plan sayesinde binlerce insan İngilizce öğrenme umudu buldu.", "en": "Thanks to this plan, thousands of people found hope to learn English."}, {"tr": "Ve bu benim en büyük motivasyon kaynağım.", "en": "And this is my greatest source of motivation."}, {"tr": "Çabalarımın boşa gitmediğini görmek paha biçilemez.", "en": "Seeing that my efforts are not in vain is priceless."}, {"tr": "Her \"teşekkür ederim\" mesajı, her \"İngilizcem gelişti\" cümlesi benim yakıtım.", "en": "Every \"thank you\" message, every \"my English improved\" sentence is my fuel."}, {"tr": "Beni daha fazlasını yapmaya iten şey budur.", "en": "This is what drives me to do more."}, {"tr": "Amacım daha büyük bir kitleye ulaşmak.", "en": "My aim is to reach a larger audience."}, {"tr": "Belki bir gün bir kitap yazarım.", "en": "Perhaps one day I will write a book."}, {"tr": "Belki bir uygulama geliştiririm.", "en": "Perhaps I will develop an app."}, {"tr": "Belki de sadece bu planla kalırım.", "en": "Or perhaps I will just stick with this plan."}, {"tr": "Ama her ne yaparsam yapayım, amacım aynı: Yardım etmek.", "en": "But whatever I do, my purpose is the same: To help."}, {"tr": "İnsanlara dil öğreterek onların dünyasını genişletmek.", "en": "To expand their world by teaching them a language."}, {"tr": "İngilizce bir pencere, ben de o pencereyi açan el.", "en": "English is a window, and I am the hand that opens that window."}, {"tr": "Açılan her pencereden yeni bir dünya görünür.", "en": "A new world appears from every window opened."}, {"tr": "Ve o dünyayı keşfetmek öğrenciye kalır.", "en": "And it's up to the student to explore that world."}, {"tr": "Ben sadece kapıyı açarım, içeri girmek sana kalmış.", "en": "I just open the door; it's up to you to go inside."}, {"tr": "Sen de içeri girdiysen ne mutlu bana.", "en": "If you have gone inside, I am so happy."}, {"tr": "Eğer hâlâ kapıda bekliyorsan, acele etme.", "en": "If you are still waiting at the door, don't rush."}, {"tr": "Her şeyin bir zamanı var.", "en": "There is a time for everything."}, {"tr": "Ama o kapı her zaman açık.", "en": "But that door is always open."}, {"tr": "Bu plan her zaman burada olacak.", "en": "This plan will always be here."}, {"tr": "Amacım kalıcı bir eser bırakmak.", "en": "My purpose is to leave a lasting work."}, {"tr": "Ben öldükten sonra da insanların İngilizce öğrenmesine yardım edecek bir şey.", "en": "Something that will help people learn English even after I die."}, {"tr": "İşte bu benim nihai hedefim.", "en": "This is my ultimate goal."}, {"tr": "Ve bu hedefe ulaşmak için her gün bir tuğla koyuyorum.", "en": "And I am placing one brick every day to reach this goal."}, {"tr": "Bugün 6300. tuğlayı koyuyorum.", "en": "Today I am placing the 6300th brick."}, {"tr": "Bu tuğlalar bir gün bir bina olacak.", "en": "These bricks will one day become a building."}, {"tr": "O binanın adı \"Kül İngilizce Planı\" olacak.", "en": "The name of that building will be \"The Ultimate English Plan.\""}, {"tr": "Ve o binada herkes İngilizce konuşacak.", "en": "And everyone will speak English in that building."}, {"tr": "Hayalim bu.", "en": "This is my dream."}, {"tr": "Amacım bu.", "en": "This is my purpose."}, {"tr": "Sebebim bu.", "en": "This is my reason."}, {"tr": "Ve sonucum da bu olacak.", "en": "And this will be my result too."}, {"tr": "Sen de bu binanın bir parçasısın.", "en": "You are also a part of this building."}, {"tr": "Çünkü bu cümleleri okuyorsun.", "en": "Because you are reading these sentences."}, {"tr": "Ve bu cümleler seni değiştiriyor.", "en": "And these sentences are changing you."}, {"tr": "Yavaş yavaş, cümle cümle, gün gün.", "en": "Slowly, sentence by sentence, day by day."}, {"tr": "Amacım seni İngilizce öğrenmiş biri yapmak.", "en": "My purpose is to make you a person who has learned English."}, {"tr": "Ve bunda başarılı oluyorum! 🎯 6300 cümle!", "en": "And I am succeeding at this! 🎯 6300 sentences!"}], "aktivite": "**Sabah (30 dk): Amaç Cümleleri**<br>- \"with a view to / for the purpose of / with the intention of / in the hope of / so as to\" ile 5'er cümle yaz (25 cümle).<br><br>**Öğlen (30 dk): Sebep-Sonuç Zinciri**<br>- Hayatındaki 3 büyük başarının arkasındaki motivasyonu, sebebi ve sonucu anlatan paragraf yaz.<br>- \"stem from / owing to / as a consequence of / the reason why\" kullan.<br><br>**Akşam (45 dk): \"My Purpose in Life\" Konuşması**<br>- 2-3 dakikalık \"Hayattaki amacım ve motivasyonum\" konuşması.<br>- İleri düzey amaç-sebep-sonuç yapılarını kullan.<br>- Ses kaydı al."}, {"dayNum": "64", "title": "Emphatic Structures (do/does/did + V1) & Cleft Sentences", "gramerDesc": "Bu günün gramer yapısını çalışacağız.", "kaliplar": [{"en": "I do believe in myself.", "tr": "Kendime gerçekten inanıyorum."}, {"en": "She does work hard.", "tr": "O gerçekten sıkı çalışır."}, {"en": "I did finish the project on time!", "tr": "Projeyi gerçekten zamanında bitirdim!"}, {"en": "What I need is more time.", "tr": "İhtiyacım olan şey daha fazla zaman."}, {"en": "It is hard work that brings success.", " ex": "Especially this lesson."}, {"en": "particularly", "tr": "bilhassa", "ex": "Particularly useful."}], "cumleler": [{"tr": "Kendime gerçekten inanıyorum.", "en": "I do believe in myself."}, {"tr": "O gerçekten sıkı çalışır.", "en": "She does work hard."}, {"tr": "Projeyi gerçekten zamanında bitirdim!", "en": "I did finish the project on time!"}, {"tr": "İhtiyacım olan şey daha fazla zaman.", "en": "What I need is more time."}, {"tr": "Başarıyı getiren şey sıkı çalışmadır.", "en": "It is hard work that brings success."}, {"tr": "Ayrılmamın sebebi stresti.", "en": "The reason why I left was stress."}, {"tr": "Hayatımı değiştiren şey bu plandı.", "en": "It was this plan that changed my life."}, {"tr": "Beni en çok motive eden şey ilerlemeyi görmektir.", "en": "What motivates me most is seeing progress."}, {"tr": "Tek istediğim mutlu olmak.", "en": "All I want is to be happy."}, {"tr": "Onsuz yaşayamayacağım tek şey umuttur.", "en": "The one thing I can't live without is hope."}, {"tr": "Seni gerçekten seviyorum.", "en": "I do love you."}, {"tr": "Onu gerçekten anlıyorum.", "en": "I do understand him."}, {"tr": "Gerçekten geldi!", "en": "He did come!"}, {"tr": "Gerçekten çalışıyor mu?", "en": "Does he actually work?"}, {"tr": "Beni şaşırtan şey onun cesaretiydi.", "en": "What surprised me was his courage."}, {"tr": "Seni özel kılan şey gülümsemen.", "en": "What makes you special is your smile."}, {"tr": "Bu sorunu çözen kişi oydu.", "en": "It was him who solved this problem."}, {"tr": "İngilizce öğrenme sebebim iş bulmak.", "en": "The reason why I learn English is to find a job."}, {"tr": "Asıl mesele para değil, saygı.", "en": "The thing that matters is not money, but respect."}, {"tr": "Hayatta en değerli şey sağlıktır.", "en": "The most valuable thing in life is health."}, {"tr": "Beni en çok etkileyen şey hikayendi.", "en": "What touched me most was your story."}, {"tr": "Onu ünlü yapan şey şarkılarıydı.", "en": "What made her famous were her songs."}, {"tr": "En çok korktuğum şey yalnızlık.", "en": "What I fear most is loneliness."}, {"tr": "Bu şehirde en sevdiğim yer sahil.", "en": "The place where I love most in this city is the coast."}, {"tr": "Beni değiştiren an o andı.", "en": "The moment when I changed was that moment."}, {"tr": "Bana ilham veren kişi annemdir.", "en": "The person who inspires me is my mother."}, {"tr": "İngilizcenin bana kattığı şey özgüven.", "en": "What English has given me is confidence."}, {"tr": "Seni rahatsız eden şey ne?", "en": "What is it that bothers you?"}, {"tr": "Başarısız olmanın sebebi çalışmamandı.", "en": "The reason why you failed was that you didn't study."}, {"tr": "Başarmamı sağlayan şey disiplindi.", "en": "What made me succeed was discipline."}, {"tr": "Gerçekten çok teşekkür ederim.", "en": "I do thank you very much."}, {"tr": "Unutma, gerçekten denedim.", "en": "Remember, I did try."}, {"tr": "Aslında geldi ama sen uyuyordun.", "en": "He did come, but you were sleeping."}, {"tr": "Paradan daha önemli olan şey zamandır.", "en": "What is more important than money is time."}, {"tr": "Zamanı değerli kılan şey onu nasıl kullandığındır.", "en": "What makes time valuable is how you use it."}, {"tr": "Bu planı özel kılan şey içeriğinden çok ruhudur.", "en": "What makes this plan special is its spirit rather than its content."}, {"tr": "Onu mutlu eden şey küçük şeylerdi.", "en": "What made him happy were little things."}, {"tr": "Sana söylemek istediğim şey şu: Vazgeçme.", "en": "What I want to tell you is this: Don't give up."}, {"tr": "Tek bildiğim hiçbir şey bilmediğimdir. (Sokrates)", "en": "All I know is that I know nothing. (Socrates)"}, {"tr": "Önemli olan kazanmak değil, mücadele etmektir.", "en": "What matters is not winning, but fighting."}, {"tr": "Seni sen yapan şey hatalarındır.", "en": "What makes you you are your mistakes."}, {"tr": "Hayatı anlamlı kılan şey sevgidir.", "en": "What makes life meaningful is love."}, {"tr": "Asıl kahraman sensin.", "en": "The real hero is you."}, {"tr": "Seni bu kadar geç anlamamın sebebi neydi?", "en": "What was the reason why I understood you so late?"}, {"tr": "Bana bu gücü veren şey inancım.", "en": "What gives me this strength is my faith."}, {"tr": "Seni rahatsız eden şeyi söyle.", "en": "Tell me what it is that bothers you."}, {"tr": "Asıl sorun bu değil.", "en": "That is not what the real problem is."}, {"tr": "Bu kadar çok çalışmanın sebebi ne?", "en": "What is the reason why you work this much?"}, {"tr": "Gerçekten de İngilizce öğreniyorum!", "en": "I am indeed learning English!"}, {"tr": "64 günde gerçekten çok yol katettim!", "en": "I have indeed come a long way in 64 days!"}, {"tr": "Şüphesiz ki bu plan gelmiş geçmiş en iyi İngilizce öğrenme yöntemlerinden biridir.", "en": "Without a doubt, this plan is one of the best English learning methods ever."}, {"tr": "Kesinlikle doğru olan bir şey varsa o da emeğin karşılıksız kalmayacağıdır.", "en": "What is absolutely true is that effort never goes unrewarded."}, {"tr": "Her şeyden önce, kendine güvenmen gerekir.", "en": "Above all, you need to trust yourself."}, {"tr": "En önemlisi, asla vazgeçmemektir.", "en": "Most importantly, it is never to give up."}, {"tr": "Beni gerçekten etkileyen şey, onun azmiydi.", "en": "What truly impressed me was her determination."}, {"tr": "Hayatta başarılı olmanın yolu, düzenli çalışmaktan başka bir şey değildir.", "en": "The way to succeed in life is nothing but working regularly."}, {"tr": "Onu diğerlerinden ayıran tek şey, olağanüstü sabrıydı.", "en": "The only thing that set her apart from others was her extraordinary patience."}, {"tr": "Sana söylediğim şey tam olarak buydu.", "en": "What I told you was exactly this."}, {"tr": "İhtiyacım olan şey bir sihirli değnek değil, disiplindi.", "en": "What I needed was not a magic wand, but discipline."}, {"tr": "Ve disiplinin gerçekten de işe yaradığını gördüm.", "en": "And I did see that discipline indeed works."}, {"tr": "İşte tam da bu yüzden, her gün bura m building a connection."}, {"tr": "Sen ve ben, bu cümlelerle birbirimize bağlanıyoruz.", "en": "You and I, we are connecting to each other through these sentences."}, {"tr": "Aramızdaki tek şey ekran, ama o da şeffaf.", "en": "The only thing between us is the screen, but it is transparent."}, {"tr": "Buradayım, sen de oradasın.", "en": "I am here, and you are there."}, {"tr": "Ve ikimiz de İngilizce düşünüyoruz.", "en": "And we are both thinking in English."}, {"tr": "İşte sihir budur.", "en": "That is the magic."}, {"tr": "İşte öğrenme budur.", "en": "That is learning."}, {"tr": "Bir dil sadece kelimelerden ibaret değildir.", "en": "A language does not consist only of words."}, {"tr": "Bir duygu aktarımıdır.", "en": "It is a transfer of emotion."}, {"tr": "Ben şu an sana duygularımı İngilizce aktarıyorum.", "en": "I am now transferring my emotions to you in English."}, {"tr": "Ve sen beni anlıyorsun.", "en": "And you understand me."}, {"tr": "İşte bunun adı iletişimdir.", "en": "That is called communication."}, {"tr": "Ve iletişim, insanlığın en büyük mucizesidir.", "en": "And communication is humanity's greatest miracle."}, {"tr": "Bu mucizeyi İngilizce yaşamak harika.", "en": "Experiencing this miracle in English is wonderful."}, {"tr": "Gerçekten de, dilleri seviyorum.", "en": "I do love languages, indeed."}, {"tr": "Her dil yeni bir dünya demek.", "en": "Every language means a new world."}, {"tr": "Ve ben yeni dünyalar keşfetmeye bayılırım.", "en": "And I love discovering new worlds."}, {"tr": "Sen de öyle misin?", "en": "Are you like that too?"}, {"tr": "Umarım öylesindir.", "en": "I hope you are."}, {"tr": "Çünkü birlikte keşfedecek çok şey var.", "en": "Because there is a lot to discover together."}, {"tr": "Vurguluyorum: İngilizce öğrenmek bir yolculuktur!", "en": "I do emphasize: Learning English is a journey!"}, {"tr": "Ve bu yolculukta 64. günü devirdik!", "en": "And we have passed the 64th day on this journey!"}, {"tr": "Gerçekten gurur verici! 🎤", "en tence."}, {"tr": "Sadece kelime öğrenmedim, kültür de öğrendim.", "en": "Not only did I learn words, but I also learned culture."}, {"tr": "Eve varır varmaz uyuyakaldım.", "en": "No sooner had I arrived home than I fell asleep."}, {"tr": "Ancak şimdi anlıyorum ne kadar yol katettiğimi.", "en": "Only now do I realize how far I have come."}, {"tr": "65 günde devrik yapıları öğrendim! Vay be! 🎭", "en": "Never in 65 days had I thought I would learn inversions! Wow! 🎭"}, {"tr": "Sadece İngilizce öğrenmedim, kendimi de keşfettim.", "en": "Not only did I learn English, but I also discovered myself."}, {"tr": "Bu yolculuğa başladığımda başıma neler geleceğini hiç bilmiyordum.", "en": "Little did I know what would happen to me when I started this journey."}, {"tr": "Hiçbir yerde buradaki sıcaklığı ve samimiyeti bulamazsın.", "en": "Nowhere else will you find the warmth and sincerity that is here."}, {"tr": "Ancak tüm zorlukları aştığında gerçek başarıyı tadarsın.", "en": "Only when you overcome all difficulties do you taste true success."}, {"tr": "O kadar güçlü ki bu plan, hayatımı değiştirdi.", "en": "So powerful is this plan that it changed my life."}, {"tr": "Bana güvenmeyenlere inat, işte buradayım.", "en": "Despite those who didn't believe in me, here I am. (no inversion, contrastive)"}, {"tr": "İşte tam da bu noktada, devreye disiplin girer.", "en": "It is precisely at this point that discipline comes into play."}, {"tr": "Ne kadar zor olursa olsun, devam etmelisin.", "en": "However hard it may be, you must continue. (no inversion)"}, {"tr": "Öyle bir andı ki, hayatımın dönüm noktası oldu.", "en": "Such was the moment that it became the turning point of my life."}, {"tr": "Ancak ve ancak her gün çalışırsan İngilizce öğrenebilirsin.", "en": "Only and only if you study every day can you learn English."}, {"tr": "Bu kuralı çiğnediğin takdirde, sonuçlarına katlanırsın.", "en": "Should you break this rule, you will face the consequences."}, {"tr": "Daha dün gibi hatırlıyor
